}

/* ---- PROJECT MONTHS ---- */
// Returns array of {y, m} for the current project's date range.
// Falls back to all 12 months of current year if dates not set.
function getProjectMonths() {
  const p = projects[currentProject];
  if (p && p.start && p.end &&
      p.start.m != null && p.end.m != null) {
    const months = [];
    let y = p.start.y, m = p.start.m;
    const endKey = p.end.y * 12 + p.end.m;
    while (y * 12 + m <= endKey && months.length < MONTHS_COUNT) {
      months.push({ y, m });
      m++;
      if (m > 11) { m = 0; y++; }
    }
    if (months.length) return months;
  }
  return _allMonths();
}
function _allMonths() {
  const y = new Date().getFullYear();
  return Array.from({length: 12}, (_,m) => ({y, m}));
}

/* ---- SHARED TOTALS COMPUTATION ---- */
function computeGrandTotals(articles) {
  const months = getProjectMonths();
  const MC = months.length;

  // Индексируем по позиции в проекте (0..MC-1), а не по номеру месяца
  // Это корректно работает и для однолетних и для многолетних проектов
  const grandIn          = Array(MC).fill(0);
  const grandOut         = Array(MC).fill(0);
  const grandForecastIn  = Array(MC).fill(0);
  const grandForecastOut = Array(MC).fill(0);
  const grandFactIn      = Array(MC).fill(0);
  const grandFactOut     = Array(MC).fill(0);

  articles.forEach(a => {
    const artInPlan      = sectionSumEff(a, 'in',  'plan');
    const artOutPlan     = sectionSumEff(a, 'out', 'plan');
    const artInForecast  = sectionSumEff(a, 'in',  'forecast');
    const artOutForecast = sectionSumEff(a, 'out', 'forecast');
    const artInFact      = sectionSumEff(a, 'in',  'fact');
    const artOutFact     = sectionSumEff(a, 'out', 'fact');
    // i = позиция в проекте (0..MC-1) = индекс в массивах plan/forecast/fact
    months.forEach(({m}, i) => {
      grandIn[i]          += artInPlan[i]       || 0;
      grandOut[i]         += artOutPlan[i]      || 0;
      grandForecastIn[i]  += artInForecast[i]   || 0;
      grandForecastOut[i] += artOutForecast[i]  || 0;
      grandFactIn[i]      += artInFact[i]       || 0;
      grandFactOut[i]     += artOutFact[i]      || 0;
    });
  });

  const grandNet         = grandIn.map((v,i)         => v - grandOut[i]);
  const grandForecastNet = grandForecastIn.map((v,i) => v - grandForecastOut[i]);
  const grandFactNet     = grandFactIn.map((v,i)     => v - grandFactOut[i]);

  const cumulP = [], cumulFC = [], cumulF = [];
  let runP = 0, runFC = 0, runF = 0;
  for (let i = 0; i < MC; i++) {
    runP  += grandNet[i];
    runFC += grandForecastNet[i];
    runF  += grandFactNet[i];
    cumulP.push(runP);
    cumulFC.push(runFC);
    cumulF.push(runF);
  }
  return { grandIn, grandOut, grandForecastIn, grandForecastOut, grandFactIn, grandFactOut,
           grandNet, grandForecastNet, grandFactNet,
           cumulP, cumulFC, cumulF, runP, runFC, runF, months, MC };
}

function computeGrandDecTotals(articles, months) {
  let grandInDec36      = Array(DEC_COUNT).fill(0);
  let grandOutDec36     = Array(DEC_COUNT).fill(0);
  let grandInFCDec36    = Array(DEC_COUNT).fill(0);
  let grandOutFCDec36   = Array(DEC_COUNT).fill(0);
  let grandInFDec36     = Array(DEC_COUNT).fill(0);
  let grandOutFDec36    = Array(DEC_COUNT).fill(0);
  articles.forEach(a => {
    const ip   = sectionSum36(a, 'in',  'dplan');
    const op   = sectionSum36(a, 'out', 'dplan');
    const ifc  = sectionSum36(a, 'in',  'dforecast');
    const ofc  = sectionSum36(a, 'out', 'dforecast');
    const inf  = sectionSum36(a, 'in',  'dfact');
    const outf = sectionSum36(a, 'out', 'dfact');
    for (let i = 0; i < DEC_COUNT; i++) {
      grandInDec36[i]    += ip[i]   || 0;
      grandOutDec36[i]   += op[i]   || 0;
      grandInFCDec36[i]  += ifc[i]  || 0;
      grandOutFCDec36[i] += ofc[i]  || 0;
      grandInFDec36[i]   += inf[i]  || 0;
      grandOutFDec36[i]  += outf[i] || 0;
    }
  });
  const grandNetDec36   = grandInDec36.map((v,i)   => v - (grandOutDec36[i]  ||0));
  const grandNetFCDec36 = grandInFCDec36.map((v,i) => v - (grandOutFCDec36[i]||0));
  const grandNetFDec36  = grandInFDec36.map((v,i)  => v - (grandOutFDec36[i] ||0));

  const cumulDec36   = Array(DEC_COUNT).fill(0);
  const cumulFCDec36 = Array(DEC_COUNT).fill(0);
  const cumulFDec36  = Array(DEC_COUNT).fill(0);
  let run = 0, runFC = 0, runF = 0;
  months.forEach(({m}, i) => {
    [0,1,2].forEach(d => {
      const di = i*3+d; // позиция в проекте (не календарный месяц — без коллизий по годам)
      run   += grandNetDec36[di]   || 0;
      runFC += grandNetFCDec36[di] || 0;
      runF  += grandNetFDec36[di]  || 0;
      cumulDec36[di]   = run;
      cumulFCDec36[di] = runFC;
      cumulFDec36[di]  = runF;
    });
  });
  return { grandInDec36, grandOutDec36, grandInFCDec36, grandOutFCDec36, grandInFDec36, grandOutFDec36,
           grandNetDec36, grandNetFCDec36, grandNetFDec36, cumulDec36, cumulFCDec36, cumulFDec36 };
}

/* ---- BUDGET TABLE ---- */
function renderBudget() {
  const p = projects[currentProject];
  document.getElementById('project-page-title').textContent = p.name;
  let meta = '';
  if (p.type) meta += p.type;
  if (p.start && p.end) meta += (meta ? ' · ' : '') + `${MONTH_NAMES_FULL[p.start.m]} ${p.start.y} — ${MONTH_NAMES_FULL[p.end.m]} ${p.end.y}`;
  document.getElementById('project-page-meta').textContent = meta;

  const b = getBudget();
  const articles = b.articles;

  // Compute grand totals (includes months/MC)
  const { grandIn, grandOut, grandForecastIn, grandForecastOut, grandFactIn, grandFactOut,
          grandNet, grandForecastNet, grandFactNet,
          cumulP, cumulFC, cumulF, runP, runFC, runF, months, MC } = computeGrandTotals(articles);

  // ---- RENDER THEAD ----
  const DEC_LABELS = ['1–10','11–20','21–31'];
  const visPerDec   = (viewPlan ? 1 : 0) + (viewForecast ? 1 : 0) + (viewFact ? 1 : 0); // plan + forecast + fact
  const colsPerMonth = viewDecade ? 3 * visPerDec : visPerDec;

  let row1 = '', row2 = '', row3 = '';

  months.forEach(({y, m}) => {
    const colspan = viewDecade ? visPerDec * 3 : visPerDec;
    if (viewDecade) {
      row1 += `<th class="month-group" colspan="${colspan}">${MONTH_NAMES[m]} <small style="font-weight:400;font-size:10px;color:#aaa">${y}</small></th>`;
      DEC_LABELS.forEach(lbl => {
        row2 += `<th class="decade-group" colspan="${visPerDec}" style="text-align:center">${lbl}</th>`;
      });
      row3 += ((viewPlan     ? `<th class="decade-sub-head month-plan-head">бдж</th>` : '') +
               (viewForecast ? `<th class="decade-sub-head month-forecast-head">пл</th>` : '') +
               (viewFact     ? `<th class="decade-sub-head month-fact-head">фк</th>` : '')).repeat(3);
    } else {
      row1 += `<th class="month-group" colspan="${colspan}">${MONTH_NAMES[m]}<br><small style="font-weight:400;font-size:10px;color:#aaa">${y}</small></th>`;
      row2 += (viewPlan     ? `<th class="month-plan-head" style="color:#0a6e4e;font-size:10px;background:#eaf4ff;text-align:center">бюджет</th>` : '') +
              (viewForecast ? `<th class="month-forecast-head" style="color:#7a6000;font-size:10px;background:#fff8e0;text-align:center">план</th>` : '') +
              (viewFact     ? `<th class="month-fact-head" style="color:#a33020;font-size:10px;background:#fff8f6;text-align:center">факт</th>` : '');
    }
  });

  const FIXED_COLS = `
    <th class="left sticky-name" rowspan="${viewDecade?3:2}" style="min-width:200px">Статья <button class="collapse-art-btn" title="Свернуть все подстроки" onclick="collapseAllArticles()">↑</button></th>
    <th class="sticky-tot-p" style="background:#daeeff;color:#1a5fa3;min-width:88px" rowspan="${viewDecade?3:2}">Итого<br><small style="font-weight:400">бюджет</small></th>
    <th class="sticky-tot-fc" style="background:#fff0c0;color:#7a6000;min-width:88px" rowspan="${viewDecade?3:2}">Итого<br><small style="font-weight:400">план</small></th>
    <th class="sticky-tot-f" style="background:#d6f2e6;color:#0a6e4e;min-width:88px" rowspan="${viewDecade?3:2}">Итого<br><small style="font-weight:400">факт</small></th>`;

  if (viewDecade) {
    document.getElementById('main-thead').innerHTML =
      `<tr>${FIXED_COLS}${row1}</tr><tr>${row2}</tr><tr>${row3}</tr>`;
  } else {
    document.getElementById('main-thead').innerHTML =
      `<tr>${FIXED_COLS}${row1}</tr><tr>${row2}</tr>`;
  }

  // Apply hide classes (colspans already correct from thead generation above)
  const tbl = document.getElementById('main-table');
  tbl.classList.toggle('hide-plan',     !viewPlan);
  tbl.classList.toggle('hide-forecast', !viewForecast);
  tbl.classList.toggle('hide-fact',     !viewFact);

  let html = '';

  articles.forEach((art, ai) => {
    // Aggregate article totals over project months
    const artInPlan  = sectionSumEff(art, 'in',  'plan');
    const artOutPlan = sectionSumEff(art, 'out', 'plan');
    const artInFact  = sectionSumEff(art, 'in',  'fact');
    const artOutFact = sectionSumEff(art, 'out', 'fact');
    const inTotal     = months.reduce((s,_,i) => s + (artInPlan[i]  || 0), 0);
    const outTotal    = months.reduce((s,_,i) => s + (artOutPlan[i] || 0), 0);
    const factInTotal = months.reduce((s,_,i) => s + (artInFact[i]  || 0), 0);
    const factOutTotal= months.reduce((s,_,i) => s + (artOutFact[i] || 0), 0);

    // ---- Article header row ----
    html += `<tr class="article-header" data-article="${ai}">
      <td class="left sticky-name" colspan="1">
        <span class="drag-handle" title="Перетащить статью">⠿</span>
        <input class="row-name-input" value="${esc(art.name)}" onchange="renameArticle(${ai},this.value)">
        <button class="delete-btn" style="margin-left:6px" onclick="deleteArticle(${ai})">✕</button>
      </td>
      <td class="sticky-tot-p"></td>
      <td class="sticky-tot-fc"></td>
      <td class="sticky-tot-f"></td>
      <td colspan="${MC * colsPerMonth}"></td>
    </tr>`;

    // ---- Helper: render one section (in or out) ----
    const renderSection = (section) => {
      const isIn   = section === 'in';
      if (isIn && art.inDeleted) return; // скрытая строка поступлений
      const direct   = art[section + 'Direct'];
      const plan     = isIn ? artInPlan       : artOutPlan;
      const forecast = isIn ? sectionSumEff(art, 'in', 'forecast') : sectionSumEff(art, 'out', 'forecast');
      const fact     = isIn ? artInFact       : artOutFact;
      const total    = isIn ? inTotal         : outTotal;
      const fcTotal  = months.reduce((s,_,i) => s + (forecast[i] || 0), 0);
      const fTotal   = isIn ? factInTotal     : factOutTotal;
      const colorP   = isIn ? '#0a6e4e'       : '#a33020';
      const tagCls   = isIn ? 'tag-in'        : 'tag-out';
      const tagTxt   = isIn ? '▲ Поступление' : '▼ Выплата';
      const subCls   = isIn ? 'sub-in'        : 'sub-out';
      const bgAdd    = isIn ? '#f6fcfa'        : '#fdf8f6';
      const btnTxt   = isIn ? '+ подстроку поступления' : '+ подстроку выплаты';

      if (direct) {
        // ── DIRECT MODE ──
        const dpArr  = ensureDec(art[section + 'Dplan']);
        const dfcArr = ensureDec(art[section + 'Dforecast'] || []);
        const dfArr  = ensureDec(art[section + 'Dfact']);
        const directCells = months.map(({m, y}, mi) => {
          if (viewDecade) {
            return [0,1,2].map(d => {
              const di = mi*3+d;
              const vp = dpArr[di]||0, vfc = dfcArr[di]||0, vf = dfArr[di]||0;
              return `<td class="cell-dplan cell-plan"><input class="month-input" type="text" inputmode="numeric"
                value="${vp?fmt(vp):''}" placeholder="0"
                onfocus="inputFocus(this)"
                onblur="decDirectBlur(this,${ai},'${section}','dplan',${di})"
                oninput="decDirectInput(${ai},'${section}','dplan',${di},this.value)"></td>` +
              `<td class="cell-forecast"><input class="month-input" type="text" inputmode="numeric"
                value="${vfc?fmt(vfc):''}" placeholder="0" style="color:#7a6000"
                onfocus="inputFocus(this)"
                onblur="decDirectBlur(this,${ai},'${section}','dforecast',${di})"
                oninput="decDirectInput(${ai},'${section}','dforecast',${di},this.value)"></td>` +
              `<td class="cell-dfact cell-fact"><input class="month-input" type="text" inputmode="numeric"
                value="${vf?fmt(vf):''}" placeholder="0" style="color:${colorP}"
                onfocus="inputFocus(this)"
                onblur="decDirectBlur(this,${ai},'${section}','dfact',${di})"
                oninput="decDirectInput(${ai},'${section}','dfact',${di},this.value)"></td>`;
            }).join('');
          } else {
            const vp = decSum(dpArr, mi), vfc = decSum(dfcArr, mi), vf = decSum(dfArr, mi);
            return `<td class="cell-plan"><input class="month-input" type="text" inputmode="numeric"
                value="${vp?fmt(vp):''}" placeholder="0"
                onfocus="inputFocus(this)"
                onblur="directBlur(this,${ai},'${section}','plan',${mi})"
                onkeydown="directKeydown(event,this,${ai},'${section}','plan',${mi})"
                oninput="directInput(${ai},'${section}','plan',${mi},this.value)"></td>` +
              `<td class="cell-forecast"><input class="month-input" type="text" inputmode="numeric"
                value="${vfc?fmt(vfc):''}" placeholder="0" style="color:#7a6000"
                onfocus="inputFocus(this)"
                onblur="directBlur(this,${ai},'${section}','forecast',${mi})"
                onkeydown="directKeydown(event,this,${ai},'${section}','forecast',${mi})"
                oninput="directInput(${ai},'${section}','forecast',${mi},this.value)"></td>` +
              `<td class="cell-fact"><input class="month-input" type="text" inputmode="numeric"
                value="${vf?fmt(vf):''}" placeholder="0" style="color:${colorP}"
                onfocus="inputFocus(this)"
                onblur="directBlur(this,${ai},'${section}','fact',${mi})"
                onkeydown="directKeydown(event,this,${ai},'${section}','fact',${mi})"
                oninput="directInput(${ai},'${section}','fact',${mi},this.value)"></td>`;
          }
        }).join('');
        html += `<tr class="${subCls}" data-art-child="${ai}">
          <td class="left sticky-name sub-label">
            <span class="sub-type-tag ${tagCls}">${tagTxt}</span>
            ${isIn ? '<button class="delete-btn" style="margin-left:6px" onclick="deleteInRow(' + ai + ')" title="Удалить поступления">✕</button>' : ''}
            <button class="add-subline-btn" style="margin-left:8px" onclick="addSubline(${ai},'${section}')" title="Разбить на подстроки">+ подстроки</button>
          </td>
          <td class="sticky-tot-p total-cell" style="color:${colorP}" id="art-total-${isIn?'in':'out'}-${ai}">${total ? fmt(total) : '—'}</td>
          <td class="sticky-tot-fc total-cell" style="color:#7a6000" id="art-total-${isIn?'fcin':'fcout'}-${ai}">${fcTotal ? fmt(fcTotal) : '—'}</td>
          <td class="sticky-tot-f total-cell" style="color:${colorP}" id="art-total-${isIn?'factin':'factout'}-${ai}">${fTotal ? fmt(fTotal) : '—'}</td>
          ${directCells}
        </tr>`;
      } else {
        // ── LINES MODE: агрегирующая строка + подстроки ──
        const sumCells = months.map(({m, y}, mi) => {
          if (viewDecade) {
            const ip  = sectionSum36(art, section, 'dplan');
            const ifc = sectionSum36(art, section, 'dforecast');
            const iF  = sectionSum36(art, section, 'dfact');
            return [0,1,2].map(d => {
              const di = mi*3+d;
              const vp = ip[di]||0, vfc = ifc[di]||0, vf = iF[di]||0;
              return `<td class="total-cell cell-dplan cell-plan" style="color:${colorP}" id="art-${isIn?'in':'out'}-dplan-${ai}-${di}">${vp ? fmt(vp) : '—'}</td>` +
                     `<td class="total-cell cell-forecast" style="color:#7a6000" id="art-${isIn?'in':'out'}-dforecast-${ai}-${di}">${vfc ? fmt(vfc) : '—'}</td>` +
                     `<td class="total-cell cell-dfact cell-fact" style="color:${colorP}" id="art-${isIn?'in':'out'}-dfact-${ai}-${di}">${vf ? fmt(vf) : '—'}</td>`;
            }).join('');
          }
          const vp = plan[mi] || 0, vfc = forecast[mi] || 0, vf = fact[mi] || 0;
          return `<td class="cell-plan total-cell" style="color:${colorP}" id="art-${isIn?'in':'out'}-plan-${ai}-${mi}">${vp ? fmt(vp) : '—'}</td>` +
                 `<td class="cell-forecast total-cell" style="color:#7a6000" id="art-${isIn?'in':'out'}-forecast-${ai}-${mi}">${vfc ? fmt(vfc) : '—'}</td>` +
                 `<td class="cell-fact total-cell" style="color:${colorP}" id="art-${isIn?'in':'out'}-fact-${ai}-${mi}">${vf ? fmt(vf) : '—'}</td>`;
        }).join('');
        html += `<tr class="${subCls}" data-art-child="${ai}">
          <td class="left sticky-name sub-label">
            <button class="toggle-btn${art[section+'Open']?' open':''}" onclick="toggleSection(${ai},'${section}')" title="Раскрыть/скрыть">▶</button>
            <span class="sub-type-tag ${tagCls}">${tagTxt}</span>
            ${isIn ? '<button class="delete-btn" style="margin-left:6px" onclick="deleteInRow(' + ai + ')" title="Удалить поступления">✕</button>' : ''}
          </td>
          <td class="sticky-tot-p total-cell" style="color:${colorP}" id="art-total-${isIn?'in':'out'}-${ai}">${total ? fmt(total) : '—'}</td>
          <td class="sticky-tot-fc total-cell" style="color:#7a6000" id="art-total-${isIn?'fcin':'fcout'}-${ai}">${fcTotal ? fmt(fcTotal) : '—'}</td>
          <td class="sticky-tot-f total-cell" style="color:${colorP}" id="art-total-${isIn?'factin':'factout'}-${ai}">${fTotal ? fmt(fTotal) : '—'}</td>
          ${sumCells}
        </tr>`;

        if (art[section + 'Open']) {
          art[section + 'Lines'].forEach((line, li) => {
            const ldp  = ensureDec(line.dplan);
            const ldfc = ensureDec(line.dforecast || []);
            const ldf  = ensureDec(line.dfact);
            const lineCells = months.map(({m}, mi) => {  // mi = позиция в проекте (как в directCells)
              if (viewDecade) {
                return [0,1,2].map(d => {
                  const di = mi*3+d;
                  const vp = ldp[di]||0, vfc = ldfc[di]||0, vf = ldf[di]||0;
                  return `<td class="cell-dplan cell-plan"><input class="month-input" type="text" inputmode="numeric"
                      value="${vp?fmt(vp):''}" placeholder="0"
                      onfocus="inputFocus(this)"
                      onblur="decSublineBlur(this,${ai},'${section}',${li},'dplan',${di})"
                      oninput="decSublineInput(${ai},'${section}',${li},'dplan',${di},this.value)"></td>` +
                    `<td class="cell-forecast"><input class="month-input" type="text" inputmode="numeric"
                      value="${vfc?fmt(vfc):''}" placeholder="0" style="color:#7a6000"
                      onfocus="inputFocus(this)"
                      onblur="decSublineBlur(this,${ai},'${section}',${li},'dforecast',${di})"
                      oninput="decSublineInput(${ai},'${section}',${li},'dforecast',${di},this.value)"></td>` +
                    `<td class="cell-dfact cell-fact"><input class="month-input" type="text" inputmode="numeric"
                      value="${vf?fmt(vf):''}" placeholder="0" style="color:${colorP}"
                      onfocus="inputFocus(this)"
                      onblur="decSublineBlur(this,${ai},'${section}',${li},'dfact',${di})"
                      oninput="decSublineInput(${ai},'${section}',${li},'dfact',${di},this.value)"></td>`;
                }).join('');
              } else {
                const vp = decSum(ldp,mi), vfc = decSum(ldfc,mi), vf = decSum(ldf,mi);
                return `<td class="cell-plan"><input class="month-input" type="text" inputmode="numeric"
                    value="${vp?fmt(vp):''}" placeholder="0"
                    onfocus="inputFocus(this)"
                    onblur="sublineBlur(this,${ai},'${section}',${li},'plan',${mi})"
                    onkeydown="sublineKeydown(event,this,${ai},'${section}',${li},'plan',${mi})"
                    oninput="sublineInput(${ai},'${section}',${li},'plan',${mi},this.value)"></td>` +
                  `<td class="cell-forecast"><input class="month-input" type="text" inputmode="numeric"
                    value="${vfc?fmt(vfc):''}" placeholder="0" style="color:#7a6000"
                    onfocus="inputFocus(this)"
                    onblur="sublineBlur(this,${ai},'${section}',${li},'forecast',${mi})"
                    onkeydown="sublineKeydown(event,this,${ai},'${section}',${li},'forecast',${mi})"
                    oninput="sublineInput(${ai},'${section}',${li},'forecast',${mi},this.value)"></td>` +
                  `<td class="cell-fact"><input class="month-input" type="text" inputmode="numeric"
                    value="${vf?fmt(vf):''}" placeholder="0" style="color:${colorP}"
                    onfocus="inputFocus(this)"
                    onblur="sublineBlur(this,${ai},'${section}',${li},'fact',${mi})"
                    oninput="sublineInput(${ai},'${section}',${li},'fact',${mi},this.value)"></td>`;
              }
            }).join('');
            const lineTotal   = months.reduce((s,_,i) => s + decSum(ldp,i),  0);
            const lineFCTotal = months.reduce((s,_,i) => s + decSum(ldfc,i), 0);
            const lineFTotal  = months.reduce((s,_,i) => s + decSum(ldf,i),  0);
            const subRowCls  = isIn ? 'subline-in' : 'subline-out';
            html += `<tr class="${subRowCls}" data-art-child="${ai}">
              <td class="left sticky-name subline-label">
                <input class="subline-name-input" value="${esc(line.name)}" placeholder="Название..." onchange="renameSubline(${ai},'${section}',${li},this.value)">
                <button class="delete-subline-btn" onclick="deleteSubline(${ai},'${section}',${li})" title="Удалить">✕</button>
              </td>
              <td class="sticky-tot-p total-cell" style="color:${colorP}">${lineTotal ? fmt(lineTotal) : '—'}</td>
              <td class="sticky-tot-fc total-cell" style="color:#7a6000">${lineFCTotal ? fmt(lineFCTotal) : '—'}</td>
              <td class="sticky-tot-f total-cell" style="color:${colorP}">${lineFTotal ? fmt(lineFTotal) : '—'}</td>
              ${lineCells}
            </tr>`;
          });
          html += `<tr class="add-subline-row" data-art-child="${ai}">
            <td class="sticky-name" style="background:${bgAdd}">
              <button class="add-subline-btn" onclick="addSubline(${ai},'${section}')">${btnTxt}</button>
            </td>
            <td colspan="${MC * colsPerMonth + 3}" style="background:${bgAdd}"></td>
          </tr>`;
        }
      }
    };

    renderSection('in');
    renderSection('out');
  });

  // Grand total rows
  const netSum     = sumArr(grandNet);
  const netFCSum   = sumArr(grandForecastNet);
  const netFactSum = sumArr(grandFactNet);

  // Helper: build cells for one total row across all project months
  function buildTotalCells(rowPlan12, rowForecast12, rowFact12, planDec36, forecastDec36, factDec36, cls, colorFn) {
    return months.map(({m}, mi) => {
      if (viewDecade) {
        return [0,1,2].map(d => {
          const di = mi*3+d; // позиционный индекс в проекте, не календарный месяц
          const vp  = planDec36     ? (planDec36[di]    ||0) : 0;
          const vfc = forecastDec36 ? (forecastDec36[di]||0) : 0;
          const vf  = factDec36     ? (factDec36[di]    ||0) : 0;
          return `<td class="total-cell ${cls} cell-dplan cell-plan" style="color:${colorFn(vp)}">${vp?fmt(vp):'—'}</td>` +
                 `<td class="total-cell ${cls} cell-forecast" style="color:${colorFn(vfc)}">${vfc?fmt(vfc):'—'}</td>` +
                 `<td class="total-cell ${cls} cell-dfact cell-fact" style="color:${colorFn(vf)}">${vf?fmt(vf):'—'}</td>`;
        }).join('');
      } else {
        const vp = rowPlan12[mi]||0, vfc = rowForecast12[mi]||0, vf = rowFact12[mi]||0;
        return `<td class="total-cell ${cls} cell-plan" style="color:${colorFn(vp)}">${fmt(vp)}</td>` +
               `<td class="total-cell ${cls} cell-forecast" style="color:${colorFn(vfc)}">${fmt(vfc)}</td>` +
               `<td class="total-cell ${cls} cell-fact" style="color:${colorFn(vf)}">${fmt(vf)}</td>`;
      }
    }).join('');
  }

  // Compute decade [36] totals across all articles (plan + forecast + fact)
  const { grandInDec36, grandOutDec36, grandInFCDec36, grandOutFCDec36, grandInFDec36, grandOutFDec36,
          grandNetDec36, grandNetFCDec36, grandNetFDec36, cumulDec36, cumulFCDec36, cumulFDec36 } =
    computeGrandDecTotals(articles, months);

  const netColorFn= v => netColor(v);

  const inMonthCells   = buildTotalCells(grandIn,  grandForecastIn,  grandFactIn,  grandInDec36,  grandInFCDec36,  grandInFDec36,  'positive', () => '#0a6e4e');
  const outMonthCells  = buildTotalCells(grandOut, grandForecastOut, grandFactOut, grandOutDec36, grandOutFCDec36, grandOutFDec36, 'negative', () => '#a33020');
  const netMonthCells  = buildTotalCells(grandNet, grandForecastNet, grandFactNet, grandNetDec36, grandNetFCDec36, grandNetFDec36, '',         netColorFn);

  const cumulMonthCells = viewDecade
    ? months.map(({m}, mi) => [0,1,2].map(d => {
        const di = mi*3+d; // позиционный индекс в проекте
        const vp = cumulDec36[di]||0, vfc = cumulFCDec36[di]||0, vf = cumulFDec36[di]||0;
        return `<td class="total-cell cell-dplan cell-plan" style="color:${netColor(vp)}">${fmt(vp)}</td>` +
               `<td class="total-cell cell-forecast" style="color:${netColor(vfc)}">${fmt(vfc)}</td>` +
               `<td class="total-cell cell-dfact cell-fact" style="color:${netColor(vf)}">${fmt(vf)}</td>`;
      }).join('')).join('')
    : cumulP.map((v,i) =>
        `<td class="total-cell cell-plan" id="g-cumul-plan-m${i}" style="color:${netColor(v)}">${fmt(v)}</td>` +
        `<td class="total-cell cell-forecast" id="g-cumul-forecast-m${i}" style="color:${netColor(cumulFC[i])}">${fmt(cumulFC[i])}</td>` +
        `<td class="total-cell cell-fact" id="g-cumul-fact-m${i}" style="color:${netColor(cumulF[i])}">${fmt(cumulF[i])}</td>`
      ).join('');

  html += `
    <tr class="total-row" id="grand-in-row">
      <td class="left sticky-name">Итого поступления</td>
      <td class="sticky-tot-p total-cell positive" id="g-in-plan">${fmt(sumArr(grandIn))}</td>
      <td class="sticky-tot-fc total-cell" style="color:#7a6000" id="g-in-forecast">${fmt(sumArr(grandForecastIn))}</td>
      <td class="sticky-tot-f total-cell positive" id="g-in-fact">${fmt(sumArr(grandFactIn))}</td>
      ${inMonthCells}
    </tr>
    <tr class="total-row" id="grand-out-row">
      <td class="left sticky-name">Итого выплаты</td>
      <td class="sticky-tot-p total-cell negative" id="g-out-plan">${fmt(sumArr(grandOut))}</td>
      <td class="sticky-tot-fc total-cell" style="color:#a33020" id="g-out-forecast">${fmt(sumArr(grandForecastOut))}</td>
      <td class="sticky-tot-f total-cell negative" id="g-out-fact">${fmt(sumArr(grandFactOut))}</td>
      ${outMonthCells}
    </tr>
    <tr class="net-row" id="grand-net-row">
      <td class="left sticky-name">Чистый денежный поток</td>
      <td class="sticky-tot-p total-cell" id="g-net-plan" style="color:${netColor(netSum)}">${fmt(netSum)}</td>
      <td class="sticky-tot-fc total-cell" id="g-net-forecast" style="color:${netColor(netFCSum)}">${fmt(netFCSum)}</td>
      <td class="sticky-tot-f total-cell" id="g-net-fact" style="color:${netColor(netFactSum)}">${fmt(netFactSum)}</td>
      ${netMonthCells}
    </tr>
    <tr class="cumul-row" id="grand-cumul-row">
      <td class="left sticky-name">Накопительно</td>
      <td class="sticky-tot-p total-cell" id="g-cumul-plan" style="color:${netColor(runP)}">${fmt(runP)}</td>
      <td class="sticky-tot-fc total-cell" id="g-cumul-forecast" style="color:${netColor(runFC)}">${fmt(runFC)}</td>
      <td class="sticky-tot-f total-cell" id="g-cumul-fact" style="color:${netColor(runF)}">${fmt(runF)}</td>
      ${cumulMonthCells}
    </tr>`;

  document.getElementById('articles-body').innerHTML = html;
  updateStickyPositions();
  initArticleDrag();
}

function inputFocus(el) {
  const num = parseFloat(el.value.replace(/\s/g,'').replace(',','.')) || 0;
  el.value = num ? String(num) : '';
  el.select();
}

function parseInput(val) { return parseFloat(val.replace(/\s/g,'').replace(',','.')) || 0; }

/* Прямой ввод (direct mode) — пишем в d1 декадного массива */
function directInput(ai, section, field, mi, val) {
  const art = getBudget().articles[ai];
  const df = field==='plan'?'dplan':(field==='forecast'?'dforecast':'dfact');
  const KEY = section + df.charAt(0).toUpperCase() + df.slice(1);
  if (!Array.isArray(art[KEY]) || art[KEY].length !== DEC_COUNT) art[KEY] = Array(DEC_COUNT).fill(0);
  if (hasExtraDecData(art[KEY], mi)) return; // D2/D3 заняты — не трогаем
  art[KEY][mi*3] = parseInput(val);
  // Итоги пересчитываются на blur — не пересчитываем всю таблицу на каждое нажатие
}
function directKeydown(event, el, ai, section, field, mi) {
  if (event.key === 'Enter') {
    event.preventDefault();
    directBlur(el, ai, section, field, mi);
    const allInputs = Array.from(document.querySelectorAll('.month-input'));
    const idx = allInputs.indexOf(el);
    if (idx >= 0 && idx + 1 < allInputs.length) allInputs[idx + 1].focus();
  }
}

/* Подстрока: ввод — пишем в d1 декадного массива */
function sublineInput(ai, section, li, field, mi, val) {
  const line = getBudget().articles[ai][section+'Lines'][li];
  const df = field==='plan'?'dplan':(field==='forecast'?'dforecast':'dfact');
  if (!Array.isArray(line[df]) || line[df].length !== DEC_COUNT) line[df] = Array(DEC_COUNT).fill(0);
  if (hasExtraDecData(line[df], mi)) return; // D2/D3 заняты — не трогаем
  line[df][mi*3] = parseInput(val);
  // Итоги пересчитываются на blur — не пересчитываем всю таблицу на каждое нажатие
}
function sublineBlur(el, ai, section, li, field, mi) {
  const num = parseInput(el.value);
  const line = getBudget().articles[ai][section+'Lines'][li];
  const df = field==='plan'?'dplan':(field==='forecast'?'dforecast':'dfact');
  if (!Array.isArray(line[df]) || line[df].length !== DEC_COUNT) line[df] = Array(DEC_COUNT).fill(0);
  if (hasExtraDecData(line[df], mi)) {
    el.value = fmt(decSum(line[df], mi)) || '';
    showToast('Нельзя изменить месяц — в нём уже есть декадное планирование');
    return;
  }
  line[df][mi*3] = num;
  el.value = num ? fmt(num) : '';
  saveData();
  renderTotals();
}
function sublineKeydown(event, el, ai, section, li, field, mi) {
  if (event.key === 'Enter') {
    event.preventDefault();
    sublineBlur(el, ai, section, li, field, mi);
    const allInputs = Array.from(document.querySelectorAll('.month-input'));
    const idx = allInputs.indexOf(el);
    if (idx >= 0 && idx + 1 < allInputs.length) allInputs[idx + 1].focus();
  }
}

/* Decade direct input handlers */
function decDirectInput(ai, section, field, di, val) {
  const art = getBudget().articles[ai];
  const KEY = section + field.charAt(0).toUpperCase() + field.slice(1);
  if (!Array.isArray(art[KEY]) || art[KEY].length !== DEC_COUNT) art[KEY] = Array(DEC_COUNT).fill(0);
  art[KEY][di] = parseInput(val);
  // Monthly totals are recalculated only on blur — no need to re-render on every keystroke
}
function decDirectBlur(el, ai, section, field, di) {
  const num = parseInput(el.value);
  const art = getBudget().articles[ai];
  const KEY = section + field.charAt(0).toUpperCase()+field.slice(1);
  if (!Array.isArray(art[KEY]) || art[KEY].length!==DEC_COUNT) art[KEY]=Array(DEC_COUNT).fill(0);
  art[KEY][di] = num;
  el.value = num ? fmt(num) : '';
  saveData(); renderTotals();
}
function decSublineInput(ai, section, li, field, di, val) {
  const line = getBudget().articles[ai][section+'Lines'][li];
  if (!Array.isArray(line[field])||line[field].length!==DEC_COUNT) line[field]=Array(DEC_COUNT).fill(0);
  line[field][di] = parseInput(val);
  updateAggregateCell(ai, section, field, di, line);
}
function decSublineBlur(el, ai, section, li, field, di) {
  const num = parseInput(el.value);
  const line = getBudget().articles[ai][section+'Lines'][li];
  if (!Array.isArray(line[field])||line[field].length!==DEC_COUNT) line[field]=Array(DEC_COUNT).fill(0);
  line[field][di] = num;
  el.value = num ? fmt(num) : '';
  updateAggregateCell(ai, section, field, di, line);
  saveData(); renderTotals();
}
function updateAggregateCell(ai, section, field, di, changedLine) {
  // Update the aggregate cells (plan, forecast, or fact) for the given decade index
  const art = getBudget().articles[ai];
  const m = Math.floor(di/3);
  // Recompute section totals across all lines for this decade
  const allD = Array(DEC_COUNT).fill(0);
  (art[section+'Lines']||[]).forEach(l => {
    const arr = ensureDec(l[field]);
    allD.forEach((_, i) => { allD[i] += arr[i]||0; });
  });
  const vp = allD[di]||0;
  const cellId = field === 'dplan'
    ? `art-${section}-dplan-${ai}-${di}`
    : field === 'dforecast'
      ? `art-${section}-dforecast-${ai}-${di}`
      : `art-${section}-dfact-${ai}-${di}`;
  const el = document.getElementById(cellId);
  if (el) el.textContent = vp ? fmt(vp) : '—';
}

/* Show toast warning */
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast-warn';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function directBlur(el, ai, section, field, mi) {
  const num = parseInput(el.value);
  const art = getBudget().articles[ai];
  const df = field==='plan'?'dplan':(field==='forecast'?'dforecast':'dfact');
  const dfKey = section + df.charAt(0).toUpperCase() + df.slice(1);
  if (!Array.isArray(art[dfKey]) || art[dfKey].length !== DEC_COUNT) art[dfKey] = Array(DEC_COUNT).fill(0);
  if (hasExtraDecData(art[dfKey], mi)) {
    el.value = fmt(decSum(art[dfKey], mi)) || '';
    showToast('Нельзя изменить месяц — в нём уже есть декадное планирование');
    return;
  }
  art[dfKey][mi*3] = num;
  el.value = num ? fmt(num) : '';
  saveData(); renderTotals();
}

/* Управление подстроками */
function addSubline(ai, section) {
  const art = getBudget().articles[ai];
  if (art[section + 'Direct']) {
    // Переключаемся из direct в lines mode:
    // данные из прямой строки переносим в первую подстроку
    const label = section === 'in' ? 'Поступление 1' : 'Выплата 1';
    const firstLine = newLine(label);
    firstLine.dplan     = ensureDec(art[section + 'Dplan']).slice();
    firstLine.dforecast = ensureDec(art[section + 'Dforecast']).slice();
    firstLine.dfact     = ensureDec(art[section + 'Dfact']).slice();
    art[section + 'Lines']    = [firstLine];
    art[section + 'Dplan']    = Array(DEC_COUNT).fill(0);
    art[section + 'Dforecast']= Array(DEC_COUNT).fill(0);
    art[section + 'Dfact']    = Array(DEC_COUNT).fill(0);
    art[section + 'Direct'] = false;
    art[section + 'Open']  = true;
    // Добавляем вторую подстроку сразу
    const label2 = section === 'in' ? 'Поступление 2' : 'Выплата 2';
    art[section + 'Lines'].push(newLine(label2));
  } else {
    const key = section + 'Lines';
    const n = art[key].length + 1;
    const label = section === 'in' ? 'Поступление ' : 'Выплата ';
    art[key].push(newLine(label + n));
  }
  saveData();
  renderBudget();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.subline-name-input');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 30);
}
function deleteSubline(ai, section, li) {
  const art = getBudget().articles[ai];
  const key = section + 'Lines';
  if (art[key].length <= 1) {
    // Последняя подстрока — переносим данные обратно в direct mode
    if (confirm('Удалить подстроки и вернуться к прямому вводу? Данные этой подстроки сохранятся.')) {
      art[section + 'Dplan']    = ensureDec(art[key][0].dplan).slice();
      art[section + 'Dforecast']= ensureDec(art[key][0].dforecast).slice();
      art[section + 'Dfact']    = ensureDec(art[key][0].dfact).slice();
      art[section + 'Lines'] = [];
      art[section + 'Direct'] = true;
      saveData();
      renderBudget();
    }
    return;
  }
  art[key].splice(li, 1);
  saveData();
  renderBudget();
}

function updateStickyPositions() {
  // Измеряем реальную ширину замороженных колонок из DOM, а не из констант 200/88.
  // Это важно для мобильных, где ширина колонки «Статья» уменьшается (CSS @media),
  // иначе колонки «Итого» разъезжаются.
  const thead = document.getElementById('main-thead');
  const root  = document.documentElement.style;
  if (!thead) {
    // Фолбэк до первого рендера таблицы
    root.setProperty('--sticky-tot-p-left',  '200px');
    root.setProperty('--sticky-tot-fc-left', (200 + (viewPlan ? 88 : 0)) + 'px');
    root.setProperty('--sticky-tot-f-left',  (200 + (viewPlan ? 88 : 0) + (viewForecast ? 88 : 0)) + 'px');
    return;
  }
  const nameTh = thead.querySelector('th.sticky-name');
  const pTh    = thead.querySelector('th.sticky-tot-p');
  const fcTh   = thead.querySelector('th.sticky-tot-fc');
  // offsetWidth скрытых (display:none) колонок = 0, что корректно обнуляет смещение
  const nameW = nameTh ? nameTh.offsetWidth : 200;
  const pW    = pTh    ? pTh.offsetWidth    : 0;
  const fcW   = fcTh   ? fcTh.offsetWidth   : 0;
  root.setProperty('--sticky-tot-p-left',  nameW + 'px');
  root.setProperty('--sticky-tot-fc-left', (nameW + pW) + 'px');
  root.setProperty('--sticky-tot-f-left',  (nameW + pW + fcW) + 'px');
}
window.addEventListener('resize', function() {
  const pp = document.getElementById('page-project');
  if (pp && pp.classList.contains('active')) updateStickyPositions();
});

function renderTotals() {
  updateStickyPositions();
  const b = getBudget();
  const articles = b.articles;
  const { grandIn, grandOut, grandForecastIn, grandForecastOut, grandFactIn, grandFactOut,
          grandNet, grandForecastNet, grandFactNet,
          cumulP, cumulFC, cumulF, runP, runFC, runF, months } = computeGrandTotals(articles);

  const sumEff = sectionSum; // декадные массивы — единственный источник

  articles.forEach((art, ai) => {
    const artInPlan      = sumEff(art, 'in',  'plan');
    const artOutPlan     = sumEff(art, 'out', 'plan');
    const artInForecast  = sumEff(art, 'in',  'forecast');
    const artOutForecast = sumEff(art, 'out', 'forecast');
    const artInFact      = sumEff(art, 'in',  'fact');
    const artOutFact     = sumEff(art, 'out', 'fact');
    const s = (id, val) => { const el=document.getElementById(id); if(el) el.textContent = val ? fmt(val) : '—'; };
    // Суммируем по позициям в проекте (i = 0..MC-1)
    s(`art-total-in-${ai}`,      months.reduce((acc,_,i) => acc + (artInPlan[i]       || 0), 0));
    s(`art-total-fcin-${ai}`,    months.reduce((acc,_,i) => acc + (artInForecast[i]   || 0), 0));
    s(`art-total-out-${ai}`,     months.reduce((acc,_,i) => acc + (artOutPlan[i]      || 0), 0));
    s(`art-total-fcout-${ai}`,   months.reduce((acc,_,i) => acc + (artOutForecast[i]  || 0), 0));
    s(`art-total-factin-${ai}`,  months.reduce((acc,_,i) => acc + (artInFact[i]       || 0), 0));
    s(`art-total-factout-${ai}`, months.reduce((acc,_,i) => acc + (artOutFact[i]      || 0), 0));

    if (viewDecade) {
      if (!art.inDirect && !art.inDeleted) {
        const ip  = sectionSum36(art, 'in',  'dplan');
        const ifc = sectionSum36(art, 'in',  'dforecast');
        const iF  = sectionSum36(art, 'in',  'dfact');
        months.forEach(({m}, mi) => {
          [0,1,2].forEach(d => {
            const di = mi*3+d; // позиционный индекс в проекте
            const setDec = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v ? fmt(v) : '—'; };
            setDec(`art-in-dplan-${ai}-${di}`,     ip[di]  || 0);
            setDec(`art-in-dforecast-${ai}-${di}`, ifc[di] || 0);
            setDec(`art-in-dfact-${ai}-${di}`,     iF[di]  || 0);
          });
        });
      }
      if (!art.outDirect) {
        const op  = sectionSum36(art, 'out', 'dplan');
        const ofc = sectionSum36(art, 'out', 'dforecast');
        const oF  = sectionSum36(art, 'out', 'dfact');
        months.forEach(({m}, mi) => {
          [0,1,2].forEach(d => {
            const di = mi*3+d; // позиционный индекс в проекте
            const setDec = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v ? fmt(v) : '—'; };
            setDec(`art-out-dplan-${ai}-${di}`,     op[di]  || 0);
            setDec(`art-out-dforecast-${ai}-${di}`, ofc[di] || 0);
            setDec(`art-out-dfact-${ai}-${di}`,     oF[di]  || 0);
          });
        });
      }
    } else {
      months.forEach(({m}, mi) => {
        const elInP   = document.getElementById(`art-in-plan-${ai}-${mi}`);
        const elInFC  = document.getElementById(`art-in-forecast-${ai}-${mi}`);
        const elInF   = document.getElementById(`art-in-fact-${ai}-${mi}`);
        const elOutP  = document.getElementById(`art-out-plan-${ai}-${mi}`);
        const elOutFC = document.getElementById(`art-out-forecast-${ai}-${mi}`);
        const elOutF  = document.getElementById(`art-out-fact-${ai}-${mi}`);
        if (elInP)   elInP.textContent   = artInPlan[mi]      ? fmt(artInPlan[mi])       : '—';
        if (elInFC)  elInFC.textContent  = artInForecast[mi]  ? fmt(artInForecast[mi])   : '—';
        if (elInF)   elInF.textContent   = artInFact[mi]      ? fmt(artInFact[mi])        : '—';
        if (elOutP)  elOutP.textContent  = artOutPlan[mi]     ? fmt(artOutPlan[mi])       : '—';
        if (elOutFC) elOutFC.textContent = artOutForecast[mi] ? fmt(artOutForecast[mi])   : '—';
        if (elOutF)  elOutF.textContent  = artOutFact[mi]     ? fmt(artOutFact[mi])       : '—';
      });
    }
  });

  const sv = (id, val, color) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = fmt(val);
    if (color !== undefined) el.style.color = color;
  };
  sv('g-in-plan',      sumArr(grandIn));
  sv('g-in-forecast',  sumArr(grandForecastIn));
  sv('g-in-fact',      sumArr(grandFactIn));
  sv('g-out-plan',     sumArr(grandOut));
  sv('g-out-forecast', sumArr(grandForecastOut));
  sv('g-out-fact',     sumArr(grandFactOut));
  const ns = sumArr(grandNet), nfcs = sumArr(grandForecastNet), nfs = sumArr(grandFactNet);
  sv('g-net-plan',     ns,   netColor(ns));
  sv('g-net-forecast', nfcs, netColor(nfcs));
  sv('g-net-fact',     nfs,  netColor(nfs));

  const updateRow = (rowId, arrP, arrFC, arrF, colorFnP, colorFnF) => {
    const row = document.getElementById(rowId);
    if (!row) return;
    const planCells     = Array.from(row.querySelectorAll('td.cell-plan.total-cell')).filter(el =>
      !el.classList.contains('sticky-tot-p') && !el.classList.contains('sticky-tot-fc') && !el.classList.contains('sticky-tot-f')
    );
    const forecastCells = Array.from(row.querySelectorAll('td.cell-forecast.total-cell')).filter(el =>
      !el.classList.contains('sticky-tot-p') && !el.classList.contains('sticky-tot-fc') && !el.classList.contains('sticky-tot-f')
    );
    const factCells     = Array.from(row.querySelectorAll('td.cell-fact.total-cell')).filter(el =>
      !el.classList.contains('sticky-tot-p') && !el.classList.contains('sticky-tot-fc') && !el.classList.contains('sticky-tot-f')
    );
    arrP.forEach((v,i) => {
      if (planCells[i]) { planCells[i].textContent = v ? fmt(v) : '—'; if(colorFnP) planCells[i].style.color = colorFnP(v); }
    });
    arrFC.forEach((v,i) => {
      if (forecastCells[i]) { forecastCells[i].textContent = v ? fmt(v) : '—'; if(colorFnP) forecastCells[i].style.color = colorFnP(v); }
    });
    arrF.forEach((v,i) => {
      if (factCells[i]) { factCells[i].textContent = v ? fmt(v) : '—'; if(colorFnF) factCells[i].style.color = colorFnF(v); }
    });
  };

  if (viewDecade) {
    const dec = computeGrandDecTotals(articles, months);
    const flatInP = [], flatInFC = [], flatInF = [];
    const flatOutP = [], flatOutFC = [], flatOutF = [];
    const flatNetP = [], flatNetFC = [], flatNetF = [];
    const flatCumP = [], flatCumFC = [], flatCumF = [];
    months.forEach(({m}, i) => {
      [0,1,2].forEach(d => {
        const di = i*3+d;
        flatInP.push(dec.grandInDec36[di]||0);
        flatInFC.push(dec.grandInFCDec36[di]||0);
        flatInF.push(dec.grandInFDec36[di]||0);
        flatOutP.push(dec.grandOutDec36[di]||0);
        flatOutFC.push(dec.grandOutFCDec36[di]||0);
        flatOutF.push(dec.grandOutFDec36[di]||0);
        flatNetP.push(dec.grandNetDec36[di]||0);
        flatNetFC.push(dec.grandNetFCDec36[di]||0);
        flatNetF.push(dec.grandNetFDec36[di]||0);
        flatCumP.push(dec.cumulDec36[di]||0);
        flatCumFC.push(dec.cumulFCDec36[di]||0);
        flatCumF.push(dec.cumulFDec36[di]||0);
      });
    });
    updateRow('grand-in-row',  flatInP,  flatInFC,  flatInF,  null, null);
    updateRow('grand-out-row', flatOutP, flatOutFC, flatOutF, null, null);
    updateRow('grand-net-row', flatNetP, flatNetFC, flatNetF, netColor, netColor);
    updateRow('grand-cumul-row', flatCumP, flatCumFC, flatCumF, netColor, netColor);
  } else {
    updateRow('grand-in-row',  grandIn,  grandForecastIn,  grandFactIn,  null, null);
    updateRow('grand-out-row', grandOut, grandForecastOut, grandFactOut, null, null);
    updateRow('grand-net-row', grandNet, grandForecastNet, grandFactNet, netColor, netColor);
    updateRow('grand-cumul-row', cumulP, cumulFC, cumulF, netColor, netColor);
  }

  const svC = (id, val) => { const el=document.getElementById(id); if(el){ el.textContent=fmt(val); el.style.color=netColor(val); } };
  svC('g-cumul-plan',     runP);
  svC('g-cumul-forecast', runFC);
  svC('g-cumul-fact',     runF);
}

function openEditModal(idx) {
  const i = (idx !== undefined) ? idx : currentProject;
  const p = projects[i];
  if (!p) return;
  modalMode = 'edit';
  modalEditIndex = i;
  const curYear = new Date().getFullYear();
  pickerState = {
    start: { year: p.start ? p.start.y : curYear, month: p.start ? p.start.m : null },
    end:   { year: p.end   ? p.end.y   : curYear, month: p.end   ? p.end.m   : null }
  };
  selectedType = p.type || null;
  document.getElementById('modal-title').textContent = 'Редактировать проект';
  document.getElementById('btn-create').textContent = 'Сохранить';
  document.getElementById('modal-name').value = p.name;
  // Start label
  if (p.start && p.start.m != null) {
    document.getElementById('start-label').textContent = `${MONTH_NAMES_FULL[p.start.m]} ${p.start.y}`;
    document.getElementById('start-label').className = '';
  } else {
    document.getElementById('start-label').textContent = 'Выберите месяц';
    document.getElementById('start-label').className = 'placeholder';
  }
  // End label
  if (p.end && p.end.m != null) {
    document.getElementById('end-label').textContent = `${MONTH_NAMES_FULL[p.end.m]} ${p.end.y}`;
    document.getElementById('end-label').className = '';
  } else {
    document.getElementById('end-label').textContent = 'Выберите месяц';
    document.getElementById('end-label').className = 'placeholder';
  }
  // Type buttons
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  if (p.type) {
    const tb = document.getElementById('type-' + p.type);
    if (tb) tb.classList.add('active');
  }
  document.getElementById('picker-start').classList.add('hidden');
  document.getElementById('picker-end').classList.add('hidden');
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('modal-name').focus(), 50);
}

function editProject(i) { openEditModal(i); }

function confirmProjectModal() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { document.getElementById('modal-name').focus(); return; }
  // Многолетние проекты разрешены
  const newData = {
    name,
    type: selectedType || null,
    start: pickerState.start.month != null ? {y:pickerState.start.year, m:pickerState.start.month} : null,
    end:   pickerState.end.month   != null ? {y:pickerState.end.year,   m:pickerState.end.month}   : null
  };
  if (modalMode === 'edit' && modalEditIndex !== null) {
    Object.assign(projects[modalEditIndex], newData);
    closeModal();
    saveData();
    renderSidebarProjects();
    renderBudget();
  } else {
    newData.id = genId(); // стабильный id только при создании (в edit-режиме id не трогаем)
    projects.push(newData);
    closeModal();
    currentProject = projects.length - 1;
    // Сразу инициализируем бюджет (по id), чтобы dashboard/computeProjectNet не видели undefined
    if (!budgets[newData.id]) {
      budgets[newData.id] = { articles: [newArticle('Новая статья')] };
    }
    projectsOpen = true;
    saveData();
    renderSidebarProjects();
    showPage('project');
  }
}

/* ---- AUTH ---- */
function showLoginError(msg) {
  const errorEl = document.getElementById('login-error');
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}

function hideLoginError() {
  const errorEl = document.getElementById('login-error');
  errorEl.style.display = 'none';
}

function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  
  if (!email || !password) {
    showLoginError('Заполните email и пароль');
    return;
  }

  window.auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      hideLoginError();
      // Auth state listener (registered once in startApp) handles the UI transition.
      // We just call loadData directly since the user is now signed in.
      window.loadData().then(() => {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-layout').style.display = '';
        window.renderSidebarProjects();
        window.showPage('dashboard');
        console.log('[login] rendered, projects:', projects.length, 'budgets:', Object.keys(budgets));
      });
    })
    .catch(error => {
      let msg = 'Ошибка входа';
      if (error.code === 'auth/user-not-found') msg = 'Пользователь не найден';
      if (error.code === 'auth/wrong-password') msg = 'Неверный пароль';
      if (error.code === 'auth/invalid-email') msg = 'Неверный email';
      showLoginError(msg);
    });
}

function handleRegister() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  
  if (!email || !password) {
    showLoginError('Заполните email и пароль');
    return;
  }

  if (password.length < 6) {
    showLoginError('Пароль должен быть минимум 6 символов');
    return;
  }

  window.auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      hideLoginError();
      window.firebaseUid = window.auth.currentUser.uid;
      var demoY = new Date().getFullYear();
      var pa = { id: genId(), name: 'Проект А', type: 'СМР', start: {y:demoY,m:0}, end: {y:demoY,m:11} };
      var pb = { id: genId(), name: 'Проект Б', type: 'ПИР', start: {y:demoY,m:2}, end: {y:demoY,m:8} };
      projects = [pa, pb];
      currentProject = 0;
      budgets = {};
      budgets[pa.id] = { articles: [ newArticle('Выручка'), newArticle('Зарплата'), newArticle('Аренда') ] };
      budgets[pb.id] = { articles: [ newArticle('Выручка'), newArticle('Подрядчики') ] };
      window.flushSaveData();
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('main-layout').style.display = '';
      window.renderSidebarProjects();
      window.showPage('dashboard');
    })
    .catch(error => {
      let msg = 'Ошибка регистрации';
      if (error.code === 'auth/email-already-in-use') msg = 'Email уже используется';
      if (error.code === 'auth/weak-password') msg = 'Пароль слишком слабый';
      if (error.code === 'auth/invalid-email') msg = 'Неверный email';
      showLoginError(msg);
    });
}

function handleLogout() {
  if (confirm('Вы уверены что хотите выйти?')) {
    window.flushSaveData();
    window.auth.signOut().then(() => {
      window.firebaseUid = null;
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('main-layout').style.display = 'none';
      document.getElementById('login-email').value = '';
      document.getElementById('login-password').value = '';
      hideLoginError();
    });
  }
}

function togglePicker(which) {
  const other = which === 'start' ? 'end' : 'start';
  document.getElementById('picker-'+other).classList.add('hidden');
  const el = document.getElementById('picker-'+which);
  el.classList.toggle('hidden');
  if (!el.classList.contains('hidden')) renderGrid(which);
}
function changeYear(which, delta) {
  pickerState[which].year += delta;
  if (which === 'end' && pickerState.start.month != null &&
      pickerState.end.year < pickerState.start.year) {
    pickerState.end.year = pickerState.start.year;
  }
  renderGrid(which);
}
function renderGrid(which) {
  document.getElementById('year-'+which+'-label').textContent = pickerState[which].year;
  const startSel = pickerState.start.month != null ? {y:pickerState.start.year,m:pickerState.start.month} : null;
  const curYear = pickerState[which].year;
  let html = '';
  for (let m = 0; m < 12; m++) {
    const isSelected = (pickerState[which].month === m);
    let disabled = false;
    if (which === 'end' && startSel) {
      if (curYear*12+m < startSel.y*12+startSel.m) disabled = true;
    }
    html += `<div class="month-cell${isSelected?' selected':''}${disabled?' disabled':''}" onclick="selectMonth('${which}',${m})">${MONTH_NAMES[m]}</div>`;
  }
  document.getElementById('grid-'+which).innerHTML = html;
}
function selectMonth(which, m) {
  pickerState[which].month = m;
  document.getElementById(which+'-label').textContent = `${MONTH_NAMES_FULL[m]} ${pickerState[which].year}`;
  document.getElementById(which+'-label').className = '';
  document.getElementById('picker-'+which).classList.add('hidden');
  if (which === 'start' && pickerState.end.month != null) {
    if (pickerState.end.year*12+pickerState.end.month < pickerState.start.year*12+pickerState.start.month) {
      pickerState.end.month = null;
      document.getElementById('end-label').textContent = 'Выберите месяц';
      document.getElementById('end-label').className = 'placeholder';
    }
  }
}
function selectType(t) {
  selectedType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('type-'+t).classList.add('active');
}
document.addEventListener('click', e => {
  ['start','end'].forEach(w => {
    const wrap = document.getElementById('wrap-'+w);
    if (wrap && !wrap.contains(e.target)) document.getElementById('picker-'+w).classList.add('hidden');
  });
});

/* ---- DRAG-AND-DROP для проектов в сайдбаре ---- */
let _projDragSrc = null;
let _projDragMouseupBound = false;

function _onProjDragMouseup() {
  document.querySelectorAll('.nav-sub-item[draggable="true"]').forEach(el => { el.draggable = false; });
}

function initProjectDrag() {
  const list = document.getElementById('nav-projects-list');
  if (!list) return;

  if (!_projDragMouseupBound) {
    window.addEventListener('mouseup', _onProjDragMouseup);
    _projDragMouseupBound = true;
  }

  list.querySelectorAll('.nav-sub-item').forEach(item => {
    const pi = parseInt(item.dataset.proj);
    const handle = item.querySelector('.proj-drag-handle');
    if (!handle) return;

    handle.addEventListener('mousedown', () => { item.draggable = true; });

    item.addEventListener('dragstart', e => {
      _projDragSrc = pi;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => item.classList.add('dragging-proj'), 0);
    });

    item.addEventListener('dragend', () => {
      _projDragSrc = null;
      list.querySelectorAll('.nav-sub-item').forEach(el => {
        el.classList.remove('dragging-proj', 'drag-over-top', 'drag-over-bottom');
        el.draggable = false;
      });
    });

    item.addEventListener('dragover', e => {
      e.preventDefault();
      if (_projDragSrc === null || _projDragSrc === pi) return;
      list.querySelectorAll('.nav-sub-item').forEach(el =>
        el.classList.remove('drag-over-top', 'drag-over-bottom'));
      const rect = item.getBoundingClientRect();
      item.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
    });

    item.addEventListener('dragleave', e => {
      if (!item.contains(e.relatedTarget))
        item.classList.remove('drag-over-top', 'drag-over-bottom');
    });

    item.addEventListener('drop', e => {
      e.preventDefault();
      if (_projDragSrc === null || _projDragSrc === pi) return;
      const rect = item.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      const srcIdx = _projDragSrc;
      let targetIdx = pi;
      _projDragSrc = null;

      // Запоминаем выбранный проект по id — выделение «поедет» вместе с ним
      const curId = projects[currentProject] ? projects[currentProject].id : null;

      // Переставить проект в массиве. Бюджеты ключуются по id —
      // их трогать не нужно (раньше тут была хрупкая переиндексация).
      const [movedProj] = projects.splice(srcIdx, 1);
      if (srcIdx < targetIdx) targetIdx--;
      projects.splice(before ? targetIdx : targetIdx + 1, 0, movedProj);

      const foundIdx = projects.findIndex(p => p.id === curId);
      currentProject = foundIdx >= 0 ? foundIdx : 0;

      saveData();
      renderSidebarProjects();
      renderBudget();
    });
  });
}

/* ---- DRAG-AND-DROP для статей ---- */
let dragSrcIndex = null;
let _dragMouseupBound = false;

function _onDragMouseup() {
  document.querySelectorAll('tr.article-header[draggable="true"]').forEach(r => { r.draggable = false; });
}

function initArticleDrag() {
  const tbody = document.getElementById('articles-body');
  if (!tbody) return;

  if (!_dragMouseupBound) {
    window.addEventListener('mouseup', _onDragMouseup);
    _dragMouseupBound = true;
  }

  tbody.querySelectorAll('tr.article-header').forEach(headerRow => {
    const ai = parseInt(headerRow.dataset.article);
    const handle = headerRow.querySelector('.drag-handle');
    if (!handle) return;

    handle.addEventListener('mousedown', () => { headerRow.draggable = true; });

    headerRow.addEventListener('dragstart', e => {
      dragSrcIndex = ai;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => {
        tbody.querySelectorAll(`tr[data-article="${ai}"], tr[data-art-child="${ai}"]`)
          .forEach(r => r.classList.add('dragging-article'));
      }, 0);
    });

    headerRow.addEventListener('dragend', () => {
      dragSrcIndex = null;
      tbody.querySelectorAll('.dragging-article').forEach(r => r.classList.remove('dragging-article'));
      tbody.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(r => {
        r.classList.remove('drag-over-top', 'drag-over-bottom');
      });
    });
  });

  tbody.querySelectorAll('tr.article-header').forEach(targetRow => {
    const ai = parseInt(targetRow.dataset.article);

    targetRow.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSrcIndex === null || dragSrcIndex === ai) return;
      tbody.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(r => {
        r.classList.remove('drag-over-top', 'drag-over-bottom');
      });
      const rect = targetRow.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      targetRow.classList.add(before ? 'drag-over-top' : 'drag-over-bottom');
    });

    targetRow.addEventListener('dragleave', e => {
      if (!targetRow.contains(e.relatedTarget)) {
        targetRow.classList.remove('drag-over-top', 'drag-over-bottom');
      }
    });

    targetRow.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIndex === null || dragSrcIndex === ai) return;
      const rect = targetRow.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;

      // Snapshot indices before any mutation (avoids stale dataset.article refs)
      const srcIdx = dragSrcIndex;
      let targetIdx = parseInt(targetRow.dataset.article);

      // Lock further drops until re-render completes
      dragSrcIndex = null;

      const arts = getBudget().articles;
      const [moved] = arts.splice(srcIdx, 1);
      if (srcIdx < targetIdx) targetIdx--;
      arts.splice(before ? targetIdx : targetIdx + 1, 0, moved);

      saveData();
      renderBudget();
    });
  });
}
