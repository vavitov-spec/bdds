<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>БДДС — Планирование бюджета</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;font-size:14px;display:flex;flex-direction:column;height:100vh}
.layout{display:flex;flex:1;overflow:hidden}
.header{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-size:16px;font-weight:500}
.sidebar{width:220px;background:#fff;border-right:1px solid #e5e5e0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:#555;font-size:14px;user-select:none}
.nav-item:hover{background:#f8f8f5}
.nav-item.active{background:#f0f0ec;color:#1a1a18;font-weight:500}
.nav-item .icon{font-size:16px;flex-shrink:0}
.nav-item .label{flex:1}
.nav-toggle{font-size:11px;color:#aaa;transition:transform .2s;display:inline-block}
.nav-toggle.open{transform:rotate(90deg)}
.nav-sub-item{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 42px;cursor:pointer;color:#666;font-size:13px}
.nav-sub-item:hover{background:#f0f0ec;color:#1a1a18}
.nav-sub-item.active{color:#1a1a18;font-weight:500}
.nav-sub-item .dot{width:6px;height:6px;border-radius:50%;background:#ccc;flex-shrink:0}
.nav-sub-item.active .dot{background:#1a1a18}
.nav-add-project{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 42px;cursor:pointer;color:#888;font-size:13px;border-top:1px solid #f0f0ec}
.nav-add-project:hover{color:#1a1a18;background:#f0f0ec}
.main{flex:1;overflow-y:auto;padding:24px}
.page{display:none}
.page.active{display:block}
.add-btn{font-size:13px;padding:6px 14px;cursor:pointer;border-radius:7px;background:#fff;border:1px solid #d5d5d0;color:#555;font-family:inherit}
.add-btn:hover{background:#f5f5f3}
.delete-btn{font-size:11px;padding:2px 7px;cursor:pointer;border-radius:5px;background:none;border:none;color:#bbb;font-family:inherit}
.delete-btn:hover{color:#c0392b;background:#fdf0f0}
.section{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:20px;margin-bottom:16px}
.table-wrap{overflow-x:auto;margin-bottom:12px}
table{border-collapse:separate;border-spacing:0;font-size:13px;white-space:nowrap}
th{text-align:right;font-weight:500;color:#888;padding:4px 6px;border-bottom:2px solid #e5e5e0;white-space:nowrap;font-size:12px}
th.left{text-align:left}
th.month-group{text-align:center;border-left:2px solid #d8d8d0}
td{text-align:right;padding:2px 4px;border-bottom:1px solid #f0f0ec}
td.left{text-align:left}
td.cell-plan{border-left:2px solid #d8d8d0}
td.month-plan-head{border-left:2px solid #d8d8d0}

/* ── STICKY FROZEN COLUMNS ── */
.sticky-name,
td.sticky-name {
  position:sticky; left:0; z-index:3;
  background:#fff;
  min-width:200px; max-width:200px;
  border-right:2px solid #d8d8d0;
}
.sticky-tot-p,
td.sticky-tot-p {
  position:sticky; left:200px; z-index:3;
  background:#eaf4ff;
  min-width:88px; width:88px;
  border-right:1px solid #c5d8ee;
  text-align:right;
}
.sticky-tot-f,
td.sticky-tot-f {
  position:sticky; left:288px; z-index:3;
  background:#eaf8f2;
  min-width:88px; width:88px;
  border-right:2px solid #b0d8c0;
  text-align:right;
}

/* Sticky header bumps z-index so it stays above body sticky cells */
thead th.sticky-name{ z-index:5; background:#fafaf8; }
thead th.sticky-tot-p{ z-index:5; background:#daeeff; }
thead th.sticky-tot-f{ z-index:5; background:#d6f2e6; }
thead th { position:sticky; top:0; z-index:2; background:#fafaf8; }

/* Row-specific overrides for sticky cols */
tr.article-header td.sticky-name { background:#f7f7f4; }
tr.article-header td.sticky-tot-p { background:#e2eefa; }
tr.article-header td.sticky-tot-f { background:#dcf2ea; }
tr.sub-in td.sticky-name { background:#f6fcfa; }
tr.sub-in td.sticky-tot-p { background:#e8f4ff; }
tr.sub-in td.sticky-tot-f { background:#e4f8f0; }
tr.sub-out td.sticky-name { background:#fdf8f6; }
tr.sub-out td.sticky-tot-p { background:#f2eeff; }
tr.sub-out td.sticky-tot-f { background:#fef2ec; }
tr.total-row td.sticky-name { background:#fafaf8; }
tr.total-row td.sticky-tot-p { background:#daeeff; }
tr.total-row td.sticky-tot-f { background:#d6f2e6; }

/* plan/fact cell tint */
td.cell-plan { background:#f5f9ff; }
td.cell-fact { background:#fff8f6; border-right:1px solid #f0e8e4; }

/* Article header row */
tr.article-header td{background:#f7f7f4;border-top:2px solid #e5e5e0;font-weight:600;font-size:13px;color:#1a1a18}
tr.article-header:first-child td{border-top:none}

/* Sub rows */
tr.sub-in td{background:#f6fcfa}
tr.sub-out td{background:#fdf8f6}
td.sub-label{padding-left:32px;color:#666;font-size:12px;font-style:normal}
.sub-type-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500;margin-right:4px;vertical-align:middle}
.tag-in{background:#d4f0e8;color:#0a6e4e}
.tag-out{background:#fde8e4;color:#a33020}

/* Sublines */
tr.subline-in td{background:#f0faf6}
tr.subline-out td{background:#fef5f2}
tr.subline-in td.sticky-name,tr.subline-out td.sticky-name{border-right:2px solid #d8d8d0}
tr.subline-in td.sticky-tot-p{background:#e8f4ff}
tr.subline-in td.sticky-tot-f{background:#e0f5eb}
tr.subline-out td.sticky-tot-p{background:#f2eeff}
tr.subline-out td.sticky-tot-f{background:#fef2ec}
td.subline-label{padding-left:52px;color:#555;font-size:12px}
.subline-name-input{border:none;background:none;font-size:12px;width:120px;color:#555;font-family:inherit;padding:2px 0}
.subline-name-input:focus{outline:none;border-bottom:1px solid #ccc}
tr.add-subline-row td{background:transparent;border-bottom:none}
.add-subline-btn{font-size:11px;padding:3px 10px;cursor:pointer;border-radius:5px;background:none;border:1px dashed #ccc;color:#999;font-family:inherit;margin-left:52px}
.add-subline-btn:hover{border-color:#888;color:#555;background:#fafaf8}
.toggle-btn{background:none;border:none;cursor:pointer;font-size:10px;color:#aaa;padding:0 4px;line-height:1;vertical-align:middle;transition:transform .15s;display:inline-block}
.toggle-btn.open{transform:rotate(90deg)}
.drag-handle{display:inline-block;cursor:grab;color:#ccc;font-size:13px;padding:0 5px 0 0;line-height:1;vertical-align:middle;user-select:none}
.drag-handle:hover{color:#888}
.drag-handle:active{cursor:grabbing}
tr.drag-over-top td{box-shadow:inset 0 2px 0 #4a90d9}
tr.drag-over-bottom td{box-shadow:inset 0 -2px 0 #4a90d9}
tr.dragging-article td{opacity:0.35}
.delete-subline-btn{font-size:10px;padding:1px 5px;cursor:pointer;border-radius:4px;background:none;border:none;color:#ccc;font-family:inherit}
.delete-subline-btn:hover{color:#c0392b;background:#fdf0f0}

/* Total rows */
tr.total-row td{font-weight:600;border-top:2px solid #d8d8d0;background:#fafaf8;color:#555}
tr.net-row td{
  font-weight:600;
  background:#fafaf8;
  color:#555;
  font-size:13px;
  border-top:2px solid #d8d8d0;
}
tr.net-row td.left { color:#555; font-size:13px; font-weight:600; text-transform:none; letter-spacing:normal; }
tr.net-row td.sticky-name { background:#fafaf8; color:#555; }
tr.net-row td.sticky-tot-p { background:#eaf4ff; border-top:2px solid #d8d8d0; color:#1a5fa3; }
tr.net-row td.sticky-tot-f { background:#e4f8f0; border-top:2px solid #d8d8d0; color:#0a6e4e; }
tr.net-row td.cell-plan { background:#f5f9ff; border-top:2px solid #d8d8d0; }
tr.net-row td.cell-fact { background:#f5fdf9; border-top:2px solid #d8d8d0; }

/* Накопительный поток */
tr.cumul-row td {
  font-weight:600;
  background:#f5f0ff;
  color:#3d1a8a;
  padding-top:6px;
  padding-bottom:6px;
  font-size:12px;
  border-top:1px solid #ddd8f5;
}
tr.cumul-row td.sticky-name { background:#ede8ff; color:#3d1a8a; font-size:12px; text-transform:uppercase; letter-spacing:0.02em; font-weight:700; }
tr.cumul-row td.sticky-tot-p { background:#e0d8ff; border-top:1px solid #ddd8f5; color:#3d1a8a; }
tr.cumul-row td.sticky-tot-f { background:#d8f0e8; border-top:1px solid #ddd8f5; color:#0a4e30; }
tr.cumul-row td.cell-plan { background:#f5f0ff; border-top:1px solid #ddd8f5; }
tr.cumul-row td.cell-fact { background:#eef8f4; border-top:1px solid #ddd8f5; }

.month-input{width:90px;text-align:right;font-size:13px;padding:2px 5px;border:1px solid #e0e0d8;border-radius:5px;background:transparent;color:#1a1a18;font-family:inherit}
.month-input:focus{outline:none;border-color:#999;background:#fff}
.row-name-input{border:none;background:none;font-size:13px;width:140px;color:#1a1a18;font-family:inherit;padding:2px 0;font-weight:600}
.row-name-input:focus{outline:none;border-bottom:1px solid #ccc}
.total-cell{min-width:72px;font-weight:600}
.positive{color:#0a6e4e}
.negative{color:#a33020}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:#aaa;gap:12px}
.empty-state .big{font-size:40px}
.empty-state p{font-size:15px}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:14px;padding:28px 28px 24px;width:460px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h2{font-size:17px;font-weight:500;margin-bottom:20px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.field input[type="text"]{width:100%;font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a18}
.field input[type="text"]:focus{outline:none;border-color:#999}

/* MONTH PICKER */
.month-picker-wrap{position:relative}
.month-picker-btn{width:100%;text-align:left;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;font-family:inherit;font-size:14px;color:#1a1a18;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.month-picker-btn:hover{border-color:#aaa}
.month-picker-btn .placeholder{color:#bbb}
.month-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:200;padding:12px}
.month-dropdown.hidden{display:none}
.year-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.year-nav button{background:none;border:none;cursor:pointer;font-size:16px;padding:4px 8px;color:#555;border-radius:5px}
.year-nav button:hover{background:#f0f0ec}
.year-nav span{font-size:14px;font-weight:500}
.months-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.month-cell{padding:7px 4px;text-align:center;font-size:13px;border-radius:6px;cursor:pointer;color:#444;border:1px solid transparent}
.month-cell:hover{background:#f0f0ec}
.month-cell.selected{background:#1a1a18;color:#fff;border-color:#1a1a18}
.month-cell.disabled{color:#ccc;cursor:default;pointer-events:none}

/* TYPE BUTTONS */
.type-btns{display:flex;gap:10px;flex-wrap:wrap}
.type-btn{padding:8px 20px;border-radius:8px;border:1px solid #ddd;background:#fff;font-family:inherit;font-size:14px;color:#555;cursor:pointer;transition:all .15s}
.type-btn:hover{border-color:#aaa;background:#f8f8f5}
.type-btn.active{border-color:#1a1a18;background:#1a1a18;color:#fff;font-weight:500}

/* MODAL FOOTER */
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;border-top:1px solid #f0f0ec;padding-top:18px}
.btn-cancel{padding:8px 18px;border-radius:8px;border:1px solid #ddd;background:#fff;font-family:inherit;font-size:14px;color:#555;cursor:pointer}
.btn-cancel:hover{background:#f5f5f3}
.btn-create{padding:8px 22px;border-radius:8px;border:none;background:#1a1a18;font-family:inherit;font-size:14px;color:#fff;cursor:pointer;font-weight:500}
.btn-create:hover{background:#333}

/* PROJECT BADGE */
.proj-type-badge{font-size:11px;padding:2px 7px;border-radius:5px;background:#f0f0ec;color:#666;margin-left:6px;font-weight:400}

/* VIEW TOGGLE */
.view-btn{font-size:12px;font-weight:500;padding:4px 14px;border:none;border-radius:6px;background:transparent;color:#888;cursor:pointer;font-family:inherit;transition:all .15s}
.view-btn.active{background:#fff;color:#1a1a18;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.view-btn:hover:not(.active){color:#555}

/* Hide plan or fact columns */
table.hide-plan th.month-plan-head,
table.hide-plan td.cell-plan,
table.hide-plan th.sticky-tot-p,
table.hide-plan td.sticky-tot-p { display:none }

table.hide-fact th.month-fact-head,
table.hide-fact td.cell-fact,
table.hide-fact th.sticky-tot-f,
table.hide-fact td.sticky-tot-f { display:none }

/* DASHBOARD TABLE */
#dashboard-table { width:100%; }
#dashboard-table th { text-align:right; font-weight:500; color:#888; padding:5px 8px; border-bottom:2px solid #e5e5e0; font-size:12px; white-space:nowrap; }
#dashboard-table th.left { text-align:left; }
#dashboard-table th.dash-cur-month { background:#fffbe6; color:#7a6000; }
#dashboard-table td { text-align:right; padding:3px 8px; border-bottom:1px solid #f0f0ec; font-size:13px; white-space:nowrap; }
#dashboard-table td.left { text-align:left; }
#dashboard-table td.dash-zero { color:#ccc; }
#dashboard-table td.dash-pos { color:#0a6e4e; }
#dashboard-table td.dash-neg { color:#a33020; }
#dashboard-table td.dash-cur-month { background:#fffbe6; }
#dashboard-table td.dash-out-range { background:#f9f9f7; color:#ccc; }
/* sticky project name col */
#dashboard-table th.dash-sticky,
#dashboard-table td.dash-sticky {
  position:sticky; left:0; z-index:3;
  background:#fff; width:210px; min-width:210px; max-width:210px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  border-right:2px solid #d8d8d0; text-align:left;
}
#dashboard-table thead th.dash-sticky { background:#fafaf8; z-index:5; }
#dashboard-table thead th { position:sticky; top:0; z-index:2; background:#fafaf8; }
/* total rows */
#dashboard-table tr.dash-total td { font-weight:600; background:#fafaf8; border-top:2px solid #d8d8d0; color:#555; }
#dashboard-table tr.dash-total td.dash-sticky { background:#fafaf8; }
#dashboard-table tr.dash-cumul td { font-weight:600; background:#f5f0ff; color:#3d1a8a; border-top:1px solid #ddd8f5; font-size:12px; }
#dashboard-table tr.dash-cumul td.dash-sticky { background:#ede8ff; color:#3d1a8a; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; font-size:12px; }
/* project type badge reuse */
#dashboard-table .proj-badge { font-size:10px; padding:1px 6px; border-radius:4px; background:#f0f0ec; color:#888; margin-left:6px; font-weight:400; }
</style>
</head>
<body>

<div class="header">
  <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="2" y="4" width="16" height="13" rx="2" stroke="#1a1a18" stroke-width="1.3"/><path d="M6 8h8M6 11h5" stroke="#1a1a18" stroke-width="1.3" stroke-linecap="round"/></svg>
  <h1>БДДС — Бюджет движения денежных средств</h1>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="nav-item" id="nav-dashboard" onclick="showPage('dashboard')">
      <span class="icon">📊</span><span class="label">Дашборд</span>
    </div>
    <div class="nav-item active" id="nav-projects" onclick="toggleProjectsMenu()">
      <span class="icon">📁</span><span class="label">Проекты</span>
      <span class="nav-toggle open" id="projects-toggle">▶</span>
    </div>
    <div id="projects-submenu">
      <div id="nav-projects-list"></div>
      <div class="nav-add-project" onclick="openAddModal()">
        <span style="font-size:15px;line-height:1">+</span>
        <span>Добавить проект</span>
      </div>
    </div>
    <div class="nav-item" id="nav-payments" onclick="showPage('payments')">
      <span class="icon">💳</span><span class="label">Платежи</span>
    </div>
  </div>

  <div class="main">
    <div class="page" id="page-dashboard">
      <div style="margin-bottom:20px"><div style="font-size:20px;font-weight:500;margin-bottom:4px">Дашборд</div><div style="font-size:13px;color:#aaa" id="dashboard-year-label"></div></div><div class="section"><div style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:14px">Чистый денежный поток по проектам — план</div><div class="table-wrap"><table id="dashboard-table"><thead id="dashboard-thead"></thead><tbody id="dashboard-body"></tbody></table></div></div><div class="section" style="margin-top:0"><div style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:14px">Накопительный денежный поток — план</div><canvas id="cumul-chart" style="width:100%;display:block"></canvas></div>
    </div>

    <div class="page" id="page-project">
      <div style="margin-bottom:20px;display:flex;align-items:baseline;gap:10px">
        <div id="project-page-title" style="font-size:20px;font-weight:500"></div>
        <div id="project-page-meta" style="font-size:13px;color:#aaa"></div>
      </div>
      <div class="section">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <span style="font-size:12px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.05em">Вид:</span>
          <div style="display:flex;gap:4px;background:#f0f0ec;border-radius:8px;padding:3px">
            <button id="view-btn-plan" class="view-btn active" onclick="toggleView('plan')">План</button>
            <button id="view-btn-fact" class="view-btn" onclick="toggleView('fact')">Факт</button>
          </div>
        </div>
        <div class="table-wrap">
          <table id="main-table">
            <thead id="main-thead"></thead>
            <tbody id="articles-body"></tbody>
          </table>
        </div>
        <button class="add-btn" onclick="addArticle()">+ Добавить статью</button>
      </div>
    </div>

    <div class="page" id="page-payments">
      <div class="empty-state"><div class="big">💳</div><p>Платежи — раздел в разработке</p></div>
    </div>
  </div>
</div>

<!-- ADD PROJECT MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Новый проект</h2>

    <div class="field">
      <label>Название проекта</label>
      <input type="text" id="modal-name" placeholder="Введите название...">
    </div>

    <div class="field">
      <label>Дата начала</label>
      <div class="month-picker-wrap" id="wrap-start">
        <button class="month-picker-btn" onclick="togglePicker('start')">
          <span id="start-label" class="placeholder">Выберите месяц</span>
          <span style="color:#bbb;font-size:12px">▼</span>
        </button>
        <div class="month-dropdown hidden" id="picker-start">
          <div class="year-nav">
            <button onclick="changeYear('start',-1)">&#8249;</button>
            <span id="year-start-label">2025</span>
            <button onclick="changeYear('start',1)">&#8250;</button>
          </div>
          <div class="months-grid" id="grid-start"></div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Дата окончания</label>
      <div class="month-picker-wrap" id="wrap-end">
        <button class="month-picker-btn" onclick="togglePicker('end')">
          <span id="end-label" class="placeholder">Выберите месяц</span>
          <span style="color:#bbb;font-size:12px">▼</span>
        </button>
        <div class="month-dropdown hidden" id="picker-end">
          <div class="year-nav">
            <button onclick="changeYear('end',-1)">&#8249;</button>
            <span id="year-end-label">2025</span>
            <button onclick="changeYear('end',1)">&#8250;</button>
          </div>
          <div class="months-grid" id="grid-end"></div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Тип проекта</label>
      <div class="type-btns">
        <button class="type-btn" onclick="selectType('ПИР')" id="type-ПИР">ПИР</button>

<script>
const MONTHS_COUNT = 12;
const MONTH_NAMES = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MONTH_NAMES_FULL = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

// Data model
// article.inDirect  — true: данные вбиваются прямо в строку (plan/fact), подстрок нет
// article.outDirect — то же для выплат
// article.inPlan[12] / article.inFact[12]   — прямые данные поступлений
// article.outPlan[12] / article.outFact[12] — прямые данные выплат
// article.inLines[]  — подстроки поступлений (только когда inDirect=false)
// article.outLines[] — подстроки выплат     (только когда outDirect=false)
// article.inOpen / article.outOpen — раскрыто ли (актуально только в режиме подстрок)
function newLine(name) {
  return { name: name || '', plan: Array(MONTHS_COUNT).fill(0), fact: Array(MONTHS_COUNT).fill(0) };
}
function newArticle(name) {
  return {
    name: name || 'Новая статья',
    inDirect: true,  outDirect: true,
    inOpen:   true,  outOpen:   true,
    inPlan:  Array(MONTHS_COUNT).fill(0), inFact:  Array(MONTHS_COUNT).fill(0),
    outPlan: Array(MONTHS_COUNT).fill(0), outFact: Array(MONTHS_COUNT).fill(0),
    inLines:  [],
    outLines: []
  };
}
// Вернуть суммарный массив [12] для секции (direct или lines)
// field = 'plan' или 'fact' (строчные)
function sectionSum(art, section, field) {
  if (art[section + 'Direct']) {
    // прямые поля: inPlan, inFact, outPlan, outFact
    const key = section + field.charAt(0).toUpperCase() + field.slice(1);
    const arr = art[key];
    return Array.isArray(arr) ? arr.slice() : Array(MONTHS_COUNT).fill(0);
  }
  return sumLines(art[section + 'Lines'], field);
}
// Суммировать подстроки в массив по 12 месяцам
function sumLines(lines, field) {
  const res = Array(MONTHS_COUNT).fill(0);
  lines.forEach(l => l[field].forEach((v,i) => res[i] += v || 0));
  return res;
}

const STORAGE_KEY = 'bdds_data';

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects, budgets, currentProject }));
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d.projects || !d.budgets) return false;
    projects = d.projects;
    budgets = d.budgets;
    currentProject = d.currentProject || 0;
    // Migrate old format → new format
    Object.values(budgets).forEach(b => {
      (b.articles || []).forEach(a => {
        // Very old format: flat in/out arrays
        if (a.in !== undefined) {
          a.inLines  = [{ name: 'Поступление 1', plan: a.in,     fact: a.factIn  || Array(MONTHS_COUNT).fill(0) }];
          a.outLines = [{ name: 'Выплата 1',     plan: a.out,    fact: a.factOut || Array(MONTHS_COUNT).fill(0) }];
          delete a.in; delete a.out; delete a.factIn; delete a.factOut;
        }
        // v2.4 format: had inLines[] with ≥1 entry, no inDirect
        if (a.inDirect === undefined) {
          if (a.inLines && a.inLines.length === 1 && sumLines(a.inLines,'plan').every(v=>!v) && sumLines(a.inLines,'fact').every(v=>!v)) {
            // Single empty line → collapse to direct
            a.inPlan  = Array(MONTHS_COUNT).fill(0);
            a.inFact  = Array(MONTHS_COUNT).fill(0);
            a.inLines = [];
            a.inDirect = true;
          } else if (a.inLines && a.inLines.length >= 1) {
            // Has real data in lines → keep lines mode
            a.inPlan  = Array(MONTHS_COUNT).fill(0);
            a.inFact  = Array(MONTHS_COUNT).fill(0);
            a.inDirect = false;
          } else {
            a.inPlan   = Array(MONTHS_COUNT).fill(0);
            a.inFact   = Array(MONTHS_COUNT).fill(0);
            a.inLines  = a.inLines || [];
            a.inDirect = true;
          }
        }
        if (a.outDirect === undefined) {
          if (a.outLines && a.outLines.length === 1 && sumLines(a.outLines,'plan').every(v=>!v) && sumLines(a.outLines,'fact').every(v=>!v)) {
            a.outPlan  = Array(MONTHS_COUNT).fill(0);
            a.outFact  = Array(MONTHS_COUNT).fill(0);
            a.outLines = [];
            a.outDirect = true;
          } else if (a.outLines && a.outLines.length >= 1) {
            a.outPlan  = Array(MONTHS_COUNT).fill(0);
            a.outFact  = Array(MONTHS_COUNT).fill(0);
            a.outDirect = false;
          } else {
            a.outPlan   = Array(MONTHS_COUNT).fill(0);
            a.outFact   = Array(MONTHS_COUNT).fill(0);
            a.outLines  = a.outLines || [];
            a.outDirect = true;
          }
        }
        if (a.inOpen  === undefined) a.inOpen  = true;
        if (a.outOpen === undefined) a.outOpen = true;
      });
    });
    return true;
  } catch(e) { return false; }
}

let projects, budgets, currentProject;

if (!loadData()) {
  // Default data on first launch
  projects = [
    { name: 'Проект А', type: 'СМР', start: {y:2025,m:0}, end: {y:2025,m:11} },

  };
}

let projectsOpen = true;
let pickerState = { start:{year:new Date().getFullYear(),month:null}, end:{year:new Date().getFullYear(),month:null} };
let selectedType = null;

function fmt(n) { return Math.round(n).toLocaleString('ru-RU'); }
function netColor(v) { return v >= 0 ? '#0a6e4e' : '#a33020'; }
function sumArr(a) { return a.reduce((s,v) => s+v, 0); }
function esc(s) { return String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"'); }

  if (currentProject >= projects.length) currentProject = projects.length - 1;

/* ---- DASHBOARD ---- */
function computeProjectNet12(pi) {
  // Returns array[12] of net plan for calendar months 0-11 for project pi
  const b = budgets[pi];
  if (!b || !b.articles) return Array(12).fill(0);
  const net12 = Array(12).fill(0);
  b.articles.forEach(a => {
    const inPlan  = sectionSum(a, 'in',  'plan');
    const outPlan = sectionSum(a, 'out', 'plan');
    for (let m = 0; m < 12; m++) {
      net12[m] += (inPlan[m] || 0) - (outPlan[m] || 0);
    }
  });
  // Zero out months outside project range
  const p = projects[pi];
  if (p && p.start && p.end && p.start.m != null && p.end.m != null) {
    for (let m = 0; m < 12; m++) {
      const key = p.start.y === p.end.y
        ? (m < p.start.m || m > p.end.m)
        : false; // cross-year: don't zero (current year slice handled below)
      if (p.start.y === new Date().getFullYear() && p.end.y === new Date().getFullYear()) {
        if (m < p.start.m || m > p.end.m) net12[m] = null; // out of range
      } else {
        // project spans years — show months of current year that are in range
        const curY = new Date().getFullYear();
        const startKey = p.start.y * 12 + p.start.m;
        const endKey   = p.end.y   * 12 + p.end.m;
        const mKey = curY * 12 + m;
        if (mKey < startKey || mKey > endKey) net12[m] = null;
      }
    }
  }
  return net12;
}

function renderDashboard() {
  const curY = new Date().getFullYear();
  const curM = new Date().getMonth();
  document.getElementById('dashboard-year-label').textContent = curY + ' год';

  const MNAMES = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];

  // Build header
  let thead = '<tr>';
  thead += '<th class="dash-sticky">Проект</th>';
  for (let m = 0; m < 12; m++) {
    thead += `<th${m === curM ? ' class="dash-cur-month"' : ''}>${MNAMES[m]}</th>`;
  }
  thead += '</tr>';
  document.getElementById('dashboard-thead').innerHTML = thead;

  // Per-project nets (array of 12)
  const projectNets = projects.map((p, pi) => computeProjectNet12(pi));

  // Company totals (sum of all projects, null = no data → 0 for total)
  const companyNet = Array(12).fill(0);
  projectNets.forEach(net12 => {
    for (let m = 0; m < 12; m++) {
      companyNet[m] += net12[m] || 0;
    }
  });

  // Cumulative
  const cumul = [];
  let run = 0;
  for (let m = 0; m < 12; m++) {
    run += companyNet[m];
    cumul.push(run);
  }

  const fmtD = (v) => v === null ? '' : (v === 0 ? '—' : Math.round(v).toLocaleString('ru-RU'));
  const cellClass = (v, outRange, isCurM) => {
    const cls = [];
    if (outRange) { cls.push('dash-out-range'); }
    else if (v === null || v === 0) { cls.push('dash-zero'); }
    else if (v > 0) { cls.push('dash-pos'); }
    else { cls.push('dash-neg'); }
    if (isCurM) cls.push('dash-cur-month');
    return cls.join(' ');
  };

  let tbody = '';

  projects.forEach((p, pi) => {
    const net12 = projectNets[pi];
    tbody += '<tr>';
    const badge = p.type ? `<span class="proj-badge">${p.type}</span>` : '';
    tbody += `<td class="dash-sticky left">${esc(p.name)}${badge}</td>`;
    for (let m = 0; m < 12; m++) {
      const v = net12[m];
      const outRange = v === null;
      tbody += `<td class="${cellClass(v, outRange, m === curM)}">${outRange ? '' : fmtD(v)}</td>`;
    }
    tbody += '</tr>';
  });

  // Company total row
  tbody += '<tr class="dash-total">';
  tbody += '<td class="dash-sticky left">Денежный поток компании</td>';
  for (let m = 0; m < 12; m++) {
    const v = companyNet[m];
    const cls = ['dash-total'];
    if (m === curM) cls.push('dash-cur-month');
    const color = v > 0 ? '#0a6e4e' : v < 0 ? '#a33020' : '#999';
    tbody += `<td class="${m === curM ? 'dash-cur-month' : ''}" style="color:${color}">${fmtD(v)}</td>`;
  }
  tbody += '</tr>';

  // Cumulative row
  tbody += '<tr class="dash-cumul">';
  tbody += '<td class="dash-sticky left">Накопительно</td>';
  for (let m = 0; m < 12; m++) {
    const v = cumul[m];
    const color = v > 0 ? '#3d1a8a' : v < 0 ? '#a33020' : '#999';
    tbody += `<td class="${m === curM ? 'dash-cur-month' : ''}" style="color:${color}">${fmtD(v)}</td>`;
  }
  tbody += '</tr>';

  document.getElementById('dashboard-body').innerHTML = tbody;
  // Defer chart until layout is painted so getBoundingClientRect is accurate
  requestAnimationFrame(() => renderCumulChart(cumul, curM));
}


/* ---- CUMULATIVE CHART ---- */
function renderCumulChart(cumul, curM) {
  const canvas = document.getElementById('cumul-chart');
  if (!canvas) return;

  const dpr = window.devicePixelRatio || 1;

  // ── Read column X-centres from the actual table header cells ──
  const thead = document.getElementById('dashboard-thead');
  const hCells = thead ? Array.from(thead.querySelectorAll('th')) : [];
  // First th is the sticky "Проект" col, then 12 month ths
  const monthThs = hCells.slice(1); // 12 cells
  if (monthThs.length !== 12) return; // table not yet rendered

  const canvasRect = canvas.getBoundingClientRect();
  // x positions of month columns relative to canvas left edge
  const colX = monthThs.map(th => {
    const r = th.getBoundingClientRect();
    return (r.left + r.right) / 2 - canvasRect.left;
  });

  const W = canvas.parentElement.clientWidth || 800;
  const H = 220;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  // Left pad = leftmost column centre, right edge = rightmost centre
  const PAD = { top: 24, right: 0, bottom: 16, left: 0 };
  const cH  = H - PAD.top - PAD.bottom;

  const vals   = cumul;
  const minVal = Math.min(0, ...vals);
  const maxVal = Math.max(0, ...vals);
  const range  = maxVal - minVal || 1;
  const pad    = range * 0.12;
  const vMin   = minVal - pad;
  const vMax   = maxVal + pad;
  const vRange = vMax - vMin;

  // Y axis label area to the left of first column
  const yLabelRight = colX[0] - 8;

  const toX = (m) => colX[m];
  const toY = (v) => PAD.top + (1 - (v - vMin) / vRange) * cH;
  const zeroY = toY(0);

  // ── Grid lines (span full columns range) ─────────────────────
  const xLeft  = colX[0];
  const xRight = colX[11];

  ctx.strokeStyle = '#e8e8e4';
  ctx.lineWidth   = 1;
  const steps = 4;
  for (let i = 0; i <= steps; i++) {
    const v = vMin + (vRange / steps) * i;
    const y = toY(v);
    ctx.beginPath();
    ctx.moveTo(xLeft, y);
    ctx.lineTo(xRight, y);
    ctx.stroke();
    // Y labels
    const lbl = Math.abs(v) >= 1000
      ? (Math.round(v / 100) / 10) + 'k'
      : String(Math.round(v));
    ctx.fillStyle = '#bbb';
    ctx.font = '10px system-ui,sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(lbl, yLabelRight, y + 3.5);
  }

  // ── Zero line ────────────────────────────────────────────────
  ctx.save();
  ctx.strokeStyle = '#888';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(xLeft, zeroY);
  ctx.lineTo(xRight, zeroY);
  ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#888';
  ctx.font = 'bold 10px system-ui,sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('0', yLabelRight, zeroY + 3.5);

  // ── Filled areas ─────────────────────────────────────────────
  function drawFill(color, isAbove) {
    ctx.save();
    ctx.beginPath();
    if (isAbove) ctx.rect(xLeft, PAD.top, xRight - xLeft, zeroY - PAD.top);
    else         ctx.rect(xLeft, zeroY,   xRight - xLeft, PAD.top + cH - zeroY);
    ctx.clip();
    ctx.beginPath();
    ctx.moveTo(toX(0), zeroY);
    for (let m = 0; m < 12; m++) ctx.lineTo(toX(m), toY(vals[m]));
    ctx.lineTo(toX(11), zeroY);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }
  drawFill('rgba(10,110,78,0.10)', true);
  drawFill('rgba(163,48,32,0.10)', false);

  // ── Line with color split at zero ────────────────────────────
  function drawLineFull(color, isAbove) {
    ctx.save();
    ctx.beginPath();
    if (isAbove) ctx.rect(xLeft - 2, PAD.top - 2, xRight - xLeft + 4, zeroY - PAD.top + 2);
    else         ctx.rect(xLeft - 2, zeroY, xRight - xLeft + 4, PAD.top + cH - zeroY + 2);
    ctx.clip();
    ctx.beginPath();
    for (let m = 0; m < 12; m++) {
      if (m === 0) ctx.moveTo(toX(m), toY(vals[m]));
      else         ctx.lineTo(toX(m), toY(vals[m]));
    }
    ctx.strokeStyle = color;
    ctx.lineWidth   = 2.5;
    ctx.lineJoin    = 'round';
    ctx.stroke();
    ctx.restore();
  }
  drawLineFull('#0a6e4e', true);
  drawLineFull('#c0392b', false);

  // ── Current month vertical marker ────────────────────────────
  if (curM >= 0 && curM <= 11) {
    ctx.save();
    ctx.strokeStyle = '#e8a000';
    ctx.lineWidth   = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(toX(curM), PAD.top);
    ctx.lineTo(toX(curM), PAD.top + cH);
    ctx.stroke();
    ctx.restore();
  }

  // ── Dots ─────────────────────────────────────────────────────
  for (let m = 0; m < 12; m++) {
    const v = vals[m], cx = toX(m), cy = toY(v);
    ctx.beginPath();
    ctx.arc(cx, cy, m === curM ? 5 : 3.5, 0, Math.PI * 2);
    ctx.fillStyle = v >= 0 ? '#0a6e4e' : '#c0392b';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── Value labels ─────────────────────────────────────────────
  ctx.textAlign = 'center';
  for (let m = 0; m < 12; m++) {
    const v = vals[m];
    if (v === 0) continue;
    const cx = toX(m), cy = toY(v);
    const lbl = Math.abs(v) >= 1000
      ? (Math.round(v / 100) / 10) + 'k'
      : String(Math.round(v));
    ctx.fillStyle = v >= 0 ? '#0a6e4e' : '#c0392b';
    ctx.font = '10px system-ui,sans-serif';
    ctx.fillText(lbl, cx, v >= 0 ? cy - 8 : cy + 15);
  }
}


function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (name === 'dashboard') {
    document.getElementById('page-dashboard').classList.add('active');
    document.getElementById('nav-dashboard').classList.add('active');
    renderDashboard();
  } else if (name === 'payments') {
    document.getElementById('page-payments').classList.add('active');
    document.getElementById('nav-payments').classList.add('active');
  } else {
    document.getElementById('page-project').classList.add('active');
    document.getElementById('nav-projects').classList.add('active');
    renderSidebarProjects();
    renderBudget();
  }
}

/* ---- PROJECT MONTHS ---- */
// Returns array of {y, m} for the current project's date range.
// Falls back to all 12 months of current year if dates not set.
function getProjectMonths() {
  const p = projects[currentProject];
  if (p && p.start && p.end &&
      p.start.m != null && p.end.m != null) {
    const months = [];
    let y = p.start.y, m = p.start.m;
    const endKey = p.end.y * 12 + p.end.m;
    while (y * 12 + m <= endKey) {
      months.push({ y, m });
      m++;
      if (m > 11) { m = 0; y++; }
    }
    return months.length ? months : _allMonths();
  }
  return _allMonths();
}
function _allMonths() {
  const y = new Date().getFullYear();
  return Array.from({length: 12}, (_,m) => ({y, m}));
}

/* ---- SHARED TOTALS COMPUTATION ---- */
function computeGrandTotals(articles) {
  const months = getProjectMonths();
  const MC = months.length;

  /* Build a lookup: pos12[m] = index in months[] for calendar month m (0-11) */
  const pos12 = Array(12).fill(null);
  months.forEach(({m}, i) => { pos12[m] = i; });

  const grandIn12      = Array(12).fill(0);
  const grandOut12    = Array(12).fill(0);
  const grandFactIn12 = Array(12).fill(0);
  const grandFactOut12= Array(12).fill(0);

  articles.forEach(a => {
    const artInPlan   = sectionSum(a, 'in',  'plan');
    const artOutPlan  = sectionSum(a, 'out', 'plan');
    const artInFact   = sectionSum(a, 'in',  'fact');
    const artOutFact  = sectionSum(a, 'out', 'fact');
    months.forEach(({m}) => {
      const p = pos12[m]; // position (0..MC-1)
      grandIn12[m]       += artInPlan[m]  || 0;
      grandOut12[m]      += artOutPlan[m] || 0;
      grandFactIn12[m]   += artInFact[m]  || 0;
      grandFactOut12[m]  += artOutFact[m] || 0;
    });
  });

  /* Extract project-month-sliced arrays for the table */
  const grandIn      = months.map((_,i) => grandIn12[months[i].m]);
  const grandOut     = months.map((_,i) => grandOut12[months[i].m]);
  const grandFactIn  = months.map((_,i) => grandFactIn12[months[i].m]);
  const grandFactOut = months.map((_,i) => grandFactOut12[months[i].m]);
  const grandNet     = grandIn.map((v,i)   => v - grandOut[i]);
  const grandFactNet = grandFactIn.map((v,i)=> v - grandFactOut[i]);

  const cumulP = [], cumulF = [];
  let runP = 0, runF = 0;
  for (let i = 0; i < MC; i++) {
    runP += grandNet[i];
    runF += grandFactNet[i];
    cumulP.push(runP);
    cumulF.push(runF);
  }
  return { grandIn, grandOut, grandFactIn, grandFactOut, grandNet, grandFactNet, cumulP, cumulF, runP, runF, months, MC };
}

/* ---- BUDGET TABLE ---- */
function renderBudget() {
  const p = projects[currentProject];
  document.getElementById('project-page-title').textContent = p.name;
  let meta = '';
  if (p.type) meta += p.type;
  if (p.start && p.end) meta += (meta ? ' · ' : '') + `${MONTH_NAMES_FULL[p.start.m]} ${p.start.y} — ${MONTH_NAMES_FULL[p.end.m]} ${p.end.y}`;
  document.getElementById('project-page-meta').textContent = meta;

  const b = getBudget();
  const articles = b.articles;

  // Compute grand totals (includes months/MC)
  const { grandIn, grandOut, grandFactIn, grandFactOut, grandNet, grandFactNet,
          cumulP, cumulF, runP, runF, months, MC } = computeGrandTotals(articles);

  // ---- RENDER THEAD ----
  const monthGroupHeaders = months.map(({y, m}) =>
    `<th class="month-group" colspan="2">${MONTH_NAMES[m]}<br><small style="font-weight:400;font-size:10px;color:#aaa">${y}</small></th>`
  ).join('');
  const planFactSubHeaders = months.map(() =>
    `<th class="month-plan-head" style="color:#0a6e4e;font-size:10px;background:#eaf4ff">план</th>` +
    `<th class="month-fact-head" style="color:#a33020;font-size:10px;background:#fff8f6">факт</th>`
  ).join('');
  document.getElementById('main-thead').innerHTML = `
    <tr>
      <th class="left sticky-name" rowspan="2" style="min-width:200px">Статья</th>
      <th class="sticky-tot-p" style="background:#daeeff;color:#1a5fa3;min-width:88px" rowspan="2">Итого<br><small style="font-weight:400">план</small></th>
      <th class="sticky-tot-f" style="background:#d6f2e6;color:#0a6e4e;min-width:88px" rowspan="2">Итого<br><small style="font-weight:400">факт</small></th>
      ${monthGroupHeaders}
    </tr>
    <tr>${planFactSubHeaders}</tr>`;

  // Restore view-toggle colspans after thead rebuild
  const tbl = document.getElementById('main-table');
  const span = (viewPlan && viewFact) ? 2 : 1;
  tbl.querySelectorAll('th.month-group').forEach(th => th.colSpan = span);

  let html = '';

  articles.forEach((art, ai) => {
    // Aggregate article totals over project months
    const artInPlan  = sectionSum(art, 'in',  'plan');
    const artOutPlan = sectionSum(art, 'out', 'plan');
    const artInFact  = sectionSum(art, 'in',  'fact');
    const artOutFact = sectionSum(art, 'out', 'fact');
    const inTotal     = months.reduce((s,{m}) => s + (artInPlan[m]  || 0), 0);
    const outTotal    = months.reduce((s,{m}) => s + (artOutPlan[m] || 0), 0);
    const factInTotal = months.reduce((s,{m}) => s + (artInFact[m]  || 0), 0);
    const factOutTotal= months.reduce((s,{m}) => s + (artOutFact[m] || 0), 0);

    // ---- Article header row ----
    html += `<tr class="article-header" data-article="${ai}">
      <td class="left sticky-name" colspan="1">
        <span class="drag-handle" title="Перетащить статью">⠿</span>
        <input class="row-name-input" value="${esc(art.name)}" onchange="renameArticle(${ai},this.value)">
        <button class="delete-btn" style="margin-left:6px" onclick="deleteArticle(${ai})">✕</button>
      </td>
      <td class="sticky-tot-p"></td>
      <td class="sticky-tot-f"></td>
      <td colspan="${MC * 2}"></td>
    </tr>`;

    // ---- Helper: render one section (in or out) ----
    const renderSection = (section) => {
      const isIn   = section === 'in';
      const direct = art[section + 'Direct'];
      const plan   = isIn ? artInPlan  : artOutPlan;
      const fact   = isIn ? artInFact  : artOutFact;
      const total  = isIn ? inTotal    : outTotal;
      const fTotal = isIn ? factInTotal: factOutTotal;
      const colorP = isIn ? '#0a6e4e'  : '#a33020';
      const tagCls = isIn ? 'tag-in'   : 'tag-out';
      const tagTxt = isIn ? '▲ Поступление' : '▼ Выплата';
      const subCls = isIn ? 'sub-in'   : 'sub-out';
      const bgAdd  = isIn ? '#f6fcfa'  : '#fdf8f6';
      const btnTxt = isIn ? '+ подстроку поступления' : '+ подстроку выплаты';

      if (direct) {
        // ── DIRECT MODE: inpuты прямо в строке поступления/выплаты ──
        const directCells = months.map(({m: mi}, mIdx) => {
          const vp = art[section + 'Plan'][mi] || 0;
          const vf = art[section + 'Fact'][mi] || 0;
          return `<td class="cell-plan"><input class="month-input" type="text" inputmode="numeric"
              value="${vp ? fmt(vp) : ''}" placeholder="0"
              onfocus="inputFocus(this)"
              onblur="directBlur(this,${ai},'${section}','plan',${mi})"
              onkeydown="directKeydown(event,this,${ai},'${section}','plan',${mi})"
              oninput="directInput(${ai},'${section}','plan',${mi},this.value)"></td>` +
            `<td class="cell-fact"><input class="month-input" type="text" inputmode="numeric"
              value="${vf ? fmt(vf) : ''}" placeholder="0"
              style="color:${colorP}"
              onfocus="inputFocus(this)"
              onblur="directBlur(this,${ai},'${section}','fact',${mi})"
              onkeydown="directKeydown(event,this,${ai},'${section}','fact',${mi})"
              oninput="directInput(${ai},'${section}','fact',${mi},this.value)"></td>`;
        }).join('');
        html += `<tr class="${subCls}" data-art-child="${ai}">
          <td class="left sticky-name sub-label">
            <span class="sub-type-tag ${tagCls}">${tagTxt}</span>
            <button class="add-subline-btn" style="margin-left:8px" onclick="addSubline(${ai},'${section}')" title="Разбить на подстроки">+ подстроки</button>
          </td>
          <td class="sticky-tot-p total-cell" style="color:${colorP}" id="art-total-${isIn?'in':'out'}-${ai}">${total ? fmt(total) : '—'}</td>
          <td class="sticky-tot-f total-cell" style="color:${colorP}" id="art-total-${isIn?'factin':'factout'}-${ai}">${fTotal ? fmt(fTotal) : '—'}</td>
          ${directCells}
        </tr>`;
      } else {
        // ── LINES MODE: агрегирующая строка + подстроки ──
        const sumCells = months.map(({m: mi}, mIdx) => {
          const vp = plan[mi] || 0, vf = fact[mi] || 0;
          return `<td class="cell-plan total-cell" style="color:${colorP}" id="art-${isIn?'in':'out'}-plan-${ai}-${mIdx}">${vp ? fmt(vp) : '—'}</td>` +
                 `<td class="cell-fact total-cell" style="color:${colorP}" id="art-${isIn?'in':'out'}-fact-${ai}-${mIdx}">${vf ? fmt(vf) : '—'}</td>`;
        }).join('');
        html += `<tr class="${subCls}" data-art-child="${ai}">
          <td class="left sticky-name sub-label">
            <button class="toggle-btn${art[section+'Open']?' open':''}" onclick="toggleSection(${ai},'${section}')" title="Раскрыть/скрыть">▶</button>
            <span class="sub-type-tag ${tagCls}">${tagTxt}</span>
          </td>
          <td class="sticky-tot-p total-cell" style="color:${colorP}" id="art-total-${isIn?'in':'out'}-${ai}">${total ? fmt(total) : '—'}</td>
          <td class="sticky-tot-f total-cell" style="color:${colorP}" id="art-total-${isIn?'factin':'factout'}-${ai}">${fTotal ? fmt(fTotal) : '—'}</td>
          ${sumCells}
        </tr>`;

        if (art[section + 'Open']) {
          art[section + 'Lines'].forEach((line, li) => {
            const lineCells = months.map(({m: mi}) => {
              const vp = line.plan[mi] || 0, vf = line.fact[mi] || 0;
              return `<td class="cell-plan"><input class="month-input" type="text" inputmode="numeric"
                  value="${vp ? fmt(vp) : ''}" placeholder="0"
                  onfocus="inputFocus(this)"
                  onblur="sublineBlur(this,${ai},'${section}',${li},'plan',${mi})"
                  onkeydown="sublineKeydown(event,this,${ai},'${section}',${li},'plan',${mi})"
                  oninput="sublineInput(${ai},'${section}',${li},'plan',${mi},this.value)"></td>` +
                `<td class="cell-fact"><input class="month-input" type="text" inputmode="numeric"
                  value="${vf ? fmt(vf) : ''}" placeholder="0"
                  style="color:${colorP}"
                  onfocus="inputFocus(this)"
                  onblur="sublineBlur(this,${ai},'${section}',${li},'fact',${mi})"
                  oninput="sublineInput(${ai},'${section}',${li},'fact',${mi},this.value)"></td>`;
            }).join('');
            const lineTotal  = months.reduce((s,{m}) => s + (line.plan[m]||0), 0);
            const lineFTotal = months.reduce((s,{m}) => s + (line.fact[m]||0), 0);
            const subRowCls  = isIn ? 'subline-in' : 'subline-out';
            html += `<tr class="${subRowCls}" data-art-child="${ai}">
              <td class="left sticky-name subline-label">
                <input class="subline-name-input" value="${esc(line.name)}" placeholder="Название..." onchange="renameSubline(${ai},'${section}',${li},this.value)">
                <button class="delete-subline-btn" onclick="deleteSubline(${ai},'${section}',${li})" title="Удалить">✕</button>
              </td>
              <td class="sticky-tot-p total-cell" style="color:${colorP}">${lineTotal ? fmt(lineTotal) : '—'}</td>
              <td class="sticky-tot-f total-cell" style="color:${colorP}">${lineFTotal ? fmt(lineFTotal) : '—'}</td>
              ${lineCells}
            </tr>`;
          });
          html += `<tr class="add-subline-row" data-art-child="${ai}">
            <td class="sticky-name" style="background:${bgAdd}">
              <button class="add-subline-btn" onclick="addSubline(${ai},'${section}')">${btnTxt}</button>
            </td>
            <td colspan="${MC * 2 + 2}" style="background:${bgAdd}"></td>
          </tr>`;
        }
      }
    };

    renderSection('in');
    renderSection('out');
  });

  // Grand total rows
  const inMonthCells  = grandIn.map((v,i)  => `<td class="total-cell positive cell-plan" id="g-in-plan-m${i}">${fmt(v)}</td><td class="total-cell positive cell-fact" id="g-in-fact-m${i}" style="color:#0a6e4e">${fmt(grandFactIn[i])}</td>`).join('');
  const outMonthCells = grandOut.map((v,i) => `<td class="total-cell negative cell-plan" id="g-out-plan-m${i}">${fmt(v)}</td><td class="total-cell negative cell-fact" id="g-out-fact-m${i}" style="color:#a33020">${fmt(grandFactOut[i])}</td>`).join('');
  const netMonthCells = grandNet.map((v,i) => `<td class="total-cell cell-plan" id="g-net-plan-m${i}" style="color:${netColor(v)}">${fmt(v)}</td><td class="total-cell cell-fact" id="g-net-fact-m${i}" style="color:${netColor(grandFactNet[i])}">${fmt(grandFactNet[i])}</td>`).join('');
  const netSum = sumArr(grandNet);
  const netFactSum = sumArr(grandFactNet);
  const cumulStart = grandNet[0] || 0;  // first month's net = first cumulative

  // Накопительный денежный поток — вычислен в computeGrandTotals
  const cumulMonthCells = cumulP.map((v,i) =>
    `<td class="total-cell cell-plan" id="g-cumul-plan-m${i}" style="color:${netColor(v)}">${fmt(v)}</td><td class="total-cell cell-fact" id="g-cumul-fact-m${i}" style="color:${netColor(cumulF[i])}">${fmt(cumulF[i])}</td>`
  ).join('');

  html += `
    <tr class="total-row" id="grand-in-row">
      <td class="left sticky-name">Итого поступления</td>
      <td class="sticky-tot-p total-cell positive" id="g-in-plan">${fmt(sumArr(grandIn))}</td>
      <td class="sticky-tot-f total-cell positive" id="g-in-fact">${fmt(sumArr(grandFactIn))}</td>
      ${inMonthCells}
    </tr>
    <tr class="total-row" id="grand-out-row">
      <td class="left sticky-name">Итого выплаты</td>
      <td class="sticky-tot-p total-cell negative" id="g-out-plan">${fmt(sumArr(grandOut))}</td>
      <td class="sticky-tot-f total-cell negative" id="g-out-fact">${fmt(sumArr(grandFactOut))}</td>
      ${outMonthCells}
    </tr>
    <tr class="net-row" id="grand-net-row">
      <td class="left sticky-name">Чистый денежный поток</td>
      <td class="sticky-tot-p total-cell" id="g-net-plan" style="color:${netColor(netSum)}">${fmt(netSum)}</td>
      <td class="sticky-tot-f total-cell" id="g-net-fact" style="color:${netColor(netFactSum)}">${fmt(netFactSum)}</td>
      ${netMonthCells}
    </tr>
    <tr class="cumul-row" id="grand-cumul-row">
      <td class="left sticky-name">Накопительно</td>
      <td class="sticky-tot-p total-cell" id="g-cumul-plan" style="color:${netColor(runP)}">${fmt(runP)}</td>
      <td class="sticky-tot-f total-cell" id="g-cumul-fact" style="color:${netColor(runF)}">${fmt(runF)}</td>
      ${cumulMonthCells}
    </tr>`;

  document.getElementById('articles-body').innerHTML = html;
  initArticleDrag();
}

function inputFocus(el) {
  const num = parseFloat(el.value.replace(/\s/g,'').replace(',','.')) || 0;
  el.value = num ? String(num) : '';
  el.select();
}

function parseInput(val) { return parseFloat(val.replace(/\s/g,'').replace(',','.')) || 0; }

/* Прямой ввод (direct mode) */
function directInput(ai, section, field, mi, val) {
  const art = getBudget().articles[ai];
  art[section + field.charAt(0).toUpperCase() + field.slice(1)][mi] = parseInput(val);
  renderTotals();
}
function directBlur(el, ai, section, field, mi) {
  const num = parseInput(el.value);
  const art = getBudget().articles[ai];
  art[section + field.charAt(0).toUpperCase() + field.slice(1)][mi] = num;
  el.value = num ? fmt(num) : '';
  saveData();
  renderTotals();
}
function directKeydown(event, el, ai, section, field, mi) {
  if (event.key === 'Enter') {
    event.preventDefault();
    const num = parseInput(el.value);
    const art = getBudget().articles[ai];
    art[section + field.charAt(0).toUpperCase() + field.slice(1)][mi] = num;
    el.value = num ? fmt(num) : '';
    saveData();
    renderTotals();
    const allInputs = Array.from(document.querySelectorAll('.month-input'));
    const idx = allInputs.indexOf(el);
    if (idx >= 0 && idx + 1 < allInputs.length) allInputs[idx + 1].focus();
  }
}

/* Подстрока: ввод */
function sublineInput(ai, section, li, field, mi, val) {
  const art = getBudget().articles[ai];
  art[section+'Lines'][li][field][mi] = parseInput(val);
  renderTotals();
}
function sublineBlur(el, ai, section, li, field, mi) {
  const num = parseInput(el.value);
  getBudget().articles[ai][section+'Lines'][li][field][mi] = num;
  el.value = num ? fmt(num) : '';
  saveData();
  renderTotals();
}
function sublineKeydown(event, el, ai, section, li, field, mi) {
  if (event.key === 'Enter') {
    event.preventDefault();
    const num = parseInput(el.value);
    getBudget().articles[ai][section+'Lines'][li][field][mi] = num;
    el.value = num ? fmt(num) : '';
    saveData();
    renderTotals();
    const allInputs = Array.from(document.querySelectorAll('.month-input'));
    const idx = allInputs.indexOf(el);
    if (idx >= 0 && idx + 1 < allInputs.length) allInputs[idx + 1].focus();
  }
}

/* Управление подстроками */
function addSubline(ai, section) {
  const art = getBudget().articles[ai];
  if (art[section + 'Direct']) {
    // Переключаемся из direct в lines mode:
    // данные из прямой строки переносим в первую подстроку
    const label = section === 'in' ? 'Поступление 1' : 'Выплата 1';
    const firstLine = newLine(label);
    firstLine.plan = art[section + 'Plan'].slice();
    firstLine.fact = art[section + 'Fact'].slice();
    art[section + 'Lines'] = [firstLine];
    art[section + 'Plan'] = Array(MONTHS_COUNT).fill(0);
    art[section + 'Fact'] = Array(MONTHS_COUNT).fill(0);
    art[section + 'Direct'] = false;
    art[section + 'Open'] = true;
    // Добавляем вторую подстроку сразу
    const label2 = section === 'in' ? 'Поступление 2' : 'Выплата 2';
    art[section + 'Lines'].push(newLine(label2));
  } else {
    const key = section + 'Lines';
    const n = art[key].length + 1;
    const label = section === 'in' ? 'Поступление ' : 'Выплата ';
    art[key].push(newLine(label + n));
  }
  saveData();
  renderBudget();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.subline-name-input');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 30);
}
function deleteSubline(ai, section, li) {
  const art = getBudget().articles[ai];
  const key = section + 'Lines';
  if (art[key].length <= 1) {
    // Последняя подстрока — переносим данные обратно в direct mode
    if (confirm('Удалить подстроки и вернуться к прямому вводу? Данные этой подстроки сохранятся.')) {
      art[section + 'Plan'] = art[key][0].plan.slice();
      art[section + 'Fact'] = art[key][0].fact.slice();
      art[section + 'Lines'] = [];
      art[section + 'Direct'] = true;
      saveData();
      renderBudget();
    }
    return;
  }
  art[key].splice(li, 1);
  saveData();
  renderBudget();
}
function renameSubline(ai, section, li, val) {
  getBudget().articles[ai][section+'Lines'][li].name = val;
  saveData();
}
function toggleSection(ai, section) {
  const art = getBudget().articles[ai];
  const key = section + 'Open';
  art[key] = !art[key];
  saveData();
  renderBudget();
}

function renderTotals() {
  const b = getBudget();
  const articles = b.articles;
  const { grandIn, grandOut, grandFactIn, grandFactOut, grandNet, grandFactNet, cumulP, cumulF, runP, runF, months } = computeGrandTotals(articles);

  // Per-article sticky totals + monthly sub-row cells
  articles.forEach((art, ai) => {
    const artInPlan  = sectionSum(art, 'in',  'plan');
    const artOutPlan = sectionSum(art, 'out', 'plan');
    const artInFact  = sectionSum(art, 'in',  'fact');
    const artOutFact = sectionSum(art, 'out', 'fact');
    const s = (id, val) => { const el=document.getElementById(id); if(el) el.textContent = val ? fmt(val) : '—'; };
    s(`art-total-in-${ai}`,      months.reduce((acc,{m}) => acc + (artInPlan[m]  || 0), 0));
    s(`art-total-out-${ai}`,     months.reduce((acc,{m}) => acc + (artOutPlan[m] || 0), 0));
    s(`art-total-factin-${ai}`,  months.reduce((acc,{m}) => acc + (artInFact[m]  || 0), 0));
    s(`art-total-factout-${ai}`, months.reduce((acc,{m}) => acc + (artOutFact[m] || 0), 0));

    // Monthly cells for in/out sub-rows
    months.forEach(({m}, mi) => {
      const elInP  = document.getElementById(`art-in-plan-${ai}-${mi}`);
      const elInF  = document.getElementById(`art-in-fact-${ai}-${mi}`);
      const elOutP = document.getElementById(`art-out-plan-${ai}-${mi}`);
      const elOutF = document.getElementById(`art-out-fact-${ai}-${mi}`);
      if (elInP)  elInP.textContent  = artInPlan[m]  ? fmt(artInPlan[m])  : '—';
      if (elInF)  elInF.textContent  = artInFact[m]  ? fmt(artInFact[m])  : '—';
      if (elOutP) elOutP.textContent = artOutPlan[m] ? fmt(artOutPlan[m]) : '—';
      if (elOutF) elOutF.textContent = artOutFact[m] ? fmt(artOutFact[m]) : '—';
    });
  });

  // Grand sticky totals
  const sv = (id, val, color) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = fmt(val);
    if (color !== undefined) el.style.color = color;
  };
  sv('g-in-plan',  sumArr(grandIn));
  sv('g-in-fact',  sumArr(grandFactIn));
  sv('g-out-plan', sumArr(grandOut));
  sv('g-out-fact', sumArr(grandFactOut));
  const ns = sumArr(grandNet), nfs = sumArr(grandFactNet);
  sv('g-net-plan', ns,  netColor(ns));
  sv('g-net-fact', nfs, netColor(nfs));

  // Grand month cells (skip sticky col cells — only update month cells)
  const updateRow = (rowId, arrP, arrF, colorFnP, colorFnF) => {
    const row = document.getElementById(rowId);
    if (!row) return;
    // Filter to only td.cell-plan and td.cell-fact that are NOT sticky totals
    const planCells = Array.from(row.querySelectorAll('td.cell-plan.total-cell')).filter(el =>
      !el.classList.contains('sticky-tot-p') && !el.classList.contains('sticky-tot-f')
    );
    const factCells = Array.from(row.querySelectorAll('td.cell-fact.total-cell')).filter(el =>
      !el.classList.contains('sticky-tot-p') && !el.classList.contains('sticky-tot-f')
    );
    arrP.forEach((v,i) => {
      if (planCells[i]) { planCells[i].textContent = fmt(v); if(colorFnP) planCells[i].style.color = colorFnP(v); }
    });
    arrF.forEach((v,i) => {
      if (factCells[i]) { factCells[i].textContent = fmt(v); if(colorFnF) factCells[i].style.color = colorFnF(v); }
    });
  };
  updateRow('grand-in-row',  grandIn,  grandFactIn,  null, null);
  updateRow('grand-out-row', grandOut, grandFactOut, null, null);
  updateRow('grand-net-row', grandNet, grandFactNet, netColor, netColor);

  // Накопительный поток — вычислен в computeGrandTotals
  updateRow('grand-cumul-row', cumulP, cumulF, netColor, netColor);  const svC = (id, val) => { const el=document.getElementById(id); if(el){ el.textContent=fmt(val); el.style.color=netColor(val); } };
  svC('g-cumul-plan', runP);
  svC('g-cumul-fact', runF);
}
function renameArticle(ai, val) {
  getBudget().articles[ai].name = val;
  saveData();
}
function deleteArticle(ai) {
  const arts = getBudget().articles;
  if (arts.length <= 1) { alert('Должна быть хотя бы одна статья.'); return; }
  arts.splice(ai, 1);
  saveData();
  renderBudget();
}
function addArticle() {
  getBudget().articles.push(newArticle('Новая статья'));
  saveData();
  renderBudget();
  // Scroll to bottom and focus new article name
  setTimeout(() => {
    const inputs = document.querySelectorAll('.row-name-input');
    const last = inputs[inputs.length - 1];
    if (last) { last.scrollIntoView({behavior:'smooth',block:'center'}); last.select(); }
  }, 50);
}

/* ---- MODAL ---- */
function openAddModal() {
  pickerState = { start:{year:new Date().getFullYear(),month:null}, end:{year:new Date().getFullYear(),month:null} };
  selectedType = null;
  document.getElementById('modal-name').value = '';
  document.getElementById('start-label').textContent = 'Выберите месяц';
  document.getElementById('start-label').className = 'placeholder';
  document.getElementById('end-label').textContent = 'Выберите месяц';
  document.getElementById('end-label').className = 'placeholder';
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('picker-start').classList.add('hidden');
  document.getElementById('picker-end').classList.add('hidden');
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('modal-name').focus(), 50);
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function togglePicker(which) {
  const other = which === 'start' ? 'end' : 'start';
  document.getElementById('picker-'+other).classList.add('hidden');
  const el = document.getElementById('picker-'+which);
  el.classList.toggle('hidden');
  if (!el.classList.contains('hidden')) renderGrid(which);
}
function changeYear(which, delta) {
  pickerState[which].year += delta;
  renderGrid(which);
}
function renderGrid(which) {
  document.getElementById('year-'+which+'-label').textContent = pickerState[which].year;
  const startSel = pickerState.start.month != null ? {y:pickerState.start.year,m:pickerState.start.month} : null;
  const curYear = pickerState[which].year;
  let html = '';
  for (let m = 0; m < 12; m++) {
    const isSelected = (pickerState[which].month === m);
    let disabled = false;
    if (which === 'end' && startSel) {
      if (curYear*12+m < startSel.y*12+startSel.m) disabled = true;
    }
    html += `<div class="month-cell${isSelected?' selected':''}${disabled?' disabled':''}" onclick="selectMonth('${which}',${m})">${MONTH_NAMES[m]}</div>`;
  }
  document.getElementById('grid-'+which).innerHTML = html;
}
function selectMonth(which, m) {
  pickerState[which].month = m;
  document.getElementById(which+'-label').textContent = `${MONTH_NAMES_FULL[m]} ${pickerState[which].year}`;
  document.getElementById(which+'-label').className = '';
  document.getElementById('picker-'+which).classList.add('hidden');
  if (which === 'start' && pickerState.end.month != null) {
    if (pickerState.end.year*12+pickerState.end.month < pickerState.start.year*12+pickerState.start.month) {
      pickerState.end.month = null;
      document.getElementById('end-label').textContent = 'Выберите месяц';
      document.getElementById('end-label').className = 'placeholder';
    }
  }
}
function selectType(t) {
  selectedType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('type-'+t).classList.add('active');
}
function confirmAddProject() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { document.getElementById('modal-name').focus(); return; }
  projects.push({
    name, type: selectedType || null,
    start: pickerState.start.month != null ? {y:pickerState.start.year,m:pickerState.start.month} : null,
    end:   pickerState.end.month   != null ? {y:pickerState.end.year,  m:pickerState.end.month}   : null
  });
  closeModal();
  currentProject = projects.length - 1;
  projectsOpen = true;
  saveData();
  renderSidebarProjects();
  showPage('project');
}

document.addEventListener('click', e => {
  ['start','end'].forEach(w => {
    const wrap = document.getElementById('wrap-'+w);
    if (wrap && !wrap.contains(e.target)) document.getElementById('picker-'+w).classList.add('hidden');
  });
});

/* INIT */
let viewPlan = true, viewFact = true;

function toggleView(which) {
  if (which === 'plan') viewPlan = !viewPlan;
  if (which === 'fact') viewFact = !viewFact;
  if (!viewPlan && !viewFact) { viewPlan = true; viewFact = true; }

  document.getElementById('view-btn-plan').classList.toggle('active', viewPlan);
  document.getElementById('view-btn-fact').classList.toggle('active', viewFact);

  const tbl = document.getElementById('main-table');
  tbl.classList.toggle('hide-plan', !viewPlan);
  tbl.classList.toggle('hide-fact', !viewFact);

  // Adjust colspan of month group headers
  const span = (viewPlan && viewFact) ? 2 : 1;
  tbl.querySelectorAll('th.month-group').forEach(th => th.colSpan = span);
}

/* ---- DRAG-AND-DROP для статей ---- */
let dragSrcIndex = null;

function initArticleDrag() {
  const tbody = document.getElementById('articles-body');
  if (!tbody) return;

  tbody.querySelectorAll('tr.article-header').forEach(headerRow => {
    const ai = parseInt(headerRow.dataset.article);
    const handle = headerRow.querySelector('.drag-handle');
    if (!handle) return;

    handle.addEventListener('mousedown', () => { headerRow.draggable = true; });
    window.addEventListener('mouseup', () => { headerRow.draggable = false; });

    headerRow.addEventListener('dragstart', e => {
      dragSrcIndex = ai;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => {
        tbody.querySelectorAll(`tr[data-article="${ai}"], tr[data-art-child="${ai}"]`)
          .forEach(r => r.classList.add('dragging-article'));
      }, 0);
    });

    headerRow.addEventListener('dragend', () => {
      dragSrcIndex = null;
      tbody.querySelectorAll('.dragging-article').forEach(r => r.classList.remove('dragging-article'));
      tbody.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(r => {
        r.classList.remove('drag-over-top', 'drag-over-bottom');
      });
    });
  });

  tbody.querySelectorAll('tr.article-header').forEach(targetRow => {
    const ai = parseInt(targetRow.dataset.article);

    targetRow.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSrcIndex === null || dragSrcIndex === ai) return;
      tbody.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(r => {
        r.classList.remove('drag-over-top', 'drag-over-bottom');
      });
      const rect = targetRow.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      targetRow.classList.add(before ? 'drag-over-top' : 'drag-over-bottom');
    });

    targetRow.addEventListener('dragleave', e => {
      if (!targetRow.contains(e.relatedTarget)) {
        targetRow.classList.remove('drag-over-top', 'drag-over-bottom');
      }
    });

    targetRow.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIndex === null || dragSrcIndex === ai) return;
      const rect = targetRow.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;

      const arts = getBudget().articles;
      const [moved] = arts.splice(dragSrcIndex, 1);
      let targetIdx = parseInt(targetRow.dataset.article);
      if (dragSrcIndex < targetIdx) targetIdx--;
      arts.splice(before ? targetIdx : targetIdx + 1, 0, moved);

      saveData();
      renderBudget();
    });
  });
}

renderSidebarProjects();
showPage('dashboard');
</script>
