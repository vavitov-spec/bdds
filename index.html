<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>БДДС — Планирование бюджета</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;font-size:14px;display:flex;flex-direction:column;height:100vh}
.layout{display:flex;flex:1;overflow:hidden}
.header{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-size:16px;font-weight:500}
.sidebar{width:220px;background:#fff;border-right:1px solid #e5e5e0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:#555;font-size:14px;user-select:none}
.nav-item:hover{background:#f8f8f5}
.nav-item.active{background:#f0f0ec;color:#1a1a18;font-weight:500}
.nav-item .icon{font-size:16px;flex-shrink:0}
.nav-item .label{flex:1}
.nav-toggle{font-size:11px;color:#aaa;transition:transform .2s;display:inline-block}
.nav-toggle.open{transform:rotate(90deg)}
.nav-sub-item{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 30px;cursor:pointer;color:#666;font-size:13px;position:relative}
.nav-sub-item:hover{background:#f0f0ec;color:#1a1a18}
.nav-sub-item.active{color:#1a1a18;font-weight:500}
.nav-sub-item .dot{width:6px;height:6px;border-radius:50%;background:#ccc;flex-shrink:0}
.nav-sub-item.active .dot{background:#1a1a18}
.nav-add-project{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 42px;cursor:pointer;color:#888;font-size:13px;border-top:1px solid #f0f0ec}
.nav-add-project:hover{color:#1a1a18;background:#f0f0ec}
.main{flex:1;overflow-y:auto;padding:24px}
.page{display:none}
.page.active{display:block}
.add-btn{font-size:13px;padding:6px 14px;cursor:pointer;border-radius:7px;background:#fff;border:1px solid #d5d5d0;color:#555;font-family:inherit}
.add-btn:hover{background:#f5f5f3}
.delete-btn{font-size:11px;padding:2px 7px;cursor:pointer;border-radius:5px;background:none;border:none;color:#bbb;font-family:inherit}
.delete-btn:hover{color:#c0392b;background:#fdf0f0}
.edit-btn{font-size:11px;padding:2px 7px;cursor:pointer;border-radius:5px;background:none;border:none;color:#666;font-family:inherit}
.edit-btn:hover{color:#1a1a18;background:#f0f0ec}
.section{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:20px;margin-bottom:16px}
.table-wrap{overflow-x:auto;margin-bottom:12px}
table{border-collapse:separate;border-spacing:0;font-size:13px;white-space:nowrap;table-layout:fixed}
th{text-align:right;font-weight:500;color:#888;padding:4px 6px;border-bottom:2px solid #e5e5e0;white-space:nowrap;font-size:12px}
th.left{text-align:left}
th.month-group{text-align:center;border-left:2px solid #d8d8d0}
td{text-align:right;padding:2px 4px;border-bottom:1px solid #f0f0ec}
td.left{text-align:left}
td.cell-plan{border-left:2px solid #d8d8d0}
td.month-plan-head{border-left:2px solid #d8d8d0}

/* ── STICKY FROZEN COLUMNS ── */
.sticky-name,
td.sticky-name {
  position:sticky; left:0; z-index:3;
  background:#fff;
  min-width:200px; max-width:200px;
  border-right:2px solid #d8d8d0;
  vertical-align:middle;
}
.sticky-tot-p,
td.sticky-tot-p {
  position:sticky; left:var(--sticky-tot-p-left, 200px); z-index:3;
  background:#eaf4ff;
  min-width:88px; width:88px;
  border-right:1px solid #c5d8ee;
  text-align:right;
}
.sticky-tot-fc,
td.sticky-tot-fc {
  position:sticky; left:var(--sticky-tot-fc-left, 288px); z-index:3;
  background:#fff8e8;
  min-width:88px; width:88px;
  border-right:1px solid #e8d8a0;
  text-align:right;
}
.sticky-tot-f,
td.sticky-tot-f {
  position:sticky; left:var(--sticky-tot-f-left, 376px); z-index:3;
  background:#eaf8f2;
  min-width:88px; width:88px;
  border-right:2px solid #b0d8c0;
  text-align:right;
}

/* Sticky header bumps z-index so it stays above body sticky cells */
thead th.sticky-name{ z-index:5; background:#fafaf8; }
thead th.sticky-tot-p{ z-index:5; background:#daeeff; text-align:center; }
thead th.sticky-tot-fc{ z-index:5; background:#fff0c0; text-align:center; }
thead th.sticky-tot-f{ z-index:5; background:#d6f2e6; text-align:center; }
thead th { position:sticky; top:0; z-index:2; background:#fafaf8; }

/* Row-specific overrides for sticky cols */
tr.article-header td.sticky-name { background:#f7f7f4; }
tr.article-header td.sticky-tot-p { background:#e2eefa; }
tr.article-header td.sticky-tot-fc { background:#fdf5d8; }
tr.article-header td.sticky-tot-f { background:#dcf2ea; }
tr.sub-in td.sticky-name { background:#f6fcfa; }
tr.sub-in td.sticky-tot-p { background:#e8f4ff; }
tr.sub-in td.sticky-tot-fc { background:#fef8e0; }
tr.sub-in td.sticky-tot-f { background:#e4f8f0; }
tr.sub-out td.sticky-name { background:#fdf8f6; }
tr.sub-out td.sticky-tot-p { background:#f2eeff; }
tr.sub-out td.sticky-tot-fc { background:#fef8e0; }
tr.sub-out td.sticky-tot-f { background:#fef2ec; }
tr.total-row td.sticky-name { background:#fafaf8; }
tr.total-row td.sticky-tot-p { background:#daeeff; }
tr.total-row td.sticky-tot-fc { background:#fff0c0; }
tr.total-row td.sticky-tot-f { background:#d6f2e6; }

/* plan/fact/forecast cell tint */
td.cell-plan { background:#f5f9ff; }
td.cell-forecast { background:#fffbea; border-right:1px solid #f0e8c0; }
td.cell-fact { background:#fff8f6; border-right:1px solid #f0e8e4; }

/* Article header row */
tr.article-header td{background:#f7f7f4;border-top:2px solid #e5e5e0;font-weight:600;font-size:13px;color:#1a1a18}
tr.article-header:first-child td{border-top:none}

/* Sub rows */
tr.sub-in td{background:#f6fcfa}
tr.sub-out td{background:#fdf8f6}
td.sub-label{padding-left:32px;color:#666;font-size:12px;font-style:normal}
.sub-type-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500;margin-right:4px;vertical-align:middle}
.tag-in{background:#d4f0e8;color:#0a6e4e}
.tag-out{background:#fde8e4;color:#a33020}

/* Sublines */
tr.subline-in td{background:#f0faf6}
tr.subline-out td{background:#fef5f2}
tr.subline-in td.sticky-name,tr.subline-out td.sticky-name{border-right:2px solid #d8d8d0}
tr.subline-in td.sticky-tot-p{background:#e8f4ff}
tr.subline-in td.sticky-tot-fc{background:#fef8e0}
tr.subline-in td.sticky-tot-f{background:#e0f5eb}
tr.subline-out td.sticky-tot-p{background:#f2eeff}
tr.subline-out td.sticky-tot-fc{background:#fef8e0}
tr.subline-out td.sticky-tot-f{background:#fef2ec}
td.subline-label{padding-left:52px;color:#555;font-size:12px}
.subline-name-input{border:none;background:none;font-size:12px;width:120px;color:#555;font-family:inherit;padding:2px 0}
.subline-name-input:focus{outline:none;border-bottom:1px solid #ccc}
tr.add-subline-row td{background:transparent;border-bottom:none}
.add-subline-btn{font-size:11px;padding:3px 10px;cursor:pointer;border-radius:5px;background:none;border:1px dashed #ccc;color:#999;font-family:inherit;margin-left:52px}
.add-subline-btn:hover{border-color:#888;color:#555;background:#fafaf8}
.toggle-btn{background:none;border:none;cursor:pointer;font-size:10px;color:#aaa;padding:0 4px;line-height:1;vertical-align:middle;transition:transform .15s;display:inline-block}
.toggle-btn.open{transform:rotate(90deg)}
.drag-handle{display:inline-block;cursor:grab;color:#ccc;font-size:13px;padding:0 5px 0 0;line-height:1;vertical-align:middle;user-select:none}
.drag-handle:hover{color:#888}
.drag-handle:active{cursor:grabbing}
tr.drag-over-top td{box-shadow:inset 0 2px 0 #4a90d9}
tr.drag-over-bottom td{box-shadow:inset 0 -2px 0 #4a90d9}
tr.dragging-article td{opacity:0.35}
.nav-sub-item.drag-over-top{box-shadow:inset 0 2px 0 #4a90d9}
.nav-sub-item.drag-over-bottom{box-shadow:inset 0 -2px 0 #4a90d9}
.nav-sub-item.dragging-proj{opacity:0.35}
.proj-drag-handle{position:absolute;left:14px;top:50%;transform:translateY(-50%);cursor:grab;color:#ccc;font-size:12px;line-height:1;user-select:none}
.proj-drag-handle:hover{color:#888}
.proj-drag-handle:active{cursor:grabbing}
.delete-subline-btn{font-size:10px;padding:1px 5px;cursor:pointer;border-radius:4px;background:none;border:none;color:#ccc;font-family:inherit}
.delete-subline-btn:hover{color:#c0392b;background:#fdf0f0}
.collapse-art-btn{font-size:11px;padding:1px 6px;cursor:pointer;border-radius:4px;background:none;border:1px solid #d0d0c8;color:#888;font-family:inherit;margin-left:6px;line-height:1.4;transition:all .15s}
.collapse-art-btn:hover{border-color:#999;color:#333;background:#f0f0ec}

/* Total rows */
tr.total-row td{font-weight:600;border-top:2px solid #d8d8d0;background:#fafaf8;color:#555}
tr.net-row td{
  font-weight:600;
  background:#fafaf8;
  color:#555;
  font-size:13px;
  border-top:2px solid #d8d8d0;
}
tr.net-row td.left { color:#555; font-size:13px; font-weight:600; text-transform:none; letter-spacing:normal; }
tr.net-row td.sticky-name { background:#fafaf8; color:#555; }
tr.net-row td.sticky-tot-p { background:#eaf4ff; border-top:2px solid #d8d8d0; color:#1a5fa3; }
tr.net-row td.sticky-tot-fc { background:#fff8d0; border-top:2px solid #d8d8d0; color:#7a6000; }
tr.net-row td.sticky-tot-f { background:#e4f8f0; border-top:2px solid #d8d8d0; color:#0a6e4e; }
tr.net-row td.cell-plan { background:#f5f9ff; border-top:2px solid #d8d8d0; }
tr.net-row td.cell-forecast { background:#fffbea; border-top:2px solid #d8d8d0; }
tr.net-row td.cell-fact { background:#f5fdf9; border-top:2px solid #d8d8d0; }

/* Накопительный поток */
tr.cumul-row td {
  font-weight:600;
  background:#ede8ff;
  color:#3d1a8a;
  padding-top:6px;
  padding-bottom:6px;
  font-size:12px;
  border-top:3px double #b0a8d8;
}
tr.cumul-row td.sticky-name { background:#e0d8ff; color:#3d1a8a; font-size:12px; text-transform:uppercase; letter-spacing:0.02em; font-weight:700; border-top:3px double #b0a8d8; }
tr.cumul-row td.sticky-tot-p { background:#d8d0ff; border-top:3px double #b0a8d8; color:#3d1a8a; }
tr.cumul-row td.sticky-tot-fc { background:#fff0b0; border-top:3px double #b0a8d8; color:#5a4000; }
tr.cumul-row td.sticky-tot-f { background:#c8eee0; border-top:3px double #b0a8d8; color:#0a4e30; }
tr.cumul-row td.cell-plan { background:#ede8ff; border-top:3px double #b0a8d8; }
tr.cumul-row td.cell-forecast { background:#fffce0; border-top:3px double #b0a8d8; }
tr.cumul-row td.cell-fact { background:#e4f5ee; border-top:3px double #b0a8d8; }

.month-input{width:90px;text-align:right;font-size:13px;padding:2px 5px;border:1px solid #e0e0d8;border-radius:5px;background:transparent;color:#1a1a18;font-family:inherit}
.month-input:focus{outline:none;border-color:#999;background:#fff}
.row-name-input{border:none;background:none;font-size:13px;width:140px;color:#1a1a18;font-family:inherit;padding:2px 0;font-weight:600}
.row-name-input:focus{outline:none;border-bottom:1px solid #ccc}
.total-cell{min-width:72px;font-weight:600}
.positive{color:#0a6e4e}
.negative{color:#a33020}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:#aaa;gap:12px}
.empty-state .big{font-size:40px}
.empty-state p{font-size:15px}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:14px;padding:28px 28px 24px;width:460px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h2{font-size:17px;font-weight:500;margin-bottom:20px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.field input[type="text"]{width:100%;font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a18}
.field input[type="text"]:focus{outline:none;border-color:#999}

/* MONTH PICKER */
.month-picker-wrap{position:relative}
.month-picker-btn{width:100%;text-align:left;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;font-family:inherit;font-size:14px;color:#1a1a18;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.month-picker-btn:hover{border-color:#aaa}
.month-picker-btn .placeholder{color:#bbb}
.month-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:200;padding:12px}
.month-dropdown.hidden{display:none}
.year-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.year-nav button{background:none;border:none;cursor:pointer;font-size:16px;padding:4px 8px;color:#555;border-radius:5px}
.year-nav button:hover{background:#f0f0ec}
.year-nav span{font-size:14px;font-weight:500}
.months-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.month-cell{padding:7px 4px;text-align:center;font-size:13px;border-radius:6px;cursor:pointer;color:#444;border:1px solid transparent}
.month-cell:hover{background:#f0f0ec}
.month-cell.selected{background:#1a1a18;color:#fff;border-color:#1a1a18}
.month-cell.disabled{color:#ccc;cursor:default;pointer-events:none}

/* TYPE BUTTONS */
.type-btns{display:flex;gap:10px;flex-wrap:wrap}
.type-btn{padding:8px 20px;border-radius:8px;border:1px solid #ddd;background:#fff;font-family:inherit;font-size:14px;color:#555;cursor:pointer;transition:all .15s}
.type-btn:hover{border-color:#aaa;background:#f8f8f5}
.type-btn.active{border-color:#1a1a18;background:#1a1a18;color:#fff;font-weight:500}

/* MODAL FOOTER */
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;border-top:1px solid #f0f0ec;padding-top:18px}
.btn-cancel{padding:8px 18px;border-radius:8px;border:1px solid #ddd;background:#fff;font-family:inherit;font-size:14px;color:#555;cursor:pointer}
.btn-cancel:hover{background:#f5f5f3}
.btn-create{padding:8px 22px;border-radius:8px;border:none;background:#1a1a18;font-family:inherit;font-size:14px;color:#fff;cursor:pointer;font-weight:500}
.btn-create:hover{background:#333}

/* PROJECT BADGE */
.proj-type-badge{font-size:11px;padding:2px 7px;border-radius:5px;background:#f0f0ec;color:#666;margin-left:6px;font-weight:400}

/* VIEW TOGGLE */
.view-btn{font-size:12px;font-weight:500;padding:4px 14px;border:none;border-radius:6px;background:transparent;color:#888;cursor:pointer;font-family:inherit;transition:all .15s}
.view-btn.active{background:#fff;color:#1a1a18;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.view-btn:hover:not(.active){color:#555}

/* Hide plan / budget / fact columns */
table.hide-plan th.month-plan-head,
table.hide-plan td.cell-plan,
table.hide-plan th.sticky-tot-p,
table.hide-plan td.sticky-tot-p,
table.hide-plan th.decade-sub-head.month-plan-head,
table.hide-plan td.cell-dplan { display:none }

table.hide-forecast th.month-forecast-head,
table.hide-forecast td.cell-forecast,
table.hide-forecast th.sticky-tot-fc,
table.hide-forecast td.sticky-tot-fc { display:none }

table.hide-fact th.month-fact-head,
table.hide-fact td.cell-fact,
table.hide-fact th.sticky-tot-f,
table.hide-fact td.sticky-tot-f,
table.hide-fact th.decade-sub-head.month-fact-head,
table.hide-fact td.cell-dfact { display:none }

/* DASHBOARD TABLE */
#dash-scroll-wrap { overflow-x:auto; overflow-y:visible; }
#dashboard-table { width:auto; min-width:100%; table-layout:auto; }
#cumul-chart { display:block; min-width:100%; }
#dashboard-table th { text-align:right; font-weight:500; color:#888; padding:4px 4px; border-bottom:2px solid #e5e5e0; font-size:11px; white-space:nowrap; }
#dashboard-table th.left { text-align:left; }
#dashboard-table th.dash-cur-month { background:#fff0aa; color:#5a3e00; }
#dashboard-table td { text-align:right; padding:3px 4px; border-bottom:1px solid #f0f0ec; font-size:11px; white-space:nowrap; }
#dashboard-table td.left { text-align:left; }
#dashboard-table td.dash-zero { color:#ccc; }
#dashboard-table td.dash-pos { color:#0a6e4e; }
#dashboard-table td.dash-neg { color:#a33020; }
#dashboard-table td.dash-cur-month { background:#fffaee; }
#dashboard-table td.dash-out-range { background:#f9f9f7; color:#ccc; }
/* sticky project name col */
#dashboard-table th.dash-sticky,
#dashboard-table td.dash-sticky {
  position:sticky; left:0; z-index:3;
  background:#fff; width:160px; min-width:160px; max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  border-right:2px solid #d8d8d0; text-align:left; vertical-align:middle;
}
#dashboard-table thead th.dash-sticky { background:#fafaf8; z-index:5; }
#dashboard-table thead th { position:sticky; top:0; z-index:2; background:#fafaf8; }
/* Dashboard decade cells */
#dashboard-table th.dash-dec-group { font-size:11px; font-weight:600; color:#555; background:#f0f0ec; text-align:center; white-space:nowrap; padding:4px 2px; border-right:2px solid #c0c0d0; }
#dashboard-table th.dash-dec-group.dash-cur-month { background:#fff0aa; color:#5a3e00; }
#dashboard-table th.dash-dec-head { font-size:9px; font-weight:500; color:#6677aa; background:#f0f2ff; white-space:nowrap; padding:3px 3px; border-right:2px solid #c8c8e0; }
#dashboard-table th.dash-dec-head:nth-child(3n+2) { border-right:1px solid #d8d8e8; }
#dashboard-table th.dash-dec-head.dash-cur-month { background:#fff0aa; color:#5a3e00; }
#dashboard-table th.dash-dec-head:last-of-type { border-right:none !important; }
#dashboard-table td.dash-dec-cell { font-size:11px; white-space:nowrap; padding:3px 4px; border-bottom:1px solid #f0f0ec; border-right:1px solid #e8e8f0; }
#dashboard-table td.dash-dec-cell:nth-child(3n+4) { border-right:2px solid #b8b8d0; }
#dashboard-table tr:last-child td.dash-dec-cell { border-bottom:none; }
#dashboard-table td.dash-dec-cell.dash-zero { color:#ccc; }
#dashboard-table td.dash-dec-cell.dash-pos { color:#0a6e4e; }
#dashboard-table td.dash-dec-cell.dash-neg { color:#a33020; }
#dashboard-table td.dash-dec-cell.dash-out-range { background:#f9f9f7; color:#ccc; }
#dashboard-table td.dash-dec-cell.dash-cur-month { background:#fffaee; }
#dashboard-table tr.dash-total td.dash-dec-cell { font-weight:600; background:#f8f8f6; border-top:2px solid #c0c0d0; }
#dashboard-table tr.dash-cumul td.dash-dec-cell { background:#f5f0ff; color:#3d1a8a; font-weight:600; border-top:1px solid #ddd8f5; }
/* total rows */
#dashboard-table tr.dash-total td { font-weight:600; background:#fafaf8; border-top:2px solid #d8d8d0; color:#555; }
#dashboard-table tr.dash-total td.dash-sticky { background:#fafaf8; }
#dashboard-table tr.dash-cumul td { font-weight:600; background:#f5f0ff; color:#3d1a8a; border-top:1px solid #ddd8f5; font-size:12px; }
#dashboard-table tr.dash-cumul td.dash-sticky { background:#ede8ff; color:#3d1a8a; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; font-size:12px; }
/* project type badge reuse */
#dashboard-table .proj-badge { font-size:10px; padding:1px 6px; border-radius:4px; background:#f0f0ec; color:#888; margin-left:6px; font-weight:400; }

/* ── DECADE VIEW ── */
.decade-group { font-size:10px !important; font-weight:500 !important; color:#4a5a99 !important; background:#eef0ff !important; text-align:center; white-space:nowrap; padding:3px 4px !important; }
.decade-sub-head { font-size:9px !important; background:#f2f4ff !important; color:#6677aa !important; text-align:center; white-space:nowrap; padding:2px 2px !important; }

<script>
(function() {
  var VER = '10.12.0';
  var scripts = [
    'https://www.gstatic.com/firebasejs/' + VER + '/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/' + VER + '/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/' + VER + '/firebase-firestore-compat.js'
  ];
  function loadNext(i) {
    if (i >= scripts.length) { initFirebase(); return; }
    var s = document.createElement('script');
    s.src = scripts[i];
    s.onload = function() { loadNext(i + 1); };
    s.onerror = function() { console.error('Failed to load Firebase script:', scripts[i]); loadNext(i + 1); };
    document.head.appendChild(s);
  }
  loadNext(0);
})();

function initFirebase() {
  try { firebase.app().delete().catch(function(){}); } catch(e) {}
  firebase.initializeApp({
    apiKey: "AIzaSyDXkHVg3ucKGiG6QF3SFxds7MuTJ95Wx60",
    authDomain: "bdds-1.firebaseapp.com",
    projectId: "bdds-1",
    storageBucket: "bdds-1.firebasestorage.app",
    messagingSenderId: "94953276486",
    appId: "1:94953276486:web:6c2df15276b2ea13cd7647"
  });
  startApp();

  function startApp() {
    window.db    = firebase.firestore();
    window.auth  = firebase.auth();

  // ── Load from Firestore ─────────────────────────────────────────────────
  // loadData reads from Firestore for the currently signed-in user.
  // Uses auth.currentUser directly — no listener accumulation.
  window.loadData = function() {
    return new Promise(function(resolve) {
      var user = window.auth.currentUser;
      if (!user) { resolve(false); return; }
      window.firebaseUid = user.uid;
      window.db.doc('bdds/' + window.firebaseUid).get({ source: 'server' }).then(function(snap) {
        console.log('[loadData] snap.exists=', snap.exists);
        var fbData = snap.exists ? snap.data() : null;
        // Читаем localStorage как резервную копию
        var lsData = null;
        try {
          var raw = localStorage.getItem(_LS_KEY);
          console.log('[loadData] localStorage raw length=', raw ? raw.length : 0);
          if (raw) lsData = JSON.parse(raw);
        } catch(e) { console.warn('[loadData] localStorage read error:', e); }

        // Сравниваем данные из Firebase и localStorage для отладки
        var fbArt0 = fbData && fbData.budgets && fbData.budgets[0] && fbData.budgets[0].articles ? fbData.budgets[0].articles.length : 'n/a';
        var lsArt0 = lsData && lsData.budgets && lsData.budgets[0] && lsData.budgets[0].articles ? lsData.budgets[0].articles.length : 'n/a';
        console.log('[loadData] Firebase budgets[0] articles=', fbArt0, '| localStorage budgets[0] articles=', lsArt0);
        // Логируем первое значение из первой статьи для сравнения
        try {
          var fbV = fbData && fbData.budgets && fbData.budgets[0] && fbData.budgets[0].articles[0] ? JSON.stringify(fbData.budgets[0].articles[0].inDplan||[]).slice(0,60) : 'n/a';
          var lsV = lsData && lsData.budgets && lsData.budgets[0] && lsData.budgets[0].articles[0] ? JSON.stringify(lsData.budgets[0].articles[0].inDplan||[]).slice(0,60) : 'n/a';
          console.log('[loadData] FB inDplan[0..5]=', fbV);
          console.log('[loadData] LS inDplan[0..5]=', lsV);
        } catch(e) {}

        var fbValid = fbData && Array.isArray(fbData.projects) && fbData.projects.length > 0;
        var lsValid = lsData && Array.isArray(lsData.projects) && lsData.projects.length > 0;
        var d = null;
        if (fbValid && lsValid) {
          // Выбираем более свежую версию по updatedAt, а не вслепую localStorage.
          // Это предотвращает перезапись свежих серверных данных устаревшим кэшем
          // (например, после работы с другого устройства).
          var fbT = fbData.updatedAt || 0;
          var lsT = lsData.updatedAt || 0;
          d = lsT > fbT ? lsData : fbData;
          console.log('[loadData] both present, fbT=', fbT, 'lsT=', lsT, '→', d === lsData ? 'localStorage' : 'firebase');
        } else if (fbValid) {
          d = fbData;
        } else if (lsValid) {
          d = lsData;
          console.log('[loadData] Firebase empty, using localStorage cache');
        }

        if (d) {
          projects       = d.projects;
          budgets        = d.budgets || {};
          currentProject = Math.max(0, Math.min(d.currentProject || 0, d.projects.length - 1));
          window.assignProjectIds();
          window.migrateBudgetsToIds();
          window.migrateData();
          // saveData после загрузки убран — чтобы не перезаписывать Firebase загруженными данными
          // (это могло стирать изменения сделанные непосредственно перед refresh)
          console.log('[loadData] loaded OK, projects:', projects.length);
          resolve(true);
          return;
        }
        console.warn('[loadData] no data found, will use demo');
        resolve(false);
      }).catch(function(e) { console.error('[loadData] error:', e); resolve(false); });
    });
  };
  // One-time auth state listener for the initial page load only.
  // Firebase Compat SDK не поддерживает {once:true} — отписываемся вручную.
  var _unsubAuth = window.auth.onAuthStateChanged(function(user) {
    _unsubAuth(); // сразу отписаться, чтобы сработало ровно один раз
    if (user) {
      window.firebaseUid = user.uid;
      window.loadData().then(function() {
        // Если в Firebase данных нет — показываем пустое приложение, ничего не перезаписываем
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-layout').style.display = '';
        window.renderSidebarProjects();
        window.showPage('dashboard');
      });
    } else {
      window.firebaseUid = null;
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('main-layout').style.display = 'none';
    }
  });

  // ── Save to Firestore (debounced) ───────────────────────────────────────
  var _saveTimer = null;
  var _LS_KEY = 'bdds_cache';

  function _setSaveIndicator(state) { // 'saving' | 'saved' | 'error'
    var el = document.getElementById('save-indicator');
    if (!el) return;
    if (state === 'saving') { el.textContent = '⏳ Сохранение…'; el.style.color = '#aaa'; }
    else if (state === 'saved') { el.textContent = '✓ Сохранено'; el.style.color = '#0a6e4e'; setTimeout(function(){ el.textContent=''; }, 2500); }
    else { el.textContent = '⚠ Ошибка сохранения'; el.style.color = '#c0392b'; }
  }

  window.persistDataNow = function() {
    var payload = { projects: projects, budgets: budgets, currentProject: currentProject, updatedAt: Date.now() };
    // Всегда пишем в localStorage немедленно как резервная копия
    try { localStorage.setItem(_LS_KEY, JSON.stringify(payload)); } catch(e) {}
    if (!window.firebaseUid) return;
    _setSaveIndicator('saving');
    window.db.doc('bdds/' + window.firebaseUid).set(payload)
      .then(function() { _setSaveIndicator('saved'); })
      .catch(function(e) { console.error('Save error:', e); _setSaveIndicator('error'); });
  };
  window.flushSaveData = function() {
    clearTimeout(_saveTimer);
    _saveTimer = null;
    window.persistDataNow();
  };
  window.saveData = function() {
    // Немедленно пишем в localStorage, чтобы не потерять при быстром обновлении
    var payload = { projects: projects, budgets: budgets, currentProject: currentProject, updatedAt: Date.now() };
    try {

      localStorage.setItem(_LS_KEY, s);
      console.log('[saveData] wrote localStorage, size=', s.length, 'budgets keys=', Object.keys(budgets));
    } catch(e) { console.error('[saveData] localStorage write FAILED:', e); }
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(window.persistDataNow, 500);
  };
  window.addEventListener('beforeunload', function() { window.flushSaveData(); });

  // ── Helpers ─────────────────────────────────────────────────────────────
  // Одноразовая миграция: если месячные данные есть, а декадные нет —
  // копируем месячное значение в первую декаду (D1). Декадные данные — главные.
  function _migrateMonthlyToDec(monthly, dec) {
    if (!Array.isArray(monthly) || !Array.isArray(dec)) return;
    for (var mi = 0; mi < monthly.length && mi < MONTHS_COUNT; mi++) {
      var v = monthly[mi] || 0;
      if (v !== 0 && (dec[mi*3]||0) === 0 && (dec[mi*3+1]||0) === 0 && (dec[mi*3+2]||0) === 0) {
        dec[mi*3] = v;
      }
    }
  }

  // ── Migrate data ────────────────────────────────────────────────────────
  window.migrateData = function() {
    Object.values(budgets).forEach(function(b) {
      (b.articles || []).forEach(function(a) {
        // Старый формат (поле a.in) → конвертируем в lines
        if (a.in !== undefined) {
          var inDplan  = (Array.isArray(a.inDplan)  && a.inDplan.length  === DEC_COUNT) ? a.inDplan  : Array(DEC_COUNT).fill(0);
          var inDfact  = (Array.isArray(a.inDfact)  && a.inDfact.length  === DEC_COUNT) ? a.inDfact  : Array(DEC_COUNT).fill(0);
          var outDplan = (Array.isArray(a.outDplan) && a.outDplan.length === DEC_COUNT) ? a.outDplan : Array(DEC_COUNT).fill(0);
          var outDfact = (Array.isArray(a.outDfact) && a.outDfact.length === DEC_COUNT) ? a.outDfact : Array(DEC_COUNT).fill(0);
          a.inLines  = [{ name: 'Поступление 1', plan: a.in,  fact: a.factIn  || Array(MONTHS_COUNT).fill(0), dplan: inDplan,  dfact: inDfact  }];
          a.outLines = [{ name: 'Выплата 1',     plan: a.out, fact: a.factOut || Array(MONTHS_COUNT).fill(0), dplan: outDplan, dfact: outDfact }];
          delete a.in; delete a.out; delete a.factIn; delete a.factOut;
        }
        if (a.inDirect  === undefined) a.inDirect  = true;
        if (a.outDirect === undefined) a.outDirect = true;
        if (a.inOpen    === undefined) a.inOpen    = true;
        if (a.outOpen   === undefined) a.outOpen   = true;
        if (a.inDeleted === undefined) a.inDeleted = false;
        // Расширяем декадные массивы до DEC_COUNT
        a.inDplan      = ensureDec(a.inDplan);
        a.inDforecast  = ensureDec(a.inDforecast);
        a.inDfact      = ensureDec(a.inDfact);
        a.outDplan     = ensureDec(a.outDplan);
        a.outDforecast = ensureDec(a.outDforecast);
        a.outDfact     = ensureDec(a.outDfact);
        // Миграция: старые месячные данные → D1 декадных массивов (если декад нет)
        _migrateMonthlyToDec(a.inForecast,  a.inDforecast);
        _migrateMonthlyToDec(a.outForecast, a.outDforecast);
        _migrateMonthlyToDec(a.inPlan,      a.inDplan);
        _migrateMonthlyToDec(a.outPlan,     a.outDplan);
        _migrateMonthlyToDec(a.inFact,      a.inDfact);
        _migrateMonthlyToDec(a.outFact,     a.outDfact);
        // Строки (lines): расширяем декадные массивы и мигрируем месячные
        (a.inLines || []).forEach(function(l) {
          l.dplan     = ensureDec(l.dplan);
          l.dforecast = ensureDec(l.dforecast);
          l.dfact     = ensureDec(l.dfact);
          _migrateMonthlyToDec(l.plan,     l.dplan);
          _migrateMonthlyToDec(l.forecast, l.dforecast);
          _migrateMonthlyToDec(l.fact,     l.dfact);
        });
        (a.outLines || []).forEach(function(l) {
          l.dplan     = ensureDec(l.dplan);
          l.dforecast = ensureDec(l.dforecast);
          l.dfact     = ensureDec(l.dfact);
          _migrateMonthlyToDec(l.plan,     l.dplan);
          _migrateMonthlyToDec(l.forecast, l.dforecast);
          _migrateMonthlyToDec(l.fact,     l.dfact);
        });
        // Декадные массивы — единственный источник истины. После переноса
        // удаляем устаревшие месячные дубликаты (меньше данных, нет рассинхрона).
        delete a.inPlan;  delete a.inForecast;  delete a.inFact;
        delete a.outPlan; delete a.outForecast; delete a.outFact;
        (a.inLines  || []).forEach(function(l) { delete l.plan; delete l.forecast; delete l.fact; });
        (a.outLines || []).forEach(function(l) { delete l.plan; delete l.forecast; delete l.fact; });
      });
    });
  };

  // ── Стабильные ID проектов + перенос бюджетов на ключи-ID (вместо индексов) ──
  window.assignProjectIds = function() {
    (projects || []).forEach(function(p) { if (p && !p.id) p.id = genId(); });
  };
  window.migrateBudgetsToIds = function() {
    var keys = Object.keys(budgets);
    if (!keys.length) return;
    var allNumeric    = keys.every(function(k) { return /^\d+$/.test(k); });
    var alreadyIdKeyed = projects.some(function(p) { return p && p.id && budgets.hasOwnProperty(p.id); });
    if (allNumeric && !alreadyIdKeyed) {
      var newB = {};
      projects.forEach(function(p, i) {
        if (budgets.hasOwnProperty(i)) newB[p.id] = budgets[i];
      });
      budgets = newB;
    }
  };

  } // end startApp()
}
// article.inDirect  — true: данные вбиваются прямо в строку, подстрок нет
// article.outDirect — то же для выплат
// article.inDplan[180] / inDforecast / inDfact — декадные данные поступлений (источник истины)
// article.outDplan[180] / outDforecast / outDfact — то же для выплат
// article.inLines[]  — подстроки поступлений (только когда inDirect=false)
// article.outLines[] — подстроки выплат     (только когда outDirect=false)
// article.inOpen / article.outOpen — раскрыто ли (актуально только в режиме подстрок)
// Генератор стабильного ID проекта (бюджеты ключуются по нему, а не по индексу)
function genId() {
  return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}
function newLine(name) {
  return {
    name: name || '',
    dplan: Array(DEC_COUNT).fill(0), dforecast: Array(DEC_COUNT).fill(0), dfact: Array(DEC_COUNT).fill(0)
  };
}
function newArticle(name) {
  return {
    name: name || 'Новая статья',
    inDirect: true,  outDirect: true,
    inOpen:   true,  outOpen:   true,
    inDeleted: false,
    inDplan:  Array(DEC_COUNT).fill(0),   inDforecast:  Array(DEC_COUNT).fill(0),   inDfact:  Array(DEC_COUNT).fill(0),
    outDplan: Array(DEC_COUNT).fill(0),   outDforecast: Array(DEC_COUNT).fill(0),   outDfact: Array(DEC_COUNT).fill(0),
    inLines:  [],
    outLines: []
  };
}
// Helpers for decade arrays
function ensureDec(arr) {
  if (Array.isArray(arr) && arr.length === DEC_COUNT) return arr;
  // Сохраняем существующие данные при смене размера (например при миграции со старых 36-слотных массивов)
  const base = Array.isArray(arr) ? arr.slice(0, DEC_COUNT) : [];
  while (base.length < DEC_COUNT) base.push(0);
  return base;
}
// Sum three decades of month m (position in project) from a decade array → monthly value
function decSum(arr, m) { return (arr[m*3]||0)+(arr[m*3+1]||0)+(arr[m*3+2]||0); }
// Does month m have data in decade 1 or 2?
function hasExtraDecData(arr36, m) { return (arr36[m*3+1]||0)!==0 || (arr36[m*3+2]||0)!==0; }
// Build monthly [12] array from direct decade [36], summing the three decades
function decToMonthly(arr36) {
  return Array.from({length:MONTHS_COUNT}, (_,m) => decSum(arr36, m));
}
// sectionSum36: like sectionSum but returns [36] for decade arrays
function sectionSum36(art, section, field) {
  // field = 'dplan', 'dforecast', or 'dfact'; section = 'in' or 'out'
  const CAP = field.charAt(0).toUpperCase() + field.slice(1); // 'Dplan', 'Dforecast', or 'Dfact'
  if (art[section + 'Direct']) {
    return ensureDec(art[section + CAP]); // e.g. art.inDplan, art.outDforecast, art.inDfact
  }
  const res = Array(DEC_COUNT).fill(0);
  (art[section + 'Lines'] || []).forEach(l => {
    const a = ensureDec(l[field]);
    a.forEach((v,i) => res[i] += v||0);
  });
  return res;
}
// Вернуть суммарный массив [MONTHS_COUNT] для секции.
// Декадные массивы — единственный источник истины.
// field = 'plan', 'forecast', или 'fact' (строчные)
function sectionSum(art, section, field) {
  const df = field === 'plan' ? 'dplan' : (field === 'forecast' ? 'dforecast' : 'dfact');
  return decToMonthly(sectionSum36(art, section, df));
}
// sectionSumEff теперь эквивалентен sectionSum (оставлен для обратной совместимости)
function sectionSumEff(art, section, field) {
  return sectionSum(art, section, field);
}

// Вспомогательная: строит список месяцев проекта pi для года dashY
// Возвращает массив {calM, projIdx} — calM = 0-11, projIdx = позиция в проекте
function _projectMonthsForYear(p, dashY) {
  if (!p || !p.start || !p.end) return [];
  const result = [];
  let y = p.start.y, m = p.start.m;
  const endKey = p.end.y * 12 + p.end.m;
  let idx = 0;
  while (y * 12 + m <= endKey && idx < MONTHS_COUNT) {
    if (y === dashY) result.push({ calM: m, projIdx: idx });
    m++; if (m > 11) { m = 0; y++; }
    idx++;
  }
  return result;
}

function computeProjectNet12(pi, dashY) {
  const b = budgets[(projects[pi] || {}).id];
  const p = projects[pi];
  if (!b || !b.articles || !p || !p.start) return Array(12).fill(null);
  dashY = dashY ?? new Date().getFullYear();
  // Проверяем что проект пересекается с dashY
  const projY = _projectMonthsForYear(p, dashY);
  if (!projY.length) return Array(12).fill(null);
  const net12 = Array(12).fill(null);
  projY.forEach(({calM}) => net12[calM] = 0);
  b.articles.forEach(a => {
    const ip = sectionSum(a, 'in',  'plan');
    const op = sectionSum(a, 'out', 'plan');
    projY.forEach(({calM, projIdx}) => {
      net12[calM] += (ip[projIdx]||0) - (op[projIdx]||0);
    });
  });
  return net12;
}

function computeProjectNet12Forecast(pi, dashY) {
  const b = budgets[(projects[pi] || {}).id];
  const p = projects[pi];
  if (!b || !b.articles || !p || !p.start) return Array(12).fill(null);
  dashY = dashY ?? new Date().getFullYear();
  const projY = _projectMonthsForYear(p, dashY);
  if (!projY.length) return Array(12).fill(null);
  const net12 = Array(12).fill(null);
  projY.forEach(({calM}) => net12[calM] = 0);
  b.articles.forEach(a => {
    const ip = sectionSum(a, 'in',  'forecast');
    const op = sectionSum(a, 'out', 'forecast');
    projY.forEach(({calM, projIdx}) => {
      net12[calM] += (ip[projIdx]||0) - (op[projIdx]||0);
    });
  });
  return net12;
}

function computeProjectNetDec36(pi, dashY) {
  const b = budgets[(projects[pi] || {}).id];
  const p = projects[pi];
  if (!b || !b.articles || !p || !p.start) return Array(DEC_COUNT_YEAR).fill(0);
  dashY = dashY ?? new Date().getFullYear();
  const projY = _projectMonthsForYear(p, dashY);
  if (!projY.length) return Array(DEC_COUNT_YEAR).fill(0);
  const net36 = Array(DEC_COUNT_YEAR).fill(0); // годовой массив (0-35 = Jan.d1..Dec.d3)
  b.articles.forEach(a => {
    const ip36 = sectionSum36(a, 'in',  'dplan');
    const op36 = sectionSum36(a, 'out', 'dplan');
    projY.forEach(({calM, projIdx}) => {
      for (let d = 0; d < 3; d++) {
        net36[calM*3+d] += (ip36[projIdx*3+d]||0) - (op36[projIdx*3+d]||0);
      }
    });
  });
  return net36;
}

function computeProjectNetDec36Forecast(pi, dashY) {
  const b = budgets[(projects[pi] || {}).id];
  const p = projects[pi];
  if (!b || !b.articles || !p || !p.start) return Array(DEC_COUNT_YEAR).fill(0);
  dashY = dashY ?? new Date().getFullYear();
  const projY = _projectMonthsForYear(p, dashY);
  if (!projY.length) return Array(DEC_COUNT_YEAR).fill(0);
  const net36 = Array(DEC_COUNT_YEAR).fill(0);
  b.articles.forEach(a => {
    const ip36 = sectionSum36(a, 'in',  'dforecast');
    const op36 = sectionSum36(a, 'out', 'dforecast');
    projY.forEach(({calM, projIdx}) => {
      for (let d = 0; d < 3; d++) {
        net36[calM*3+d] += (ip36[projIdx*3+d]||0) - (op36[projIdx*3+d]||0);
      }
    });
  });
  return net36;
}

// Compute cumulative net for December of previous year (prior period carryover)
function computePriorPeriodCumul(pi) {
  const b = budgets[(projects[pi] || {}).id];
  const p = projects[pi];
  if (!b || !b.articles || !p || !p.start) return { budget: 0, forecast: 0 };
  const prevY = new Date().getFullYear() - 1;
  const projPrevY = _projectMonthsForYear(p, prevY);
  if (!projPrevY.length) return { budget: 0, forecast: 0 };
  let sumB = 0, sumP = 0;
  b.articles.forEach(a => {
    const ip = sectionSum(a, 'in',  'plan');
    const op = sectionSum(a, 'out', 'plan');
    const ipF = sectionSum(a, 'in',  'forecast');
    const opF = sectionSum(a, 'out', 'forecast');
    projPrevY.forEach(({projIdx}) => {
      sumB += (ip[projIdx]||0) - (op[projIdx]||0);
      sumP += (ipF[projIdx]||0) - (opF[projIdx]||0);
    });
  });
  return { budget: sumB, forecast: sumP };
}

    // Prior period: cumulative of ALL 36 decades of previous year
    const prior12  = projects.map((p, pi) => computePriorPeriodCumul(pi));
    const totB36   = Array(DEC_COUNT_YEAR).fill(0);
    const totP36   = Array(DEC_COUNT_YEAR).fill(0);
    nets36B.forEach(n => { for (let d=0;d<DEC_COUNT_YEAR;d++) totB36[d] += n[d]||0; });
    nets36P.forEach(n => { for (let d=0;d<DEC_COUNT_YEAR;d++) totP36[d] += n[d]||0; });
    // Company prior period totals
    let compPriorB = 0, compPriorP = 0;
    prior12.forEach(p => { compPriorB += p.budget; compPriorP += p.forecast; });

    // Full cumulative arrays for current year (DEC_COUNT_YEAR = 36 decades)
    const fullCB=[],fullCP=[];
    let rB=0,rP=0;
    for(let d=0;d<DEC_COUNT_YEAR;d++){rB+=totB36[d]||0;fullCB[d]=rB;rP+=totP36[d]||0;fullCP[d]=rP;}
    // Prior period value (cumulative before first shown decade)
    const befB = startDecIdx>0?(fullCB[startDecIdx-1]||0):0;
    const befP = startDecIdx>0?(fullCP[startDecIdx-1]||0):0;
    // Cumulative with prior period carryover
    const cum9B=[],cum9P=[];
    let rsB=compPriorB+befB, rsP=compPriorP+befP;
    for(let d=startDecIdx;d<startDecIdx+SHOWN_DEC;d++){
      rsB+=totB36[d]||0; cum9B.push(rsB);
      rsP+=totP36[d]||0; cum9P.push(rsP);
    }

    // TBODY
    let tbody = '';
    const pair = (vB,vP,cur) => {
      const cm = cur?' dash-cur-month':'';
      const cB = vB===null||vB===0?'dash-zero':(vB>0?'dash-pos':'dash-neg');
      const cP = vP===null||vP===0?'dash-zero':(vP>0?'dash-pos':'dash-neg');
      const budgetTd = viewDashBudget
        ? `<td class="dash-dec-cell ${cB}${cm}" style="border-right:none">${vB===null?'':fmtD(vB)}</td>`
        : '';
      return budgetTd +
             `<td class="dash-dec-cell ${cP}${cm}" style="color:${colorPl(vP||0)};background:#fffce8;border-right:2px solid #c0c0d0">${vP===null?'':fmtD(vP)}</td>`;
    };

    // Prior period cells for each project
    const priorCellDec = (pr) => {
      const style = 'background:#ede8ff;color:#3d1a8a;border-right:2px solid #c0c0d0';
      const cB = pr.budget===0?'dash-zero':(pr.budget>0?'dash-pos':'dash-neg');
      const cP = pr.forecast===0?'dash-zero':(pr.forecast>0?'dash-pos':'dash-neg');
      const budgetTd = viewDashBudget
        ? `<td class="dash-dec-cell ${cB}" style="border-right:none;${style}">${fmtD(pr.budget)}</td>`
        : '';
      return budgetTd + `<td class="dash-dec-cell ${cP}" style="${style}">${fmtD(pr.forecast)}</td>`;
    };

    // Helper for total rows' prior column
    const priorCellDecTotal = (vB, vP) => {
      const style = 'background:#d8d0f5;color:#3d1a8a;font-weight:600;border-right:2px solid #c0c0d0';
      const budgetTd = viewDashBudget
        ? `<td class="dash-dec-cell" style="border-right:none;${style}">${fmtD(vB)}</td>`
        : '';
      return budgetTd + `<td class="dash-dec-cell" style="${style}">${fmtD(vP)}</td>`;
    };

    projects.forEach((p,pi) => {
      const nB=nets36B[pi], nP=nets36P[pi];
      const pr=prior12[pi];
      const inYear = _projectMonthsForYear(p, curY).length > 0;
      const badge = p.type?`<span class="proj-badge">${esc(p.type)}</span>`:'';
      tbody += `<tr><td class="dash-sticky left">${esc(p.name)}${badge}</td>`;
      // Prior period column
      tbody += priorCellDec(pr);
      for(let d=startDecIdx;d<startDecIdx+SHOWN_DEC;d++)
        tbody += pair(inYear ? (nB[d]||0) : null, inYear ? (nP[d]||0) : null, d===curDecGlobal);
      tbody += '</tr>';
    });

    tbody += '<tr class="dash-total"><td class="dash-sticky left">Денежный поток компании</td>';
    tbody += priorCellDecTotal(compPriorB, compPriorP);
    for(let d=startDecIdx;d<startDecIdx+SHOWN_DEC;d++){
      const vB=totB36[d]||0, vP=totP36[d]||0, cur=d===curDecGlobal;
      const cm=cur?' dash-cur-month':'';
      if (viewDashBudget)
        tbody += `<td class="dash-dec-cell${cm}" style="color:${colorB(vB)};border-right:none">${fmtD(vB)}</td>`;
      tbody += `<td class="dash-dec-cell${cm}" style="color:${colorPl(vP)};background:#fffce8;border-right:2px solid #c0c0d0">${fmtD(vP)}</td>`;
    }
    tbody += '</tr>';

    tbody += '<tr class="dash-cumul"><td class="dash-sticky left">Накопительно</td>';
    // Prior period cumulative carryover
    tbody += priorCellDecTotal(compPriorB, compPriorP);
    for(let i=0;i<SHOWN_DEC;i++){
      const vB=cum9B[i]||0, vP=cum9P[i]||0, cur=(startDecIdx+i)===curDecGlobal;
      const cm=cur?' dash-cur-month':'';
      const cB=vB>0?'#3d1a8a':vB<0?'#a33020':'#999';
      const cP=vP>0?'#5a4000':vP<0?'#a33020':'#999';
      if (viewDashBudget)
        tbody += `<td class="dash-dec-cell${cm}" style="color:${cB};border-right:none">${fmtD(vB)}</td>`;
      tbody += `<td class="dash-dec-cell${cm}" style="color:${colorPl(vP)};background:#fffce8;border-right:2px solid #c0c0d0">${fmtD(vP)}</td>`;
    }
    tbody += '</tr>';

    document.getElementById('dashboard-body').innerHTML = tbody;
    requestAnimationFrame(() => renderCumulChartDec(cum9B, cum9P, SHOWN_DEC));

  // ── MONTH VIEW ───────────────────────────────────────────────────────
  } else {
    const prevY = curY - 1;
    // THEAD — 2 строки:
    // 1) «Проект» rowspan=2 | «Дек пред.» | месяц colspan=2
    // 2) «бюджет» | «план»
    const cs = viewDashBudget ? 2 : 1;
    let thead = '<tr><th class="dash-sticky" rowspan="2" style="text-align:left">Проект</th>';
    // Prior period column (December of previous year)
    const priorColspan = viewDashBudget ? 2 : 1;
    thead += `<th colspan="${priorColspan}" style="text-align:center;border-right:2px solid #c0c0d0;background:#ede8ff;color:#3d1a8a;font-size:10px;font-weight:600;padding:3px 6px">Дек '${String(prevY).slice(-2)}</th>`;
    for(let m=0;m<12;m++){
      const cm = m===curM?' class="dash-cur-month"':'';
      thead += `<th${cm} colspan="${cs}" style="text-align:center;border-right:2px solid #c0c0d0">${MNAMES[m]}</th>`;
    }
    thead += '</tr><tr>';
    // Prior period subheaders: бдж only if budget, always план
    if (viewDashBudget)
      thead += `<th style="color:#1a5fa3;background:#eaf4ff;font-size:10px;font-weight:500;text-align:center;padding:3px 6px;border-right:none">бдж</th>`;
    thead += `<th style="color:#7a6000;background:#fff8e0;font-size:10px;font-weight:500;text-align:center;padding:3px 6px;border-right:2px solid #c0c0d0">план</th>`;
    for(let m=0;m<12;m++){
      const cm = m===curM?' class="dash-cur-month"':'';
      if (viewDashBudget)
        thead += `<th${cm} style="color:#1a5fa3;background:#eaf4ff;font-size:10px;font-weight:500;text-align:center;padding:3px 6px;border-right:none">бдж</th>`;
      thead += `<th${cm} style="color:#7a6000;background:#fff8e0;font-size:10px;font-weight:500;text-align:center;padding:3px 6px;border-right:2px solid #c0c0d0">план</th>`;
    }
    thead += '</tr>';
    document.getElementById('dashboard-thead').innerHTML = thead;

    // DATA
    const nets12B  = projects.map((p,pi) => computeProjectNet12(pi, curY));
    const nets12P  = projects.map((p,pi) => computeProjectNet12Forecast(pi, curY));
    // Prior period cumulative for each project
    const prior12  = projects.map((p,pi) => computePriorPeriodCumul(pi));
    const totB     = Array(12).fill(null);
    const totP     = Array(12).fill(null);
    // Company totals for prior period
    let compPriorB = 0, compPriorP = 0;
    prior12.forEach(p => { compPriorB += p.budget; compPriorP += p.forecast; });
    nets12B.forEach(n => { for(let m=0;m<12;m++) if (n[m] !== null) totB[m] = (totB[m] ?? 0) + n[m]; });
    nets12P.forEach(n => { for(let m=0;m<12;m++) if (n[m] !== null) totP[m] = (totP[m] ?? 0) + n[m]; });

    const cumB=[],cumP=[];
    let rB=compPriorB, rP=compPriorP;
    for(let m=0;m<12;m++){
      if (totB[m] !== null) { rB += totB[m]; cumB.push(rB); } else cumB.push(null);
      if (totP[m] !== null) { rP += totP[m]; cumP.push(rP); } else cumP.push(null);
    }

    // TBODY
    let tbody = '';

    const pair = (vB, vP, outB, outP, cur) => {
      const cm = cur?' dash-cur-month':'';
      const cB = outB?'dash-out-range':(vB===null||vB===0?'dash-zero':(vB>0?'dash-pos':'dash-neg'));
      const planBorder = 'border-right:2px solid #c0c0d0';
      const budgetTd = viewDashBudget
        ? `<td class="${cB}${cm}" style="border-right:none">${outB?'':fmtD(vB)}</td>`
        : '';
      const planTd = `<td class="${outP?'dash-out-range':cm}" style="${outP?'':('color:'+colorPl(vP||0)+';background:#fffce8')};${planBorder}">${outP?'':fmtD(vP)}</td>`;
      return budgetTd + planTd;
    };

    // Prior period cell (column before January)
    const priorCell = (vB, vP, idx) => {
      const cB = vB===0?'dash-zero':(vB>0?'dash-pos':'dash-neg');
      const cP = vP===0?'dash-zero':(vP>0?'dash-pos':'dash-neg');
      const style = 'background:#ede8ff;color:#3d1a8a;border-right:2px solid #c0c0d0';
      const budgetTd = viewDashBudget
        ? `<td class="${cB}" style="border-right:none;${style}">${fmtD(vB)}</td>`
        : '';
      return budgetTd + `<td class="${cP}" style="${style}">${fmtD(vP)}</td>`;
    };

    // Helper to build prior period column for each row
    const priorCellTotal = (vB, vP) => {
      const style = 'background:#d8d0f5;color:#3d1a8a;font-weight:600;border-right:2px solid #c0c0d0';
      const budgetTd = viewDashBudget
        ? `<td style="border-right:none;${style}">${fmtD(vB)}</td>`
        : '';
      return budgetTd + `<td style="${style}">${fmtD(vP)}</td>`;
    };

    projects.forEach((p,pi) => {
      const nB=nets12B[pi], nP=nets12P[pi];
      const pr=prior12[pi];
      const badge = p.type?`<span class="proj-badge">${esc(p.type)}</span>`:'';
      tbody += `<tr><td class="dash-sticky left">${esc(p.name)}${badge}</td>`;
      // Prior period column
      tbody += priorCell(pr.budget, pr.forecast, pi);
      for(let m=0;m<12;m++)
        tbody += pair(nB[m], nP[m], nB[m]===null, nP[m]===null, m===curM);
      tbody += '</tr>';
    });

    // Company totals row
    tbody += '<tr class="dash-total"><td class="dash-sticky left">Денежный поток компании</td>';
    tbody += priorCellTotal(compPriorB, compPriorP);
    for(let m=0;m<12;m++){
      const vB=totB[m], vP=totP[m], cur=m===curM;
      const cm=cur?' dash-cur-month':'';
      if (viewDashBudget)
        tbody += `<td class="${cm}" style="color:${vB===null?'#999':colorB(vB)};border-right:none">${vB===null?'':fmtD(vB)}</td>`;
      tbody += `<td class="${cm}" style="color:${vP===null?'#999':colorPl(vP)};background:#fffce8;border-right:2px solid #c0c0d0">${vP===null?'':fmtD(vP)}</td>`;
    }
    tbody += '</tr>';

    // Cumulative row — starts from prior period values
    tbody += '<tr class="dash-cumul"><td class="dash-sticky left">Накопительно</td>';
    // Prior period cumulative: just show the carryover value
    const style = 'background:#d8d0f5;color:#3d1a8a;font-weight:600;border-right:2px solid #c0c0d0';
    const budgetPriorCumul = viewDashBudget
      ? `<td style="border-right:none;${style}">${fmtD(compPriorB)}</td>`
      : '';
    tbody += budgetPriorCumul + `<td style="${style}">${fmtD(compPriorP)}</td>`;
    for(let m=0;m<12;m++){
      const vB=cumB[m], vP=cumP[m], cur=m===curM;
      const cm=cur?' dash-cur-month':'';
      const cB=vB===null?'#999':(vB>0?'#3d1a8a':vB<0?'#a33020':'#999');
      const cP=vP===null?'#999':(vP>0?'#5a4000':vP<0?'#a33020':'#999');
      if (viewDashBudget)
        tbody += `<td class="${cm}" style="color:${cB};border-right:none">${vB===null?'':fmtD(vB)}</td>`;
      tbody += `<td class="${cm}" style="color:${colorPl(vP||0)};background:#fffce8;border-right:2px solid #c0c0d0">${vP===null?'':fmtD(vP)}</td>`;
    }
    tbody += '</tr>';

    document.getElementById('dashboard-body').innerHTML = tbody;
    requestAnimationFrame(() => renderCumulChart(cumB, cumP, curM));
  }
}


/* ---- CUMULATIVE CHART ---- */
function renderCumulChart(cumul, cumulFC, curM) {
  const canvas = document.getElementById('cumul-chart');
  if (!canvas) return;

  const dpr = window.devicePixelRatio || 1;

  // Синхронизируем ширину canvas с таблицей
  const tbl = document.getElementById('dashboard-table');
  if (tbl) canvas.style.width = tbl.offsetWidth + 'px';

  // ── Read column X-centres from the actual table header cells ──
  const thead = document.getElementById('dashboard-thead');
  // Берём только первую строку thead — там месячные группы
  const firstRow = thead ? thead.querySelector('tr') : null;
  const hCells   = firstRow ? Array.from(firstRow.querySelectorAll('th')) : [];
  // First th is the sticky «Проект», second is the prior period column, rest are 12 months
  const monthThs = hCells.slice(2); // skip sticky + prior period
  if (monthThs.length !== 12) return; // table not yet rendered

  // x positions of month columns — используем offsetLeft чтобы не зависеть от скролла
  const tableOffsetLeft = tbl ? tbl.getBoundingClientRect().left - canvas.getBoundingClientRect().left : 0;
  const colX = monthThs.map(th => {
    const r = th.getBoundingClientRect();
    return (r.left + r.right) / 2 - canvas.getBoundingClientRect().left;
  });

  // Берём ширину таблицы чтобы canvas совпадал с ней при скролле
  const dashTbl = document.getElementById('dashboard-table');
  const W = (dashTbl ? dashTbl.offsetWidth : canvas.parentElement.clientWidth) || 800;
  const H = 220;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  // Left pad = leftmost column centre, right edge = rightmost centre
  const PAD = { top: 24, right: 20, bottom: 16, left: 20 };
  const cH  = H - PAD.top - PAD.bottom;

  const vals   = cumul.map(v => v / 1000);
  const valsFC = cumulFC ? cumulFC.map(v => v / 1000) : vals;
  const minVal = Math.min(0, ...vals, ...valsFC);
  const maxVal = Math.max(0, ...vals, ...valsFC);
  const range  = maxVal - minVal || 1;
  const pad    = range * 0.12;
  const vMin   = minVal - pad;
  const vMax   = maxVal + pad;
  const vRange = vMax - vMin;

  // Y axis label area to the left of first column
  const yLabelRight = colX[0] - 8;

  const toX = (m) => colX[m];
  const toY = (v) => PAD.top + (1 - (v - vMin) / vRange) * cH;
  const zeroY = toY(0);

  // ── Grid lines (span full columns range) ─────────────────────
  const xLeft  = colX[0];
  const xRight = colX[11];

  // round grid values to nice intervals
  function niceGrid(vMin, vMax, steps) {
    const span = vMax - vMin;
    const rawStep = span / steps;
    const pow = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const n = Math.ceil(rawStep / pow);
    const niceStep = n * pow;
    const ticks = [];
    for (let i = 0; i <= steps; i++) {
      const v = Math.round(vMin / niceStep) * niceStep + i * niceStep;
      ticks.push(v);
    }
    return ticks;
  }

  ctx.strokeStyle = '#e8e8e4';
  ctx.lineWidth   = 1;
  const ticks = niceGrid(vMin, vMax, 4);
  ticks.forEach(v => {
    const y = toY(v);
    ctx.beginPath();
    ctx.moveTo(xLeft, y);
    ctx.lineTo(xRight, y);
    ctx.stroke();
    // Y labels
    const lbl = String(Math.round(v));
    ctx.fillStyle = '#bbb';
    ctx.font = '10px system-ui,sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(lbl, yLabelRight, y + 3.5);
  });

  // ── Zero line ────────────────────────────────────────────────
  ctx.save();
  ctx.strokeStyle = '#888';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(xLeft, zeroY);
  ctx.lineTo(xRight, zeroY);
  ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#888';
  ctx.font = 'bold 10px system-ui,sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('0', yLabelRight, zeroY + 3.5);

  // ── Filled areas — по линии план (valsFC) ───────────────────
  const fillData = cumulFC ? valsFC : vals;
  function drawFill(color, isAbove) {
    ctx.save();
    ctx.beginPath();
    if (isAbove) ctx.rect(xLeft, PAD.top, xRight - xLeft, zeroY - PAD.top);
    else         ctx.rect(xLeft, zeroY,   xRight - xLeft, PAD.top + cH - zeroY);
    ctx.clip();
    ctx.beginPath();
    ctx.moveTo(toX(0), zeroY);
    for (let m = 0; m < 12; m++) ctx.lineTo(toX(m), toY(fillData[m]));
    ctx.lineTo(toX(11), zeroY);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }
  drawFill('rgba(10,110,78,0.10)', true);
  drawFill('rgba(163,48,32,0.10)', false);

  // ── Бюджет — тёмно-синий пунктир ────────────────────────────
  ctx.save();
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  for (let m = 0; m < 12; m++) {
    if (m === 0) ctx.moveTo(toX(m), toY(vals[m]));
    else         ctx.lineTo(toX(m), toY(vals[m]));
  }
  ctx.strokeStyle = '#2a4a8a';
  ctx.lineWidth   = 2;
  ctx.lineJoin    = 'round';
  ctx.stroke();
  ctx.restore();

  // ── Current month vertical marker ────────────────────────────
  if (curM >= 0 && curM <= 11) {
    ctx.save();
    ctx.strokeStyle = '#e8a000';
    ctx.lineWidth   = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(toX(curM), PAD.top);
    ctx.lineTo(toX(curM), PAD.top + cH);
    ctx.stroke();
    ctx.restore();
  }

  // ── План — сплошная с разбивкой по нулю (зелёная/красная) ───
  function drawPlanLine(color, isAbove) {
    ctx.save();
    ctx.beginPath();
    if (isAbove) ctx.rect(xLeft - 2, PAD.top - 2, xRight - xLeft + 4, zeroY - PAD.top + 2);
    else         ctx.rect(xLeft - 2, zeroY, xRight - xLeft + 4, PAD.top + cH - zeroY + 2);
    ctx.clip();
    ctx.beginPath();
    for (let m = 0; m < 12; m++) {
      const v = (cumulFC ? valsFC : vals)[m];
      if (m === 0) ctx.moveTo(toX(m), toY(v));
      else         ctx.lineTo(toX(m), toY(v));
    }
    ctx.strokeStyle = color;
    ctx.lineWidth   = 2.5;
    ctx.lineJoin    = 'round';
    ctx.stroke();
    ctx.restore();
  }
  drawPlanLine('#0a6e4e', true);
  drawPlanLine('#c0392b', false);

  // ── Dots бюджет (синие) ───────────────────────────────────────
  for (let m = 0; m < 12; m++) {
    const v = vals[m], cx = toX(m), cy = toY(v);
    ctx.beginPath();
    ctx.arc(cx, cy, m === curM ? 4 : 3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a4a8a';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── Dots план (зелёные/красные) ──────────────────────────────
  const planData = cumulFC ? valsFC : vals;
  for (let m = 0; m < 12; m++) {
    const v = planData[m], cx = toX(m), cy = toY(v);
    ctx.beginPath();
    ctx.arc(cx, cy, m === curM ? 5 : 3.5, 0, Math.PI * 2);
    ctx.fillStyle = v >= 0 ? '#0a6e4e' : '#c0392b';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── Value labels: бюджет и план — без наложения ─────────────
  // Та линия, что выше в данной точке → метка сверху; ниже → снизу
  ctx.textAlign = 'center';
  ctx.font = '10px system-ui,sans-serif';
  for (let m = 0; m < 12; m++) {
    const vB = vals[m];
    const vP = cumulFC ? valsFC[m] : null;
    const bAbove = vP === null || vB >= vP;
    if (vB !== 0) {
      const cx = toX(m), cy = toY(vB);
      ctx.fillStyle = '#2a4a8a';
      ctx.fillText(String(Math.round(vB)), cx, bAbove ? cy - 8 : cy + 15);
    }
    if (vP !== null && vP !== 0) {
      const cx = toX(m), cy = toY(vP);
      ctx.fillStyle = vP >= 0 ? '#0a6e4e' : '#c0392b';
      ctx.fillText(String(Math.round(vP)), cx, bAbove ? cy + 15 : cy - 8);
    }
  }
}

/* ---- DECADE CHART (dashboard) ---- */
function renderCumulChartDec(cumulArr, cumulArrFC, shownDec) {
  const shown = shownDec || cumulArr.length;
  const canvas = document.getElementById('cumul-chart');
  if (!canvas) return;

  const dpr = window.devicePixelRatio || 1;

  // Синхронизируем ширину canvas с таблицей
  const tbl = document.getElementById('dashboard-table');
  if (tbl) canvas.style.width = tbl.offsetWidth + 'px';

  const thead = document.getElementById('dashboard-thead');
  // Берём 2-ю строку thead (декады с colspan=2), skip 1st row which has sticky + prior
  const theadRows = thead ? Array.from(thead.querySelectorAll('tr')) : [];
  // Row 1 has sticky + prior (not decade cells), row 2 has decade labels
  const decRow    = theadRows.length > 1 ? theadRows[1] : null; // decade labels row
  const decThs    = decRow ? Array.from(decRow.querySelectorAll('th.dash-dec-head')) : [];
  if (decThs.length < shown) return;

  const colX = decThs.map(th => {
    const r = th.getBoundingClientRect();
    return (r.left + r.right) / 2 - canvas.getBoundingClientRect().left;
  });

  // Берём ширину таблицы чтобы canvas совпадал с ней при скролле
  const dashTbl = document.getElementById('dashboard-table');
  const W = (dashTbl ? dashTbl.offsetWidth : canvas.parentElement.clientWidth) || 800;
  const H = 220;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const PAD = { top: 24, right: 20, bottom: 16, left: 20 };
  const cH  = H - PAD.top - PAD.bottom;

  const validVals   = cumulArr.filter(v => v !== null).map(v => v / 1000);
  const validValsFC = cumulArrFC ? cumulArrFC.filter(v => v !== null).map(v => v / 1000) : [];
  const minVal = Math.min(0, ...(validVals.length ? validVals : [0]), ...(validValsFC.length ? validValsFC : [0]));
  const maxVal = Math.max(0, ...(validVals.length ? validVals : [1]), ...(validValsFC.length ? validValsFC : [1]));
  const pad    = (maxVal - minVal) * 0.12 || 1;
  const vMin   = minVal - pad;
  const vMax   = maxVal + pad;
  const vRange = vMax - vMin;

  const yLabelRight = colX[0] - 8;
  const toX = (d) => colX[d] !== undefined ? colX[d] : colX[0];
  const toY = (v) => PAD.top + (1 - (v - vMin) / vRange) * cH;
  const zeroY = toY(0);

  const xLeft  = colX[0];
  const xRight = colX[shown - 1];

  // ── Grid lines ─────────────────────────────────────────────
  ctx.strokeStyle = '#e8e8e4';
  ctx.lineWidth   = 1;
  const steps = 4;
  function niceGrid(vMn, vMx, stp) {
    const span = vMx - vMn;
    const rawStep = span / stp;
    const pow = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const n = Math.ceil(rawStep / pow);
    const niceStep = n * pow;
    const arr = [];
    for (let i = 0; i <= stp; i++) arr.push(Math.round(vMn / niceStep) * niceStep + i * niceStep);
    return arr;
  }
  const decTicks = niceGrid(vMin, vMax, steps);
  decTicks.forEach(v => {
    const y = toY(v);
    ctx.beginPath();
    ctx.moveTo(xLeft, y);
    ctx.lineTo(xRight, y);
    ctx.stroke();
    const lbl = String(Math.round(v));
    ctx.fillStyle = '#bbb';
    ctx.font = '10px system-ui,sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(lbl, yLabelRight, y + 3.5);
  });

  // ── Zero line ──────────────────────────────────────────────
  ctx.save();
  ctx.strokeStyle = '#888';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(xLeft, zeroY);
  ctx.lineTo(xRight, zeroY);
  ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#888';
  ctx.font = 'bold 10px system-ui,sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('0', yLabelRight, zeroY + 3.5);

  // ── Filled areas — по линии план (valsFC) ───────────────────
  const valsScaled = cumulArr.map(v => v === null ? null : v / 1000);
  const valsFC = cumulArrFC ? cumulArrFC.map(v => v === null ? null : v / 1000) : null;
  const fillDataDec = valsFC || valsScaled;
  function drawFill(color, isAbove) {
    ctx.save();
    if (isAbove) ctx.rect(xLeft, PAD.top, xRight - xLeft, zeroY - PAD.top);
    else         ctx.rect(xLeft, zeroY, xRight - xLeft, PAD.top + cH - zeroY);
    ctx.clip();
    ctx.beginPath();
    ctx.moveTo(toX(0), zeroY);
    for (let d = 0; d < shown; d++) {
      if (fillDataDec[d] === null) continue;
      ctx.lineTo(toX(d), toY(fillDataDec[d]));
    }
    ctx.lineTo(toX(shown - 1), zeroY);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }
  drawFill('rgba(10,110,78,0.10)', true);
  drawFill('rgba(163,48,32,0.10)', false);

  // ── Бюджет — тёмно-синий пунктир ────────────────────────────
  ctx.save();
  ctx.setLineDash([5, 4]);
  ctx.strokeStyle = '#2a4a8a';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  let firstB = true;
  for (let d = 0; d < shown; d++) {
    if (valsScaled[d] === null) { firstB = true; continue; }
    if (firstB) { ctx.moveTo(toX(d), toY(valsScaled[d])); firstB = false; }
    else          ctx.lineTo(toX(d), toY(valsScaled[d]));
  }
  ctx.stroke();
  ctx.restore();

  // ── Month boundary lines between shown decades ─────────────
  const curM = new Date().getMonth();
  for (let m = curM; m <= curM + 2 && m < 12; m++) {
    if (m === curM) continue;
    const absD = m * 3;
    const relD = absD - curM * 3;
    if (relD >= 1 && relD < shown) {
      const xMid = colX[relD];
      ctx.save();
      ctx.strokeStyle = '#e0e0d8';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(xMid, PAD.top);
      ctx.lineTo(xMid, PAD.top + cH);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ── Dots бюджет (синие) ──────────────────────────────────────
  for (let d = 0; d < shown; d++) {
    if (cumulArr[d] === null) continue;
    const v = valsScaled[d], cx = toX(d), cy = toY(v);
    ctx.beginPath();
    ctx.arc(cx, cy, d === 0 ? 4 : 3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a4a8a';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── План — сплошная с разбивкой по нулю (зелёная/красная) ───
  if (cumulArrFC) {
    function drawPlanLineDec(color, isAbove) {
      ctx.save();
      if (isAbove) ctx.rect(xLeft - 2, PAD.top - 2, xRight - xLeft + 4, zeroY - PAD.top + 2);
      else         ctx.rect(xLeft - 2, zeroY, xRight - xLeft + 4, PAD.top + cH - zeroY + 2);
      ctx.clip();
      ctx.beginPath();
      let first = true;
      for (let d = 0; d < shown; d++) {
        if (valsFC[d] === null) { first = true; continue; }
        if (first) { ctx.moveTo(toX(d), toY(valsFC[d])); first = false; }
        else         ctx.lineTo(toX(d), toY(valsFC[d]));
      }
      ctx.strokeStyle = color;
      ctx.lineWidth   = 2.5;
      ctx.lineJoin    = 'round';
      ctx.stroke();
      ctx.restore();
    }
    drawPlanLineDec('#0a6e4e', true);
    drawPlanLineDec('#c0392b', false);

    // Dots план (зелёные/красные)
    for (let d = 0; d < shown; d++) {
      if (cumulArrFC[d] === null) continue;
      const v = valsFC[d], cx = toX(d), cy = toY(v);
      ctx.beginPath();
      ctx.arc(cx, cy, d === 0 ? 5 : 3.5, 0, Math.PI * 2);
      ctx.fillStyle = v >= 0 ? '#0a6e4e' : '#c0392b';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // ── Value labels: бюджет и план — без наложения ─────────────
  ctx.textAlign = 'center';
  ctx.font = '10px system-ui,sans-serif';
  for (let d = 0; d < shown; d++) {
    const vB = (cumulArr[d] !== null && cumulArr[d] !== 0) ? valsScaled[d] : null;
    const vP = (cumulArrFC && cumulArrFC[d]) ? valsFC[d] : null;
    const bAbove = vP === null || (vB !== null && vB >= vP);
    if (vB !== null) {
      const cx = toX(d), cy = toY(vB);
      ctx.fillStyle = '#2a4a8a';
      ctx.fillText(String(Math.round(vB)), cx, bAbove ? cy - 8 : cy + 15);
    }
    if (vP !== null) {
      const cx = toX(d), cy = toY(vP);
      ctx.fillStyle = vP >= 0 ? '#0a6e4e' : '#c0392b';
      ctx.fillText(String(Math.round(vP)), cx, bAbove ? cy + 15 : cy - 8);
    }
  }
}


function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (name === 'dashboard') {
    document.getElementById('page-dashboard').classList.add('active');
    document.getElementById('nav-dashboard').classList.add('active');
    renderDashboard();
  } else if (name === 'payments') {
    document.getElementById('page-payments').classList.add('active');
    document.getElementById('nav-payments').classList.add('active');
  } else {
    document.getElementById('page-project').classList.add('active');
    document.getElementById('nav-projects').classList.add('active');

    document.getElementById('view-btn-fact').classList.remove('active');
    renderSidebarProjects();
    renderBudget();
  }
